<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 5px; background-color: #f8f9fa; }
    #calendar { height: 780px; background: white; padding: 10px; border-radius: 8px; }
    
    /* 強制縦並びスタイル */
    .fc-timegrid-event-harness { position: static !important; }
    .fc-timegrid-event {
        display: block !important;
        position: static !important;
        width: 100% !important;
        left: 0 !important;
        right: 0 !important;
        margin-bottom: 2px !important;
    }
    .fc-v-event { width: 100% !important; left: 0 !important; }
    .fc-timegrid-slot { height: 4.5em !important; }
  </style>
</head>
<body>
  <div id='calendar'></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');

        function getTuesdayOfCurrentWeek() {
            let d = new Date();
            let day = d.getDay(); 
            let diff = (day >= 2) ? (day - 2) : (day + 5);
            d.setDate(d.getDate() - diff);
            return d.toISOString().split('T')[0];
        }

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            initialDate: getTuesdayOfCurrentWeek(),
            locale: 'ja',
            firstDay: 2,
            slotMinTime: "08:00:00",
            slotMaxTime: "23:00:00",
            slotEventOverlap: false, 
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'timeGridWeek,timeGridDay,dayGridMonth'
            },
            events: function(info, successCallback, failureCallback) {
                google.script.run
                    .withSuccessHandler(function(jsonString) {
                        const data = JSON.parse(jsonString);
                            const events = data.map(item => {
                            const dateStr = item.date.replace(/\//g, '-');
                            
                            // 時間データを数値として扱い、'HH:00:00'形式に変換
                            const hour = parseInt(String(item.time).replace('時', '')) || 0;
                            const timePart = String(hour).padStart(2, '0') + ':00:00';
                            
                            const d = new Date(dateStr);
                            const baseDate = new Date('2026-04-14');
                            const weekNum = Math.floor((d.getTime() - baseDate.getTime()) / (7 * 24 * 60 * 60 * 1000));
                            const isGroupA = (weekNum % 2 === 0);

                            return {
                                title: `[${item.media}] ${item.title}`,
                                start: `${dateStr}T${timePart}`,
                                backgroundColor: '#007bff',
                                borderColor: '#007bff',
                                extendedProps: {
                                    media: item.media,
                                    time: hour,
                                    pic: item.pic,
                                    target: item.target,
                                    pr: item.pr
                                }
                            };
                        });
                        successCallback(events);
                    })
                    .withFailureHandler(failureCallback)
                    .getCalendarEvents();
            },
            eventOrder: 'start,title',
            eventClick: function(info) {
                const props = info.event.extendedProps;
                let detail = `【${info.event.title}】\n配信: ${props.time || '未設定'}:00\n担当: ${props.pic}\n対象: ${props.target}`;
                if (props.pr) detail += `\n\n--- PR内容 ---\n${props.pr}`;
                alert(detail);
            }
        });

        calendar.render();
    });
  </script>
</body>
</html>
