<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 5px; background-color: #f8f9fa; }
    #calendar { background: white; padding: 10px; border-radius: 8px; }
    
    /* 強制縦並びスタイル */
    .fc-timegrid-event-harness { position: static !important; }
    .fc-timegrid-event {
        display: block !important;
        position: static !important;
        width: 100% !important;
        left: 0 !important;
        right: 0 !important;
        margin-bottom: 2px !important;
    }
    .fc-v-event { width: 100% !important; left: 0 !important; }
    /* 時間枠を大きくして可変に対応 */
    .fc-timegrid-slot { height: 6em !important; }
  </style>
</head>
<body>
  <div id='calendar'></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');

        function getTuesdayOfCurrentWeek() {
            let d = new Date();
            let day = d.getDay(); 
            let diff = (day >= 2) ? (day - 2) : (day + 5);
            d.setDate(d.getDate() - diff);
            return d.toISOString().split('T')[0];
        }

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            initialDate: getTuesdayOfCurrentWeek(),
            locale: 'ja',
            firstDay: 2,
            slotMinTime: "08:00:00",
            slotMaxTime: "23:00:00",
            slotEventOverlap: false, 
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'timeGridWeek,timeGridDay,dayGridMonth'
            },
            events: function(info, successCallback, failureCallback) {
                google.script.run
                    .withSuccessHandler(function(jsonString) {
                        const data = JSON.parse(jsonString);
                        const events = data.map(item => {
                            const dateStr = item.date.replace(/\//g, '-');
                            const hour = parseInt(String(item.time).replace('時', '')) || 0;
                            const timePart = String(hour).padStart(2, '0') + ':00:00';

                            return {
                                title: `[${item.media}] ${item.title}`,
                                start: `${dateStr}T${timePart}`,
                                backgroundColor: item.color,
                                borderColor: item.color,
                                extendedProps: {
                                    media: item.media,
                                    time: hour,
                                    pic: item.pic,
                                    target: item.target,
                                    setup: item.setup,
                                    check: item.check
                                }
                            };
                        });
                        successCallback(events);
                    })
                    .withFailureHandler(failureCallback)
                    .getCalendarEvents();
            },
            eventOrder: 'start,title',
            eventClick: function(info) {
                const p = info.event.extendedProps;
                alert(`【${info.event.title}】\n時間: ${p.time}:00\n担当: ${p.pic}\n対象: ${p.target}\n設定: ${p.setup}\n確認: ${p.check}`);
            }
        });

        calendar.render();
    });
  </script>
</body>
</html>
