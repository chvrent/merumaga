<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 5px; background-color: #f8f9fa; }
    #calendar { height: 780px; background: white; padding: 10px; border-radius: 8px; }
    .fc-event-title { font-size: 0.85em; white-space: normal !important; line-height: 1.3; }
    .fc-timegrid-slot { height: 4.5em !important; }
    /* 読み込み中の表示 */
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; font-weight: bold; }
  </style>
</head>
<body>
  <div id="loading">データを読み込み中...</div>
  <div id='calendar'></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      google.script.run
        .withSuccessHandler(function(events) {
          document.getElementById('loading').style.display = 'none';
          var calendarEl = document.getElementById('calendar');
          var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'ja',
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            allDaySlot: false,
            dayHeaderFormat: { weekday: 'short', month: 'numeric', day: 'numeric', omitCommas: true },
            events: events,
            headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: 'timeGridWeek,dayGridMonth'
            },
            eventClick: function(info) {
              var p = info.event.extendedProps;
              alert('【配信詳細】\n時間：' + p.time + '時\n内容：' + p.fullTitle + '\n通数：' + p.count + '通');
            }
          });
          calendar.render();
        })
        .withFailureHandler(function(msg) {
          alert("エラーが発生しました: " + msg);
        })
        .getEvents();
    });
  </script>
</body>
</html>
