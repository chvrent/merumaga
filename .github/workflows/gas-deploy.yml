name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy to Google Apps Script
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON secret is empty. Set the GitHub Actions secret to the full contents of ~/.clasprc.json."
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json', 'utf8')); console.log('clasprc JSON OK')"
          npm install -g @google/clasp
          npx clasp push -f
          npx clasp deploy -i AKfycbzfuyTAe_ZUsCutzU5H1UkQZVoq2zOrmn1WoP4j9tiEYBo5BDNzPW6kofDGXkTiDAJ0Qw -d "Auto-deploy via GitHub Actions"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Check Slack webhook
        id: slack_webhook
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SLACK_WEBHOOK_URL is not set. Skipping Slack notification."
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        if: always() && steps.slack_webhook.outputs.enabled == 'true'
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅ デプロイ成功!' || '❌ デプロイ失敗...' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅ *Deploy Success!*' || '❌ *Deploy Failed!*' }}\nリポジトリ: ${{ github.repository }}\nコミット: ${{ github.event.head_commit.message }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
