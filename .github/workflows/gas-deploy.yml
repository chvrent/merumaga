name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLASP_USER: chvrent18
      CLASP_PROJECT_FILE: .clasp.staging.json
      CLASP_DEPLOYMENT_ID: AKfycbwBER-C0zjRd1piXcqvC-LHNFYP-b9zBitXxAsoaCfeJgWFjf7uxktzjdzpun3PIzdz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy to Google Apps Script
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::CLASPRC_JSON secret is empty. Set the GitHub Actions secret to the full contents of ~/.clasprc.json."
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          node -e "const fs=require('fs'); const rc=JSON.parse(fs.readFileSync(process.env.HOME + '/.clasprc.json', 'utf8')); const user=process.env.CLASP_USER; const token=(rc.tokens&&rc.tokens[user])||rc.token; if(!token||!token.refresh_token){ console.error('::error::CLASPRC_JSON has no refresh_token for '+user+'. Run clasp login --user '+user+' and copy the full ~/.clasprc.json into the secret.'); process.exit(1); } console.log('clasprc JSON OK for '+user)"
          npm install -g @google/clasp
          npx clasp --user "$CLASP_USER" -P "$CLASP_PROJECT_FILE" -I .claspignore status
          npx clasp --user "$CLASP_USER" -P "$CLASP_PROJECT_FILE" -I .claspignore push -f
          npx clasp --user "$CLASP_USER" -P "$CLASP_PROJECT_FILE" -I .claspignore deploy -i "$CLASP_DEPLOYMENT_ID" -d "Auto-deploy via GitHub Actions"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Check Slack webhook
        id: slack_webhook
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SLACK_WEBHOOK_URL is not set. Skipping Slack notification."
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        if: always() && steps.slack_webhook.outputs.enabled == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅ デプロイ成功!' || '❌ デプロイ失敗...' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}*\nリポジトリ: ${{ github.repository }}\nコミット: ${{ env.COMMIT_MSG }}"
                  }
                }
              ]
            }
