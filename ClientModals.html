<script>
  function updateMasterFormFields() {
    const modal = document.getElementById('masterModal');
    const format = String(modal && modal.dataset.format ? modal.dataset.format : 'フリー');
    const fields = {
      'auto_job_feature_id': ['自動求人特集', 'その他'],
      'job_url': ['自動求人特集', 'その他'],
      'pr_id': ['自動求人特集', 'その他']
    };

    Object.keys(fields).forEach(key => {
      const fieldContainer = modal ? modal.querySelector(`[data-field="${key}"]`) : null;
      if (fieldContainer) {
        const isActive = fields[key].includes(format) || format === 'その他';
        fieldContainer.classList.toggle('disabled', !isActive);
        const inputs = fieldContainer.querySelectorAll('input, select, textarea');
        inputs.forEach(input => input.disabled = !isActive);
      }
    });

    const currentJobCountContainer = modal ? modal.querySelector('[data-field="current_job_count"]') : null;
    if (currentJobCountContainer) {
      currentJobCountContainer.classList.add('disabled');
      currentJobCountContainer.querySelectorAll('input, select, textarea').forEach(input => {
        input.disabled = true;
        input.readOnly = true;
        input.placeholder = format === '自動求人特集'
          ? '保存後にURLから自動取得されます'
          : '保存後に自動取得されます';
      });
    }
  }

  function openMasterModal(encodedRow) {
    const row = encodedRow ? JSON.parse(decodeURIComponent(encodedRow)) : {};
    const headers = MASTER_DATA.headers || [];
    const visibleHeaders = getVisibleMasterHeaders(headers);
    const form = document.getElementById('masterForm');
    const modal = document.getElementById('masterModal');
    const isPrMaster = MASTER_DATA.sheetName === 'app_pr';
    const mode = row.__rowNumber ? 'edit' : 'master';
    const tabsContainer = modal ? modal.querySelector('.modal-tabs-container') : null;

    document.getElementById('masterModalTitle').textContent = row.__rowNumber ? 'マスタ編集' : 'マスタ新規追加';
    document.getElementById('master-row-number').value = row.__rowNumber || '';
    if (tabsContainer) {
      tabsContainer.hidden = isPrMaster;
      if (isPrMaster) {
        tabsContainer.style.setProperty('display', 'none', 'important');
      } else {
        tabsContainer.style.removeProperty('display');
      }
    }
    if (modal) {
      modal.dataset.modalType = isPrMaster ? 'pr-master' : 'master';
      modal.dataset.mode = mode;
      modal.dataset.format = isPrMaster ? 'PRマスタ' : (row.format || 'フリー');
      const impactNote = modal.querySelector('#masterImpactNote');
      if (impactNote) {
        impactNote.hidden = isPrMaster || mode !== 'edit';
      }
    }

    // マスタモーダル用の一貫したフィールド生成 (form-grid対応)
    const html = visibleHeaders.map(header => {
      if (isHiddenMasterInputHeader(header)) return '';

      const key = normalizeScheduleEditKey_(header);
      if (isPrMaster && isHiddenPrMasterInputKey_(key, header)) return '';
      const value = row[key] != null ? row[key] : row[header];
      const isFullWidth = ['mail_content', 'mail_content_extract', 'mail_content_free', 'notes', 'user_other_condition', 'parameter', 'auto_job_other_condition', 'job_keyword'].includes(key);
      const input = renderMasterFieldInput_(header, key, value, mode);
      if (input === '') return '';

      return `<div class="form-group ${isFullWidth ? 'full-width' : ''}" data-field="${escapeAttribute(key)}"><label>${escapeHtml(getModalFieldLabel_(header, key))}</label>${input}</div>`;
    }).join('');

    form.innerHTML = html;

    if (isPrMaster) {
      const formatGroup = form.querySelector('[data-field="format"]');
      if (formatGroup) formatGroup.style.display = 'none';
      const prId = getValueByKeys(row, ['pr_id', 'PR ID', 'PR', 'ID', 'id']);
      form.insertAdjacentHTML('beforeend', renderNewsletterSelector_(prId));
    }

    // タブの初期化とルール適用
    populateModalFields(form, row, getModalFieldAliases_('masterModal'));
    refreshAdminSelects_();
    bindMasterModalInteractions_(modal);
    bindFormatSelects_(modal);
    bindCycleButtons_(modal);
    bindSingleDeliveryDateSync_(modal);

    if (modal) {
      const prIdField = modal.querySelector('[name="pr_id"]');
      if (prIdField) {
        prIdField.readOnly = true;
        prIdField.disabled = true;
        prIdField.placeholder = '保存時に自動採番';
      }
      window.openAndInitModalWithTab(isPrMaster ? 'PRマスタ' : (row.format || 'フリー'), 'masterModal');
      updateMasterActionButtons_(row);
      setModalVisible_(modal, true);
    }
  }

  function bindMasterModalInteractions_(modal) {
    if (!modal) return;
    bindChangeField_(modal, '[name="setter"]', () => {
      syncReviewerLock_('masterModal');
    });
    syncReviewerLock_('masterModal');
  }

  function updateMasterActionButtons_(row) {
    const deleteButton = document.getElementById('delete-master-button');
    const draftButton = document.getElementById('draft-master-button');
    const stoppedNote = document.getElementById('masterStoppedNote');
    const hasExistingRow = !!(row && row.__rowNumber);
    const inactive = row ? isInactive(row) : false;
    const endDate = row ? normalizeDateString(getValueByKeys(row, ['end_date', '終了日', '終了'])) : '';
    const today = formatDate(new Date());
    const ended = (!!endDate && endDate < today) || (inactive && !endDate);

    if (deleteButton) {
      deleteButton.style.display = hasExistingRow ? '' : 'none';
      deleteButton.title = 'シートからこの行を完全に削除します。取り消せません。';
    }
    if (draftButton) draftButton.style.display = hasExistingRow ? 'none' : '';
    if (stoppedNote) stoppedNote.hidden = !ended;
  }

  function isHiddenPrMasterInputKey_(key, header) {
    const normalizedKey = String(key == null ? '' : key).trim();
    const normalizedHeader = String(header == null ? '' : header).trim();
    const hiddenKeys = new Set([
      'format',
      'target_ids',
      'target_mails',
      'mail_name',
      'source_row',
      'target_index',
      'is_inactive',
      'is_draft',
      'schedule_id',
      'delivery_count',
      'assignee',
      'reviewer',
      'mail_type',
      'category',
      'sub_category',
      'cycle',
      'weekday',
      'hour',
      'current_job_count',
      'is_fixed',
      'is_new',
      'pr'
    ]);
    const hiddenHeaders = new Set(['target_ids', 'target_mails', '配信停止', '配信終了', '停止']);
    return hiddenKeys.has(normalizedKey) || hiddenHeaders.has(normalizedHeader);
  }

  function renderNewsletterSelector_(prId) {
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const prTargets = Array.isArray(APP_DATA.prTargets) ? APP_DATA.prTargets : [];

    // 現在紐付いているメルマガ名のセットを作成
    const linkedMailNames = new Set(
      prTargets
        .filter(t => !isInactive(t))
        .filter(t => normalizeIdKey(getValueByKeys(t, ['pr_id', 'PR ID', 'ＰＲ ID', 'PR_ID', 'PRID', 'PR'])) === normalizeIdKey(prId))
        .map(t => normalizeText(getValueByKeys(t, ['mail_name', 'メルマガ名', '対象メルマガ'])))
    );

    // メルマガ一覧を mail_name でユニーク化
    const uniqueNewsletters = [];
    const seenNames = new Set();
    schedule.forEach(item => {
      const name = normalizeText(getValueByKeys(item, ['mail_name', 'メルマガ名']));
      if (name && !seenNames.has(name)) {
        uniqueNewsletters.push({ name });
        seenNames.add(name);
      }
    });

    uniqueNewsletters.sort((a, b) => a.name.localeCompare(b.name));

    return `
      <div class="newsletter-selector">
        <div class="newsletter-selector-header">
          <strong>PRが入るメルマガを選択 (全${uniqueNewsletters.length}件)</strong>
          <input type="text" class="newsletter-selector-search" placeholder="メルマガ名で検索..." oninput="filterNewsletterList_(this.value)">
        </div>
        <div id="newsletterList" class="newsletter-list">
          ${uniqueNewsletters.map(nl => `
            <label class="newsletter-item">
              <input type="checkbox" data-target-name="${escapeAttribute(nl.name)}" ${linkedMailNames.has(nl.name) ? 'checked' : ''}>
              <span>${escapeHtml(nl.name)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }

  function filterNewsletterList_(keyword) {
    const k = keyword.trim().toLowerCase();
    document.querySelectorAll('#newsletterList .newsletter-item').forEach(item => {
      const text = item.textContent.toLowerCase();
      item.style.display = text.includes(k) ? 'flex' : 'none';
    });
  };

  function getModalFieldAliases_(modalId) {
    if (modalId === 'editModal') {
      return {
        mail_name: ['mail_name', 'block_name', 'メルマガ名'],
        delivery_count: ['delivery_count', 'mail_count', '通数'],
        mail_content: ['mail_content', 'mail_body', 'content', 'メルマガ内容'],
        mail_content_extract: ['mail_content_extract', 'メルマガ内容(抽出)'],
        mail_content_free: ['mail_content_free', 'メルマガ内容(フリー)'],
        notes: ['notes', 'note', '備考'],
        mail_type: ['mail_type', 'category', '種別'],
        format: ['format', '形式'],
        setter: ['setter', 'assignee', '設定者'],
        checker: ['checker', 'reviewer', '確認者'],
        is_new: ['is_new', 'new_flag', '新規'],
        is_verifying: ['is_verifying', 'verifying_flag', '検証中', '検証中/is_verifying'],
        user_other_condition: ['user_other_condition', 'USER_その他条件'],
        parameter: ['parameter', 'parameters', 'パラメータ'],
        auto_job_other_condition: ['auto_job_other_condition', '自動求人特集_その他条件']
      };
    }

    return {
      mail_name: ['mail_name', 'block_name', 'メルマガ名'],
      delivery_count: ['delivery_count', 'mail_count', '通数'],
      mail_content: ['mail_content', 'mail_body', 'content', 'メルマガ内容'],
      mail_content_extract: ['mail_content_extract', 'メルマガ内容(抽出)'],
      mail_content_free: ['mail_content_free', 'メルマガ内容(フリー)'],
      notes: ['notes', 'note', '備考'],
      mail_type: ['mail_type', 'category', '種別'],
      format: ['format', '形式'],
      setter: ['setter', 'assignee', '設定者'],
      checker: ['checker', 'reviewer', '確認者'],
      is_new: ['is_new', 'new_flag', '新規'],
      is_verifying: ['is_verifying', 'verifying_flag', '検証中', '検証中/is_verifying'],
      user_other_condition: ['user_other_condition', 'USER_その他条件'],
      parameter: ['parameter', 'parameters', 'パラメータ'],
      auto_job_other_condition: ['auto_job_other_condition', '自動求人特集_その他条件']
    };
  }

  function populateModalFields(modal, entry, aliasMap) {
    if (!modal || !entry) return;

    modal.querySelectorAll('[name]').forEach(input => {
      if (input.type === 'hidden') return;
      const name = input.name;
      const aliases = aliasMap[name] || [name];
      const value = getValueByKeys(entry, aliases);
      if (input.type === 'checkbox') {
        input.checked = isTruthyValue(value);
        return;
      }
      if (input.tagName === 'SELECT' && !input.options.length) {
        input.dataset.pendingValue = value != null ? String(value) : '';
        return;
      }
      input.value = value != null ? value : '';
    });
  }

  function setModalVisible_(modal, visible) {
    if (!modal) return;
    modal.style.display = visible ? 'flex' : 'none';
    modal.setAttribute('aria-hidden', visible ? 'false' : 'true');
  }

  function closeMasterModal() {
    const modal = document.getElementById('masterModal');
    setModalVisible_(modal, false);
  }

  function buildUniqueScheduleValues_(key) {
    const set = new Set();
    (APP_DATA.schedule || []).forEach(row => {
      const v = String((row && row[key]) || '').trim();
      if (v) set.add(v);
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'ja'));
  }

  function normalizeScheduleEditKey_(header) {
    const key = String(header == null ? '' : header).trim();
    // 日本語/英語 形式: 末尾の英語セグメントで再帰解決
    if (key.includes('/')) {
      const parts = key.split('/').map(s => s.trim());
      const lastPart = parts[parts.length - 1];
      if (lastPart && lastPart !== key) return normalizeScheduleEditKey_(lastPart);
    }
    const lower = key.toLowerCase();
    const map = {
      'メルマガ内容': 'mail_content',
      'メルマガ内容(抽出)': 'mail_content_extract',
      'メルマガ内容(フリー)': 'mail_content_free',
      '通数': 'delivery_count',
      '設定者': 'assignee',
      '確認者': 'reviewer',
      '備考': 'notes',
      '種別': 'mail_type',
      'category': 'mail_type',
      'サブカテゴリ': 'sub_category',
      '担当部署': 'sub_category',
      '形式': 'format',
      '曜日': 'weekday',
      '時間': 'hour',
      '開始': 'start_date',
      '開始日': 'start_date',
      '終了': 'end_date',
      '終了日': 'end_date',
      '自動求人特集URL': 'job_url',
      '自動求人特集_URL': 'job_url',
      '求人URL': 'job_url',
      '自動求人特集ID': 'auto_job_feature_id',
      '自動求人特集_ID': 'auto_job_feature_id',
      '対象年齢': 'target_age',
      'USER_年齢': 'target_age',
      '対象現住所': 'target_address',
      'USER_現住所': 'target_address',
      '希望勤務地': 'user_desired_location',
      'USER_希望勤務地': 'user_desired_location',
      '経験職種': 'user_experience_job',
      'USER_経験職種': 'user_experience_job',
      '希望職種': 'user_desired_job',
      'USER_希望職種': 'user_desired_job',
      'USER_その他条件': 'user_other_condition',
      'パラメータ': 'parameter',
      'parameters': 'parameter',
      'parameter': 'parameter',
      'JOB_勤務地': 'job_location',
      'JOB_職種': 'job_type',
      'フリーワード': 'job_keyword',
      'JOB_フリーワード': 'job_keyword',
      'is_new': 'is_new',
      'new_flag': 'is_new',
      '新規': 'is_new',
      'is_verifying': 'is_verifying',
      'verifying_flag': 'is_verifying',
      '検証中': 'is_verifying',
      '検証中/is_verifying': 'is_verifying',
      'new_flag': 'is_new',
      '新規': 'is_new',
      '新規/is_new': 'is_new',
      '下書き': 'is_draft',
      '下書き/is_draft': 'is_draft',
      '確定済': 'is_fixed',
      '確定済/is_fixed': 'is_fixed',
      '配信終了': 'is_inactive',
      '配信終了/is_inactive': 'is_inactive',
      '自動求人特集_求人数': 'current_job_count',
      '自動求人特集_その他条件': 'auto_job_other_condition',
      '確定済': 'is_fixed',
      '配信終了': 'is_inactive',
      '配信停止': 'is_inactive',
      '削除': 'delete',
      'サイクル': 'cycle',
      'PR': 'pr',
      'ID': 'schedule_id',
      'PR ID': 'pr_id',
      'PRタイトル': 'name',
      'PR本文': 'pr_text',
      '本文': 'pr_text',
      '名称': 'name',
      'タイトル': 'name',
      '見出し': 'name',
      '紐付けID': 'pr_target_id',
      '対象ID': 'target_ids',
      'PRが入るメルマガ': 'target_ids',
      '紐付けメルマガ': 'target_ids',
      'メルマガ名': 'mail_name',
      '対象メルマガ': 'mail_name',
      '元行': 'source_row',
      '元の行': 'source_row',
      '表示順': 'target_index',
      '対象順': 'target_index'
    };
    if (map[key]) return map[key];
    if (key === getDisplayName('is_draft')) return 'is_draft';
    if (key === getDisplayName('is_fixed')) return 'is_fixed';
    if ([
      'schedule_id',
      'pr_id',
      'pr_target_id',
      'name',
      'pr_text',
      'target_ids',
      'mail_name',
      'source_row',
      'target_index',
      'delivery_count',
      'assignee',
      'reviewer',
      'notes',
      'mail_type',
      'category',
      'sub_category',
      'format',
      'weekday',
      'hour',
      'start_date',
      'end_date',
      'job_url',
      'auto_job_feature_id',
      'target_age',
      'target_address',
      'user_desired_location',
      'user_experience_job',
      'user_desired_job',
      'parameter',
      'job_location',
      'job_type',
      'job_keyword',
      'is_new',
      'is_verifying',
      'is_draft',
      'is_fixed',
      'current_job_count',
      'cycle',
      'pr',
      'is_inactive'
    ].includes(lower)) return lower;
    return key;
  }

  function getModalFieldLabel_(header, key) {
    const rawHeader = String(header == null ? '' : header).trim();
    const displayHeader = rawHeader.includes('/') ? rawHeader.split('/')[0].trim() : rawHeader;
    if (displayHeader && displayHeader !== key && !/^[a-z][a-z0-9_]*$/i.test(displayHeader)) {
      return displayHeader;
    }
    return getDisplayName(key);
  }

  function getScheduleEditHeaders_() {
    // マスタ全ヘッダーを取得し、モーダル用に整理
    return (APP_DATA.scheduleHeaders || []).filter(header => {
      const key = normalizeScheduleEditKey_(header);
      return !['source_sheet', 'source_row'].includes(key) &&
        !isDeprecatedScheduleHeader(header);
    });
  }

  function renderEditInput_(header, key, value) {
    if (['is_new', 'new_flag', '新規/is_new', 'is_verifying', 'verifying_flag', '検証中/is_verifying', 'is_draft', '下書き/is_draft', 'is_fixed', '確定済/is_fixed', 'is_inactive', '配信終了/is_inactive'].includes(key)) {
      const name = (key === 'is_verifying' || key === 'verifying_flag' || key === '検証中/is_verifying')
        ? 'is_verifying'
        : (key === 'is_draft' || key === '下書き/is_draft') ? 'is_draft'
        : (key === 'is_fixed' || key === '確定済/is_fixed') ? 'is_fixed'
        : (key === 'is_inactive' || key === '配信終了/is_inactive') ? 'is_inactive'
        : 'is_new';
      return `<input type="checkbox" name="${escapeAttribute(name)}" aria-label="${escapeAttribute(getDisplayName(name))}" ${isTruthyValue(value) ? 'checked' : ''} ${isEditModalLockedField_(name) ? 'disabled' : ''}>`;
    }
    return renderMasterFieldInput_(header, key, value, 'edit');
  }

  function getEntryFieldValue_(entry, header, key) {
    const canonical = entry && entry[key];
    if (canonical != null && String(canonical).trim() !== '') return canonical;
    const raw = entry && entry[header];
    if (raw != null && String(raw).trim() !== '') return raw;
    if (key === 'hour') return getValueByKeys(entry, ['hour', '時間', '時刻', '配信時間', 'time', 'delivery_time']);
    return canonical != null ? canonical : raw;
  }

  function renderEditModalFields_(entry) {
    const container = document.getElementById('editCoreFields');
    if (!container) return;

    const excludedKeys = new Set([
      'mail_name',
      'assignee',
      'reviewer',
      'delivery_count'
    ]);

    // Section grouping (rough)
    const sectionMap = {
      'weekday': '基本設定', 'hour': '基本設定', 'start_date': '基本設定', 'end_date': '基本設定',
      'mail_type': '基本設定', 'category': '基本設定', 'sub_category': '基本設定',
      'cycle': '基本設定', 'format': '基本設定',
      'user_age': '抽出内容', 'user_area': '抽出内容', 'user_other_condition': '抽出内容',
      'job_keyword': '抽出内容', 'is_new': '抽出内容', 'auto_job_other_condition': '抽出内容',
      'current_job_count': '抽出内容',
      'mail_content': 'メルマガ内容', 'mail_content_extract': 'メルマガ内容',
      'mail_content_free': 'メルマガ内容', 'notes': 'メルマガ内容',
      'is_verifying': 'ステータス', 'parameter': 'ステータス',
    };
    const sectionOrder = ['基本設定', '抽出内容', 'メルマガ内容', 'ステータス'];
    let lastSection = '';

    const headers = getScheduleEditHeaders_().filter(header => {
      const key = normalizeScheduleEditKey_(header);
      return !excludedKeys.has(key);
    });

    container.innerHTML = headers.map(header => {
      const key = normalizeScheduleEditKey_(header);
      const value = getEntryFieldValue_(entry, header, key);
      const isFullWidth = ['mail_content', 'mail_content_extract', 'mail_content_free', 'notes', 'user_other_condition', 'parameter', 'auto_job_other_condition', 'job_keyword'].includes(key);
      const input = renderEditInput_(header, key, value);
      if (input === '') return '';
      const jobAlert = key === 'current_job_count' && typeof getJobCountAlert === 'function'
        ? getJobCountAlert(entry)
        : null;
      const jobAlertText = jobAlert ? `<div class="job-count-alert-message">${escapeHtml(jobAlert.message)}</div>` : '';
      const section = sectionMap[key] || '';
      let sectionHeading = '';
      if (section && section !== lastSection) {
        lastSection = section;
        sectionHeading = `<div class="modal-section-head full-width">${escapeHtml(section)}</div>`;
      }
      return `
        ${sectionHeading}
        <div class="form-group ${isFullWidth ? 'full-width' : ''} ${jobAlert ? 'has-job-count-alert' : ''}" data-field="${escapeAttribute(key)}">
          <label>${escapeHtml(getModalFieldLabel_(header, key))}</label>
          ${input}
          ${jobAlertText}
        </div>
      `;
    }).join('');
  }

  function syncReviewerLock_(modalId = 'editModal') {
    const modal = document.getElementById(modalId);
    const assigneeEl = modal ? modal.querySelector('[name="setter"]') : null;
    const reviewerEl = modal ? modal.querySelector('[name="checker"]') : null;
    if (!assigneeEl || !reviewerEl) return;

    // editModal の場合のみ確定・停止ロックを考慮
    if (modalId === 'editModal') {
      const locked = CURRENT_ENTRY && (isFixed(CURRENT_ENTRY) || isStopped(CURRENT_ENTRY));
      if (locked) {
        reviewerEl.disabled = true;
        reviewerEl.required = false;
        return;
      }
    }

    const assignee = String(assigneeEl.value || '').trim();
    if (assignee === 'R') {
      reviewerEl.value = '';
      reviewerEl.disabled = true;
      reviewerEl.required = false;
    } else {
      reviewerEl.disabled = false;
      reviewerEl.required = false;
    }
    reviewerEl.removeAttribute('required');
  }

  function collectNamedFormValues(form, options = {}) {
    const values = {};
    if (!form) return values;
    const exclude = new Set(options.exclude || []);
    const includeHidden = new Set(options.includeHidden || []);
    form.querySelectorAll('[name]').forEach(input => {
      if (!input.name || exclude.has(input.name)) return;
      if (input.type === 'hidden' && input.dataset.includeValue !== 'true' && !includeHidden.has(input.name)) return;
      if (input.disabled) return;
      values[input.name] = input.type === 'checkbox' ? input.checked : input.value;
    });
    return values;
  }

  function validateRequiredFields_(root) {
    if (!root) return true;
    const invalid = root.querySelector('select[required]:not(:disabled):invalid, input[required]:not(:disabled):invalid, textarea[required]:not(:disabled):invalid');
    if (!invalid) return true;
    invalid.reportValidity();
    return false;
  }

  function normalizeMasterSubmissionPayload_(payload) {
    if (Object.prototype.hasOwnProperty.call(payload, 'setter')) {
      payload.assignee = payload.setter;
      delete payload.setter;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'checker')) {
      payload.reviewer = payload.checker;
      delete payload.checker;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.is_new ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'new_flag') && !Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.new_flag ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'is_verifying')) {
      payload.is_verifying = payload.is_verifying ? 'TRUE' : 'FALSE';
      delete payload.verifying_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'verifying_flag') && !Object.prototype.hasOwnProperty.call(payload, 'is_verifying')) {
      payload.is_verifying = payload.verifying_flag ? 'TRUE' : 'FALSE';
      delete payload.verifying_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'is_draft')) {
      payload.is_draft = payload.is_draft ? 'TRUE' : 'FALSE';
    }
    ['is_fixed', 'is_inactive'].forEach(key => {
      if (Object.prototype.hasOwnProperty.call(payload, key)) {
        payload[key] = payload[key] ? 'TRUE' : 'FALSE';
      }
    });
    return payload;
  }

  function bindEditModalInteractions_(modal) {
    if (!modal) return;
    // Compact header: name-copy click handler
    const nameCopy = modal.querySelector('#mhead-name-copy');
    if (nameCopy && !nameCopy.dataset.copyBound) {
      nameCopy.dataset.copyBound = 'true';
      nameCopy.addEventListener('click', () => {
        const mailNameInput = modal.querySelector('[name="mail_name"]');
        const text = mailNameInput ? mailNameInput.value : (modal.querySelector('#mhead-mail-name') || {}).textContent || '';
        if (typeof copyTextToClipboard_ === 'function') {
          copyTextToClipboard_(text);
        } else {
          navigator.clipboard.writeText(text).catch(() => {});
        }
        nameCopy.classList.add('copied');
        setTimeout(() => nameCopy.classList.remove('copied'), 1800);
      });
    }
    bindCycleButtons_(modal);
    bindChangeField_(modal, '[name="setter"]', () => {
      syncReviewerLock_('editModal');
      updateEditChangeHighlights_(modal);
    });
    ['mail_type', 'category', 'sub_category', 'cycle'].forEach(name => {
      bindChangeField_(modal, `[name="${name}"]`, () => {
        applyValidationCycleControls_(modal);
        applyCycleInputControlMatrix_(modal);
        syncSingleDeliveryEndDate_(modal);
      });
    });
    bindEditChangeHighlights_(modal);
    bindSingleDeliveryDateSync_(modal);
    syncReviewerLock_('editModal');
  }

  function bindCycleButtons_(root) {
    if (!root || root.dataset.cycleButtonsBound === 'true') return;
    root.dataset.cycleButtonsBound = 'true';
    root.addEventListener('click', event => {
      const button = event.target.closest('.cycle-option-button');
      if (!button || !root.contains(button) || button.disabled) return;
      const group = button.closest('.form-group');
      const input = group ? group.querySelector('[name="cycle"]') : root.querySelector('[name="cycle"]');
      if (!input) return;
      input.value = button.dataset.cycleValue || '';
      (group || root).querySelectorAll('.cycle-option-button').forEach(item => {
        item.classList.toggle('active', item === button);
      });
      input.dispatchEvent(new Event('change', { bubbles: true }));
    });
  }

  function getEditComparisonKey_(name) {
    if (name === 'setter') return 'assignee';
    if (name === 'checker') return 'reviewer';
    if (name === 'new_flag') return 'is_new';
    if (name === 'verifying_flag' || name === '検証中/is_verifying' || name === '検証中') return 'is_verifying';
    if (name === '新規/is_new' || name === '新規') return 'is_new';
    if (name === '下書き/is_draft' || name === '下書き') return 'is_draft';
    if (name === '確定済/is_fixed' || name === '確定済') return 'is_fixed';
    if (name === '配信終了/is_inactive' || name === '配信終了') return 'is_inactive';
    return name;
  }

  function normalizeComparableModalValue_(value, key) {
    if (['is_new', 'is_verifying', 'is_draft', 'is_fixed', 'is_inactive'].includes(key)) return isTruthyValue(value) ? 'TRUE' : 'FALSE';
    if (key === 'hour') return normalizeMasterHourValue(value);
    if (key === 'weekday') return normalizeWeekdayLabel(value);
    if (key === 'start_date' || key === 'end_date' || key === 'delivery_date' || key === 'original_date') {
      return normalizeDateString(value);
    }
    return String(value == null ? '' : value);
  }

  function isAdminMasterReady_() {
    return Array.isArray(APP_DATA.adminMaster) && APP_DATA.adminMaster.length > 0;
  }

  function resolvePersonFieldComparableValue_(value) {
    const text = normalizePersonDisplayValue_(value);
    if (!text) return '';
    const options = typeof getAdminOptionValues === 'function' ? getAdminOptionValues() : [];
    for (const option of options) {
      const optValue = String(option && option.value || '').trim();
      const optLabel = String(option && option.label || '').trim();
      if (!optValue) continue;
      if (optValue === text || optLabel === text) return optValue;
      const labelMatch = optLabel.match(/^(.+?)\s*\((.+)\)\s*$/);
      if (labelMatch) {
        const abbrev = labelMatch[1].trim();
        const fullName = labelMatch[2].trim();
        if (text === abbrev || text === fullName) return optValue;
      }
    }
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    for (const row of rows) {
      const initial = String(row.initial || getValueByKeys(row, ['initial', '略称', 'abbreviation', 'Abbreviation']) || '').trim();
      const fullName = String(row.full_name || row.fullName || row.name || getValueByKeys(row, ['full_name', 'fullName', 'name', '氏名', '名前']) || '').trim();
      if (initial && (text === initial || text === fullName)) return initial;
      if (fullName && text === fullName && initial) return initial;
    }
    return text;
  }

  function getEntryFieldComparableValue_(entry, key) {
    if (!entry) return normalizeComparableModalValue_('', key);
    if (key === 'assignee') {
      return normalizeComparableModalValue_(
        resolvePersonFieldComparableValue_(getValueByKeys(entry, ['assignee', 'setter', '設定者'])),
        key
      );
    }
    if (key === 'reviewer') {
      return normalizeComparableModalValue_(
        resolvePersonFieldComparableValue_(getValueByKeys(entry, ['reviewer', 'checker', '確認者'])),
        key
      );
    }
    let value = entry[key];
    if (String(value == null ? '' : value).trim() === '') {
      const aliasMap = getModalFieldAliases_('editModal');
      Object.keys(aliasMap).some(fieldName => {
        if (getEditComparisonKey_(fieldName) !== key) return false;
        const fromAlias = getValueByKeys(entry, aliasMap[fieldName]);
        if (fromAlias === '') return false;
        value = fromAlias;
        return true;
      });
    }
    return normalizeComparableModalValue_(value, key);
  }

  function getFieldCurrentComparableValue_(field, key) {
    const raw = field.type === 'checkbox' ? field.checked : field.value;
    if (key === 'assignee' || key === 'reviewer') {
      return normalizeComparableModalValue_(resolvePersonFieldComparableValue_(raw), key);
    }
    return normalizeComparableModalValue_(raw, key);
  }

  function getBaseComparableValue_(key) {
    return getEntryFieldComparableValue_(CURRENT_ENTRY_BASE || CURRENT_ENTRY, key);
  }

  function updateEditFieldHighlight_(field) {
    if (!field || !field.name) return;
    const key = getEditComparisonKey_(field.name);
    const group = field.closest('.form-group');
    if (!group) return;
    if ((key === 'assignee' || key === 'reviewer') && !isAdminMasterReady_()) {
      group.classList.remove('is-overridden');
      const pending = group.querySelector('.previous-value');
      if (pending) pending.remove();
      return;
    }
    const changed = getFieldCurrentComparableValue_(field, key) !== getBaseComparableValue_(key);
    group.classList.toggle('is-overridden', changed);

    let prevEl = group.querySelector('.previous-value');
    if (changed) {
      const baseVal = getBaseComparableValue_(key);
      if (!prevEl) {
        prevEl = document.createElement('span');
        prevEl.className = 'previous-value';
        group.appendChild(prevEl);
      }
      prevEl.textContent = '変更前: ' + (baseVal || '（空）');
    } else if (prevEl) {
      prevEl.remove();
    }
  }

  function updateEditChangeHighlights_(modal) {
    if (!modal) return;
    modal.querySelectorAll('.form-group.is-overridden').forEach(group => group.classList.remove('is-overridden'));
    modal.querySelectorAll('input[name], select[name], textarea[name]').forEach(updateEditFieldHighlight_);
  }

  function bindEditChangeHighlights_(modal) {
    if (!modal) return;
    modal.querySelectorAll('input[name], select[name], textarea[name]').forEach(field => {
      if (field.dataset.changeHighlightBound === 'true') return;
      field.dataset.changeHighlightBound = 'true';
      ['input', 'change'].forEach(type => {
        field.addEventListener(type, () => updateEditFieldHighlight_(field));
      });
    });
  }

  function bindCopyField_(root, selector) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.copyBound) return;
    field.dataset.copyBound = 'true';
    field.addEventListener('click', () => copyTextToClipboard_(field.value));
  }

  function bindChangeField_(root, selector, handler) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.changeBound) return;
    field.dataset.changeBound = 'true';
    field.addEventListener('change', handler);
  }

  function isSingleCycleValue_(value) {
    return normalizeCycleLabel(value) === '単発';
  }

  function syncSingleDeliveryEndDate_(modal) {
    if (!modal) return;
    const cycleInput = modal.querySelector('[name="cycle"]');
    const startInput = modal.querySelector('[name="start_date"]');
    const endInput = modal.querySelector('[name="end_date"]');
    if (!cycleInput || !startInput || !endInput) return;
    if (isMonthEndCycleValue_(cycleInput.value) && modal.dataset.mode === 'master') {
      const range = getMonthEndDeliveryWindow_(startInput.value || endInput.value || formatDate(new Date()));
      if (range) {
        startInput.value = range.start;
        endInput.value = range.end;
      }
    }
    const isSingle = isSingleCycleValue_(cycleInput.value);
    if (isSingle && startInput.value) endInput.value = startInput.value;
    const isMonthEnd = isMonthEndCycleValue_(cycleInput.value) && modal.dataset.mode === 'master';
    [startInput, endInput].forEach(input => {
      const locked = isMonthEnd || (input === endInput && isSingle);
      input.readOnly = locked;
      input.disabled = false;
      input.closest('.form-group')?.classList.toggle('disabled', locked);
    });
  }

  function isMonthEndCycleValue_(value) {
    const text = normalizeCycleLabel(value);
    return text === '月末' || text === '月末配信' || text === '月末増発';
  }

  function getMonthEndDeliveryWindow_(dateValue) {
    const baseDate = normalizeDateString(dateValue) || formatDate(new Date());
    const date = new Date(`${baseDate}T00:00:00`);
    if (Number.isNaN(date.getTime())) return null;
    const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    const start = new Date(monthEnd);
    start.setDate(monthEnd.getDate() - 7);
    return {
      start: formatDate(start),
      end: formatDate(monthEnd)
    };
  }

  function bindSingleDeliveryDateSync_(modal) {
    if (!modal) return;
    ['cycle', 'start_date'].forEach(name => {
      const field = modal.querySelector(`[name="${name}"]`);
      if (!field || field.dataset.singleSyncBound === 'true') return;
      field.dataset.singleSyncBound = 'true';
      field.addEventListener('change', () => {
        applyCycleInputControlMatrix_(modal);
        syncSingleDeliveryEndDate_(modal);
      });
    });
    syncSingleDeliveryEndDate_(modal);
  }

  function applySingleDeliveryPayloadRule_(payload) {
    if (!payload || !isSingleCycleValue_(payload.cycle)) return;
    const startDate = normalizeDateString(payload.start_date);
    if (startDate) payload.end_date = startDate;
  }

  function saveMasterEdit(options = {}) {
    const asDraft = !!(options && options.draft);
    const modal = document.getElementById('masterModal');
    if (!asDraft && !validateRequiredFields_(modal)) return;

    const btn = modal ? modal.querySelector(asDraft ? '[data-action="save-master-draft"]' : '[data-action="save-master-edit"]') : null;
    if (btn) btn.disabled = true;
    if (btn) btn.textContent = '保存中...';
    showBusy('マスタを保存中...');
    const handlePreSaveFailure = err => {
      alert('未保存の設定・確認状態を一括保存できなかったため、マスタ保存を中止しました: ' + (err.message || String(err)));
      if (btn) btn.disabled = false;
      if (btn) btn.textContent = '保存';
      hideBusy();
    };

    const payload = normalizeMasterSubmissionPayload_(
      Object.assign(
        { __rowNumber: document.getElementById('master-row-number').value },
        collectNamedFormValues(document.getElementById('masterModal'))
      )
    );
    payload.format = document.getElementById('masterModal').dataset.format || 'フリー';
    if (asDraft) {
      payload.is_draft = 'TRUE';
    } else if (!Object.prototype.hasOwnProperty.call(payload, 'is_draft')) {
      payload.is_draft = 'FALSE';
    }
    applySingleDeliveryPayloadRule_(payload);

    // PR管理の場合のみ、target_ids (PRが入るメルマガ) を取得して savePRData を呼ぶ
    if (MASTER_DATA.sheetName === 'app_pr') {
      const selectedNewsletters = [];
      document.querySelectorAll('#newsletterList input[type="checkbox"]:checked').forEach(cb => {
        selectedNewsletters.push({ mail_name: cb.dataset.targetName });
      });
      payload.target_ids = selectedNewsletters.map(n => n.mail_name).join(',');

      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData({ force: true, includeStatic: true });
            if (btn) btn.disabled = false;
            if (btn) btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            if (btn) btn.disabled = false;
            if (btn) btn.textContent = '保存';
            hideBusy();
          })
          .savePRData(payload, selectedNewsletters);
      }, handlePreSaveFailure);
    } else {
      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData({ force: true, includeStatic: true });
            if (btn) btn.disabled = false;
            if (btn) btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            if (btn) btn.disabled = false;
            if (btn) btn.textContent = '保存';
            hideBusy();
          })
          .saveMasterData(MASTER_DATA.sheetName, payload);
      }, handlePreSaveFailure);
    }
  }

  function deleteMasterRow(rowNumber) {
    const message = '本当に削除しますか？\nシートからこの行を完全に削除します。停止とは異なりデータそのものが消え、カレンダーからも即座に非表示になります。\nこの操作は取り消せません。';
    if (!rowNumber || !confirm(message)) return;

    showBusy('削除中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        closeMasterModal();
        loadActiveMaster();
        loadData({ force: true, includeStatic: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('削除に失敗しました: ' + (err.message || err));
      })
      .deleteMasterData(MASTER_DATA.sheetName, rowNumber);
  }

  function getCurrentMasterRowNumber_() {
    const input = document.getElementById('master-row-number');
    return input ? input.value : '';
  }

  function deleteCurrentMasterRow() {
    deleteMasterRow(getCurrentMasterRowNumber_());
  }

  function closeModal() {
    const modal = document.getElementById('editModal');
    setModalVisible_(modal, false);
  }

  function getPersonFieldValueFromEntry_(entry, field) {
    if (!entry) return '';
    const aliases = field === 'assignee'
      ? ['assignee', 'setter', '設定者']
      : ['reviewer', 'checker', '確認者'];
    return normalizePersonDisplayValue_(getValueByKeys(entry, aliases));
  }

  function syncEditModalPersonFields_(modal) {
    if (!modal) return;
    const master = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    const entry = CURRENT_ENTRY || master;
    const assignee = getPersonFieldValueFromEntry_(entry, 'assignee') || getPersonFieldValueFromEntry_(master, 'assignee');
    const reviewer = getPersonFieldValueFromEntry_(entry, 'reviewer') || getPersonFieldValueFromEntry_(master, 'reviewer');
    const setterEl = modal.querySelector('[name="setter"]');
    const checkerEl = modal.querySelector('[name="checker"]');
    if (setterEl) setterEl.dataset.pendingValue = assignee;
    if (checkerEl) checkerEl.dataset.pendingValue = reviewer;
    refreshAdminSelects_();
    if (typeof syncReviewerLock_ === 'function') syncReviewerLock_();
  }

  function scheduleEditModalHighlights_(modal) {
    if (!modal) return;
    const run = () => {
      syncEditModalPersonFields_(modal);
      updateEditChangeHighlights_(modal);
    };
    if (isAdminMasterReady_()) {
      setTimeout(run, 0);
      return;
    }
    let attempts = 0;
    const timer = setInterval(() => {
      attempts += 1;
      if (isAdminMasterReady_() || attempts > 40) {
        clearInterval(timer);
        run();
      }
    }, 50);
  }

  function renderEditModalPrDetails_(entry) {
    const prContainer = document.getElementById('edit-pr-details');
    if (!prContainer || !entry) { if (prContainer) prContainer.innerHTML = ''; return; }
    const prDetails = typeof getPrRecordsForSchedule === 'function' ? getPrRecordsForSchedule(entry) : [];
    const targetDate = normalizeDateString(entry.target_date || entry.delivery_date || entry.original_date);
    const prStatesForModal = prDetails
      .map(pr => ({
        record: pr,
        state: typeof getPrState === 'function' ? getPrState(pr, targetDate) : null
      }))
      .filter(item => item.state);
    if (prStatesForModal.length === 0) {
      prContainer.innerHTML = '';
      return;
    }
    const statusDotColor = { active: 'var(--pink)', start: 'var(--ok)', end: 'var(--ui-border-strong)' };
    const statusRowClass = { active: 'pr-active', start: 'pr-start', end: '' };
    const statusTagClass = { active: 'pt-active', start: 'pt-start', end: '' };
    const rows = prStatesForModal.map(item => {
      const pr = item.record;
      const prState = item.state;
      const title = `PR${escapeHtml(String(pr.pr_id || ''))} ${escapeHtml(pr.pr_title || '(タイトルなし)')}`;
      const dotColor = statusDotColor[prState.status] || 'var(--ui-border-strong)';
      const rowCls = statusRowClass[prState.status] || '';
      const tagCls = statusTagClass[prState.status] || '';
      const nameColor = prState.status === 'active' ? 'pink' : prState.status === 'start' ? 'green' : '';
      const endDate = pr.end_date ? String(pr.end_date).replace(/-/g, '/') : '';
      const startDate = pr.start_date ? String(pr.start_date).replace(/-/g, '/') : '';
      const dateStr = startDate && endDate ? `${startDate}〜${endDate}` : (endDate ? `〜${endDate}` : startDate);
      return `<div class="pr-row ${rowCls}">
        <div class="pr-dot" style="background:${dotColor};"></div>
        <span class="pr-row-name ${nameColor}">${title}</span>
        ${dateStr ? `<span class="pr-row-date">${escapeHtml(dateStr)}</span>` : ''}
        ${prState.label ? `<span class="pr-row-tag ${tagCls}">${escapeHtml(prState.label)}</span>` : ''}
      </div>`;
    }).join('');
    prContainer.innerHTML = `<div class="pr-rows">${rows}</div>`;
  }

  function finalizeEditModalContent_(modal) {
    if (!modal || !CURRENT_ENTRY) return;
    syncEditModalPersonFields_(modal);
    const editCoreFields = modal.querySelector('#editCoreFields');
    if (editCoreFields) renderEditModalFields_(CURRENT_ENTRY);
    const currentFormat = CURRENT_ENTRY.format || 'フリー';
    window.openAndInitModalWithTab(currentFormat, 'editModal');
    bindEditChangeHighlights_(modal);
    scheduleEditModalHighlights_(modal);
    renderEditModalPrDetails_(CURRENT_ENTRY);
  }

  function openModal(encodedEntry) {
    const entry = JSON.parse(decodeURIComponent(encodedEntry));
    const targetScheduleId = normalizeIdKey(getValueByKeys(entry, ['schedule_id', 'ID', 'id']));
    const scheduleRow = (APP_DATA.schedule || []).find(row => {
      const rowScheduleId = normalizeIdKey(getValueByKeys(row, ['schedule_id', 'ID', 'id']));
      return rowScheduleId && rowScheduleId === targetScheduleId;
    });
    const baseEntry = scheduleRow ? Object.assign({}, scheduleRow) : Object.assign({}, entry);
    baseEntry.target_date = entry.target_date;
    if (entry.original_date) baseEntry.original_date = entry.original_date;
    if (entry.source_row) baseEntry.source_row = entry.source_row;
    const masterHour = getValueByKeys(scheduleRow || {}, ['hour', '時間', '時刻', '配信時間', 'time', 'delivery_time']);
    if (masterHour !== '') {
      baseEntry.hour = masterHour;
    }
    const masterAssignee = getValueByKeys(scheduleRow || entry, ['assignee', '設定者', 'setter']);
    const masterReviewer = getValueByKeys(scheduleRow || entry, ['reviewer', '確認者', 'checker']);
    if (masterAssignee !== '') baseEntry.assignee = masterAssignee;
    if (masterReviewer !== '') baseEntry.reviewer = masterReviewer;

    CURRENT_ENTRY_BASE = baseEntry;
    const movedEntry = applyMoveOverrideToEntry(Object.assign({}, baseEntry));
    CURRENT_ENTRY = applyOccurrenceOverrideObjectToEntry(
      applyOccurrenceOverrideToEntry(movedEntry),
      getOccurrenceOverrideForDate(movedEntry, movedEntry.target_date)
    );

    const modal = document.getElementById('editModal');
    if (!modal) return;
    modal.dataset.mode = 'edit';

    populateModalFields(modal, CURRENT_ENTRY, getModalFieldAliases_('editModal'));
    // Sync hidden mail_name input to compact header display
    const hiddenMailName = modal.querySelector('#edit-mail-name');
    if (hiddenMailName) hiddenMailName.value = CURRENT_ENTRY.mail_name || '';
    const mheadMailName = modal.querySelector('#mhead-mail-name');
    if (mheadMailName) mheadMailName.textContent = CURRENT_ENTRY.mail_name || '';
    const mheadDelivery = modal.querySelector('#mhead-delivery-count');
    if (mheadDelivery) mheadDelivery.textContent = CURRENT_ENTRY.delivery_count || '—';
    const mheadIdTime = modal.querySelector('#mhead-id-time');
    if (mheadIdTime) {
      const sid = CURRENT_ENTRY.schedule_id || '';
      const hr = CURRENT_ENTRY.hour || '';
      mheadIdTime.textContent = [sid ? `#${sid}` : '', hr].filter(Boolean).join(' · ');
    }
    refreshAdminSelects_();
    setEditState(isFixed(CURRENT_ENTRY), isStopped(CURRENT_ENTRY));
    modal.classList.remove('is-locked-edit');
    const _btnSave = document.getElementById('btnModalSave');
    const _btnClose = document.getElementById('btnModalClose');
    if (_btnSave) _btnSave.style.display = '';
    if (_btnClose) _btnClose.style.display = 'none';
    applySettingLock_(modal);
    initEditModalCheckButtons_();

    const editCoreFields = modal.querySelector('#editCoreFields');
    if (editCoreFields) editCoreFields.innerHTML = '<div class="empty-state">項目を読み込み中...</div>';
    const prContainer = modal.querySelector('#edit-pr-details');
    if (prContainer) prContainer.innerHTML = '<div class="empty-state">読み込み中...</div>';

    setModalVisible_(modal, true);

    bindEditModalInteractions_(modal);
    bindSingleDeliveryDateSync_(modal);
    loadCommentsForCurrentEntry();

    requestAnimationFrame(() => finalizeEditModalContent_(modal));
  }

  // モーダルごとのタブ初期化（イベントリスナー登録）
  function initModalTabs(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        if (this.dataset.locked === 'true') return;
        setModalFormatState(modal, this.dataset.format);
      });
    });

    bindFormatSelects_(modal);
  }

  function bindFormatSelects_(modal) {
    if (!modal) return;
    modal.querySelectorAll('select[name="format"]').forEach(select => {
      if (select.dataset.formatBound === 'true') return;
      select.dataset.formatBound = 'true';
      select.addEventListener('change', event => {
        setModalFormatState(modal, event.target.value);
      });
    });

  function isModalFormatLocked_(modal) {

  function setModalFormatTabLockState(modal, locked) {

      tab.dataset.locked = locked ? 'true' : 'false';
      tab.setAttribute('aria-disabled', locked ? 'true' : 'false');

      tab.classList.toggle('is-locked', locked);
    });
  }

  function setModalFormatState(modal, format) {
    if (!modal) return;
    const nextFormat = String(format || 'フリー');
    modal.dataset.format = nextFormat;
    setModalFormatTabLockState(modal, isModalFormatLocked_(modal));
    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.format === nextFormat);
    });
    modal.querySelectorAll('[name="format"]').forEach(input => {

  function resetModalFieldStates_(modal) {
    modal.querySelectorAll('.form-group').forEach(group => {

  function setFieldGroupEnabled_(modal, key, enabled) {
    const group = modal.querySelector(`[data-field="${key}"]`);

  function setFieldGroupControlState_(modal, key, state) {
    const group = modal.querySelector(`[data-field="${key}"]`);
    if (!group) return;

    const hidden = normalizedState.indexOf('非表示') === 0;
    const locked = normalizedState.indexOf('ロック') === 0;
    group.hidden = hidden;
    group.style.display = hidden ? 'none' : '';
    group.classList.toggle('disabled', hidden || locked);
    group.querySelectorAll('input, select, textarea, button').forEach(input => {

  function getInputControlFormatKey_(format) {
    const text = String(format || '').trim();
    if (text === '自動求人特集') return 'auto';
    if (text === '抽出') return 'extract';
    if (text === 'その他') return 'other';
    return 'free';
  }

  function getInputControlModalKey_(modal) {
    if (!modal) return '';
    if (modal.dataset.modalType === 'pr-master' && modal.dataset.mode === 'edit') return 'prMasterEdit';
    if (modal.dataset.modalType === 'pr-master') return 'prMasterNew';
    if (modal.id === 'editModal') return 'deliveryEdit';

  function getInputControlHiddenKeys_(modalKey, formatKey) {
    const hidden = new Set();
    const autoJobKeys = ['auto_job_feature_id', 'job_url', 'current_job_count', 'auto_job_other_condition'];
    const jobKeys = ['job_location', 'job_type', 'job_keyword'];

    if (formatKey === 'free') hidden.add('mail_content_extract');

    if (formatKey === 'free' || formatKey === 'extract') autoJobKeys.forEach(key => hidden.add(key));
    if (formatKey === 'auto') jobKeys.forEach(key => hidden.add(key));

    // is_fixed・is_inactive・is_draft はボタン/外部フローで管理するため、全モーダルでフォーム入力欄を非表示
    ['is_fixed', 'is_inactive', 'is_draft'].forEach(key => hidden.add(key));

    if (modalKey === 'masterNew') hidden.add('format');

  function getInputControlSectionRows_(sectionKeyword) {
    const rows = Array.isArray(APP_DATA.inputControls) ? APP_DATA.inputControls : [];
    const keyword = String(sectionKeyword || '').trim();
    if (!keyword) return rows;
    return rows.filter(row => {
      const section = String(row && row.__section ? row.__section : '').trim();
      return !section || section.includes(keyword);
    });

  function normalizeInputControlState_(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    if (text.indexOf('非表示') === 0 || ['hidden', 'hide', 'none'].includes(text)) return '非表示';
    if (text.indexOf('ロック') === 0 || ['lock', 'locked', 'readonly', '不可', '編集不可'].includes(text)) return 'ロック';
    if (text.indexOf('表示') === 0 || ['show', 'editable', '可', '編集可'].includes(text)) return '表示';

    return match ? String(row[match] == null ? '' : row[match]).trim() : '';

    };

    for (const row of rows) {
      const rowKey = normalizeScheduleEditKey_(getInputControlValueByAliases_(row, keyAliases));

      const rowModal = getRowProp_(row, 'モーダル') || getRowProp_(row, '画面');
      const rowFormat = getInputControlValueByAliases_(row, formatAliases);
      const modalMatches = !rowModal || modalLabels.some(label => rowModal.includes(label));
      const formatMatches = !rowFormat || formatLabels.some(label => rowFormat.includes(label));
      if (modalMatches && formatMatches) {
        const labels = Array.from(new Set([].concat(keyLabels[key] || [], [getDisplayName(key), key]).filter(Boolean)));
        for (const label of labels) {
          const state = normalizeInputControlState_(getRowProp_(row, label));
          if (state) return state;
        }
      }
      if (modalMatches && formatMatches) {
        const directState = normalizeInputControlState_(getInputControlValueByAliases_(row, stateAliases));
        if (directState) return directState;
      }
      for (const modalLabel of modalLabels) {
        for (const formatLabel of formatLabels) {
          for (const candidateKey of [`${modalLabel}_${formatLabel}`, `${modalLabel}:${formatLabel}`, `${modalLabel}/${formatLabel}`, `${modalLabel}${formatLabel}`]) {
            const state = normalizeInputControlState_(getRowProp_(row, candidateKey));
            if (state) return state;
          }
        }
      }
      for (const candidateKey of formatLabels.concat(modalLabels)) {
        const state = normalizeInputControlState_(getRowProp_(row, candidateKey));
        if (state) return state;
      }

    return '';

  function applyNormalizedInputControlState_(modal, key, state) {
    const group = modal.querySelector(`[data-field="${key}"]`);
    if (!group) return;
    const text = String(state || '').trim();
    if (!text) return;
    const visible = text.indexOf('表示') === 0 || ['show', 'editable', '可', '編集可'].includes(text);
    const hidden = text.indexOf('非表示') === 0 || ['hidden', 'hide', 'none'].includes(text);
    const locked = text.indexOf('ロック') === 0 || ['ロック', 'locked', 'lock', 'readonly', '不可', '編集不可'].includes(text);
    if (!visible && !hidden && !locked) return;
    group.hidden = hidden;
    group.style.display = hidden ? 'none' : '';
    group.classList.toggle('disabled', hidden || locked);
    group.querySelectorAll('input, select, textarea, button').forEach(input => {
      input.disabled = hidden || locked;
      if ('readOnly' in input) input.readOnly = locked;
    });
  }

  function getInputControlCycleStateFromSheet_(key, modalKey, cycleValue) {
    const rows = getInputControlSectionRows_('サイクル別');
    if (!rows.length || !cycleValue) return '';
    const normalize = value => String(value == null ? '' : value).trim();
    const modalLabels = {
      masterNew: ['masterNew', 'マスタ新規', 'マスタ新規追加モーダル'],
      masterEdit: ['masterEdit', 'マスタ編集', 'マスタ編集モーダル'],
      deliveryEdit: ['deliveryEdit', '配信編集', '配信編集モーダル']
    }[modalKey] || [modalKey];
    const cycleAliases = ['サイクル', 'cycle'];
    const keyLabels = {
      weekday: ['曜日', 'weekday'],
      hour: ['時間', 'hour'],
      start_date: ['開始日', '開始', 'start_date'],
      end_date: ['終了日', '終了', 'end_date']
    };
    const normalizedCycle = normalize(cycleValue);
    for (const row of rows) {
      const rowCycle = getInputControlValueByAliases_(row, cycleAliases);
      if (!rowCycle || rowCycle !== normalizedCycle) continue;
      // シートは「画面」列と「モーダル」列が別々のため、「モーダル」列を優先して照合する
      const rowModal = getRowProp_(row, 'モーダル') || getRowProp_(row, '画面');
      if (rowModal && !modalLabels.some(label => rowModal.includes(label))) continue;
      for (const label of (keyLabels[key] || [key])) {
        const state = normalizeInputControlState_(getRowProp_(row, label));
        if (state) return state;
      }
    }
    return '';
  }

  function applyCycleInputControlMatrix_(modal) {
    if (!modal || modal.dataset.modalType === 'pr-master') return;
    const modalKey = getInputControlModalKey_(modal);
    const cycleField = modal.querySelector('[name="cycle"]');
    const cycleValue = cycleField ? cycleField.value : '';
    ['weekday', 'hour', 'start_date', 'end_date'].forEach(key => {
      const state = getInputControlCycleStateFromSheet_(key, modalKey, cycleValue);
      if (state) applyNormalizedInputControlState_(modal, key, state);
    });
  }

  function applyInputControlMatrix_(modal, format) {
    if (!modal) {
      return;
    }

    if (modal.id === 'editModal') {
      const staticFieldMap = {
        mail_name: '[name="mail_name"]',
        assignee: '[name="setter"]',
        reviewer: '[name="checker"]'
      };
      Object.keys(staticFieldMap).forEach(key => {
        const field = modal.querySelector(staticFieldMap[key]);
        const group = field ? field.closest('.form-group') : null;
        if (group) group.dataset.field = key;
      });
    }

    const modalKey = getInputControlModalKey_(modal);
    const formatKey = getInputControlFormatKey_(format);
    const hiddenKeys = getInputControlHiddenKeys_(modalKey, formatKey);
    const lockedKeys = new Set(['schedule_id']);

    if (modalKey === 'deliveryEdit') {
      // シート「入力制御」の配信編集モーダル行に従い、全フォーマットでロック
      ['start_date', 'end_date', 'mail_name', 'mail_type', 'cycle', 'format', 'sub_category', 'is_new', 'weekday', 'is_verifying'].forEach(key => lockedKeys.add(key));
    }
    if (formatKey === 'auto') lockedKeys.add('current_job_count');

    modal.querySelectorAll('.form-group[data-field]').forEach(group => {
      const key = String(group.dataset.field || '').trim();
      if (hiddenKeys.has(key)) {
        setFieldGroupControlState_(modal, key, '非表示');
      } else if (lockedKeys.has(key)) {
        setFieldGroupControlState_(modal, key, 'ロック');
      } else {
        setFieldGroupControlState_(modal, key, '表示');
      }
      const sheetState = getInputControlStateFromSheet_(key, modalKey, formatKey);
      if (sheetState) applyNormalizedInputControlState_(modal, key, sheetState);
    });
  }

  function applyAutoJobFieldControls_(modal, isAutoJob) {
    const shouldEnable = isAutoJob || String(modal.dataset.format || '').trim() === 'その他';
    AUTO_JOB_CONTROL_FIELDS.forEach(key => {
      setFieldGroupEnabled_(modal, key, shouldEnable);
    });
  }

  function applyEditModalLockedFieldControls_(modal) {
    EDIT_MODAL_LOCKED_FIELDS.forEach(key => {
      setFieldGroupEnabled_(modal, key, false);
    });
  }

  function applyCurrentJobCountControls_(modal, isAutoJob) {
    const currentJobCountGroup = modal.querySelector('[data-field="current_job_count"]');
    const currentJobCountInput = currentJobCountGroup ? currentJobCountGroup.querySelector('input, select, textarea') : null;
    if (!currentJobCountInput || !currentJobCountGroup) return;
    if (!isAutoJob) return;
    currentJobCountInput.disabled = true;
    currentJobCountInput.readOnly = true;
    currentJobCountInput.placeholder = isAutoJob
      ? '保存後にURLから自動取得されます'
      : '保存後に自動取得されます';
    currentJobCountGroup.classList.add('disabled');
  }

  function applyValidationCycleControls_(modal) {
    const cycleInput = modal.querySelector('[name="cycle"]');
    if (!cycleInput) return;

    const categoryText = [
      getModalFieldValue_(modal, ['mail_type', 'category']),
      getModalFieldValue_(modal, ['sub_category'])
    ].join(' ');
    const isValidation = categoryText.includes('検証');
    cycleInput.required = false;
    cycleInput.removeAttribute('required');
    cycleInput.closest('.form-group')?.classList.toggle('optional-field', isValidation);
  }

  function getModalFieldValue_(modal, names) {
    for (const name of names) {
      const field = modal.querySelector(`[name="${name}"]`);
      if (field && String(field.value || '').trim()) return String(field.value || '').trim();
    }
    return '';
  }

  function applyPrMasterControls_(modal) {
    if (modal.dataset.modalType !== 'pr-master') return;
    const prIdInput = modal.querySelector('[name="pr_id"]');
    if (!prIdInput) return;
    prIdInput.readOnly = true;
    prIdInput.disabled = true;
    prIdInput.placeholder = '保存時に自動採番';
  }

  // 形式ごとの入力制御
  function applyDynamicInputControl(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    const normalizedFormat = String(format || '').trim();
    const isAutoJob = normalizedFormat === '自動求人特集';
    resetModalFieldStates_(modal);
    applyInputControlMatrix_(modal, normalizedFormat);
    applyAutoJobFieldControls_(modal, isAutoJob);

    if (modalId === 'editModal') {
      applyEditModalLockedFieldControls_(modal);
    }

    applyCurrentJobCountControls_(modal, isAutoJob);
    applyValidationCycleControls_(modal);
    applyCycleInputControlMatrix_(modal);
    applyPrMasterControls_(modal);
    syncSingleDeliveryEndDate_(modal);
    if (typeof syncReviewerLock_ === 'function') syncReviewerLock_();
    if (modalId === 'editModal') updateEditChangeHighlights_(modal);
  }

  function openAndInitModalWithTab(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    setModalFormatState(modal, format);
  }
  async function saveEdit() {
    if (CURRENT_ENTRY && isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は編集できません');
      return;
    }
    if (CURRENT_ENTRY && isStopped(CURRENT_ENTRY)) {
      alert('配信停止中の配信は編集できません。再開してから編集してください。');
      return;
    }

    const modal = document.getElementById('editModal');
    if (!validateRequiredFields_(modal)) return;

    const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    const occurrenceDate = CURRENT_ENTRY.original_date || CURRENT_ENTRY.target_date;
    const itemId = [
      CURRENT_ENTRY.schedule_id,
      occurrenceDate
    ].map(value => String(value || '').trim().replace(/\s+/g, ' ')).join('|');

    const nextValues = normalizeMasterSubmissionPayload_(
      collectNamedFormValues(modal, { exclude: ['schedule_id', 'current_job_count'] })
    );

    if (String(nextValues.assignee || '').trim() === 'R') {
      nextValues.reviewer = '';
    }

    const overrideFields = [];
    const nextWeekday = Object.prototype.hasOwnProperty.call(nextValues, 'weekday')
      ? nextValues.weekday
      : CURRENT_ENTRY.weekday;
    // 移動済み発生分の場合も正しい週から日付を計算するため、target_date（移動後の日付）を基準にする
    const nextDeliveryDate = nextWeekday
      ? getDateForWeekdayInCalendarWeek(CURRENT_ENTRY.target_date, nextWeekday)
      : CURRENT_ENTRY.target_date;
    const nextHour = Object.prototype.hasOwnProperty.call(nextValues, 'hour')
      ? nextValues.hour
      : CURRENT_ENTRY.hour;

    const payload = {
      item_id: itemId,
      schedule_id: CURRENT_ENTRY.schedule_id,
      original_date: occurrenceDate,
      delivery_date: nextDeliveryDate || CURRENT_ENTRY.target_date,
      hour: nextHour,
      weekday: nextWeekday || getWeekdayLabelForDateString(nextDeliveryDate),
      mail_name: CURRENT_ENTRY.mail_name
    };

    Object.keys(nextValues).forEach(key => {
      const next = getEntryFieldComparableValue_(nextValues, key);
      const prev = getEntryFieldComparableValue_(base, key);
      if (next !== prev) {
        overrideFields.push(key);
        payload[key] = nextValues[key];
      }
    });
    payload.override_fields = overrideFields.join(',');
    // 移動済み発生分は移動日を start_date/end_date として記録（単発扱い、マスタは変更しない）
    if (CURRENT_ENTRY.original_date && CURRENT_ENTRY.original_date !== CURRENT_ENTRY.target_date) {
      const movedDate = CURRENT_ENTRY.target_date;
      if (!overrideFields.includes('start_date')) { overrideFields.push('start_date'); payload.start_date = movedDate; }
      if (!overrideFields.includes('end_date')) { overrideFields.push('end_date'); payload.end_date = movedDate; }
      payload.override_fields = overrideFields.join(',');
    }
    applySingleDeliveryPayloadRule_(payload);
    const saveScope = await chooseScheduleEditScope_(overrideFields);
    if (!saveScope) return;

    showBusy('配信内容を保存中...');
    flushPendingCheckStatusesBefore(() => {
      const runner = google.script.run
        .withSuccessHandler(() => {
          hideBusy();
          closeModal();
          loadData({ force: true, includeStatic: true });
        })
        .withFailureHandler(err => {
          hideBusy();
          alert('保存に失敗しました: ' + (err.message || err));
        })
      if (saveScope === 'future') {
        runner.saveScheduleFromDate(CURRENT_ENTRY.schedule_id, payload.delivery_date || occurrenceDate, payload);
      } else {
        runner.saveCheckStatus(itemId, 'occurrence_override', overrideFields.length > 0, payload);
      }
    }, err => {
      hideBusy();
      alert('未保存の設定・確認状態を一括保存できなかったため、配信内容の保存を中止しました: ' + (err.message || String(err)));
    });
  }

  function chooseScheduleEditScope_(overrideFields) {
    if (!overrideFields || !overrideFields.length) return Promise.resolve('single');
    return openScheduleEditScopeModal_();
  }

  function ensureScheduleEditScopeModal_() {
    let modal = document.getElementById('scheduleEditScopeModal');
    if (modal) return modal;
    modal = document.createElement('div');
    modal.id = 'scheduleEditScopeModal';
    modal.className = 'modal schedule-scope-modal';
    modal.setAttribute('aria-hidden', 'true');
    modal.style.display = 'none';
    modal.innerHTML = `
      <div class="modal-card schedule-scope-card" role="dialog" aria-modal="true" aria-labelledby="scheduleEditScopeTitle">
        <div class="modal-header">
          <h2 id="scheduleEditScopeTitle">変更範囲を選択</h2>
          <button type="button" class="icon-button" data-scope-choice="" aria-label="閉じる">×</button>
        </div>
        <div class="scope-choice-body">
          <p>この変更をどの範囲に反映しますか？</p>
          <div class="scope-choice-actions">
            <button type="button" class="primary-button" data-scope-choice="single">この日だけ変更</button>
            <button type="button" class="secondary-button" data-scope-choice="">キャンセル</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    return modal;
  }

  function openScheduleEditScopeModal_() {
    return new Promise(resolve => {
      const modal = ensureScheduleEditScopeModal_();
      let resolved = false;
      const finish = choice => {
        if (resolved) return;
        resolved = true;
        modal.removeEventListener('click', handleClick);
        document.removeEventListener('keydown', handleKeydown);
        setModalVisible_(modal, false);
        resolve(choice || '');
      };
      const handleClick = event => {
        const choiceButton = event.target.closest('[data-scope-choice]');
        if (choiceButton) {
          finish(choiceButton.dataset.scopeChoice || '');
          return;
        }
        if (event.target === modal) finish('');
      };
      const handleKeydown = event => {
        if (event.key === 'Escape') finish('');
      };
      modal.addEventListener('click', handleClick);
      document.addEventListener('keydown', handleKeydown);
      setModalVisible_(modal, true);
      const firstButton = modal.querySelector('[data-scope-choice="single"]');
      if (firstButton) firstButton.focus();
    });
  }

  function stopCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }
    if (!confirm('この週の配信を停止し、カレンダーをグレーアウトします。よろしいですか？')) return;

    showBusy('配信停止を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, true);
        CURRENT_ENTRY.is_inactive = true;
        if (CURRENT_ENTRY_BASE) CURRENT_ENTRY_BASE.is_inactive = true;
        renderScheduleGrid();
        setEditState(isFixed(CURRENT_ENTRY), true);
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信停止に失敗しました: ' + (err.message || err));
      })
      .stopDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function resumeCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }

    showBusy('配信再開を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, false);
        CURRENT_ENTRY.is_inactive = false;
        if (CURRENT_ENTRY_BASE) CURRENT_ENTRY_BASE.is_inactive = false;
        renderScheduleGrid();
        setEditState(isFixed(CURRENT_ENTRY), false);
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信再開に失敗しました: ' + (err.message || err));
      })
      .resumeDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function buildAssigneeOptions() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows.map(row => {
      const value = row.initial || row.abbreviation || row.Abbreviation || row.name || row.full_name || row['略称'] || row['名前'] || row['氏名'] || '';
      const label = row.full_name || row.fullName || row.name || row['氏名'] || row['名前'] || value;
      return `<option value="${escapeAttribute(value)}">${escapeHtml(value)}${label && label !== value ? ` (${escapeHtml(label)})` : ''}</option>`;
    }).join('');
  }

  function getAdminOptionValues() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows
      .map(row => {
        const value = String(row.initial || row.abbreviation || row.Abbreviation || getValueByKeys(row, ['initial', 'abbreviation', 'Abbreviation', '略称']) || '').trim();
        const nameVal = String(row.full_name || row.fullName || row.name || getValueByKeys(row, ['full_name', 'fullName', 'name', 'Name', '名前', '氏名']) || '').trim();
        const resolved = value || nameVal;
        if (!resolved) return null;
        const label = nameVal || resolved;
        return { value: resolved, label: label && label !== resolved ? `${resolved} (${label})` : resolved };
      })
      .filter(Boolean);
  }

  // ── 設定・確認ボタン管理 ──────────────────────────────────────

  function initEditModalCheckButtons_() {
    const modal = document.getElementById('editModal');
    if (!modal || !CURRENT_ENTRY) return;
    const checkItemId = getCheckItemId(CURRENT_ENTRY);
    const setterActive = isCheckStatusActive(checkItemId, 'setter');
    const checkerActive = isCheckStatusActive(checkItemId, 'checker');

    const btnSetting = document.getElementById('btnModalSetting');
    const btnChecking = document.getElementById('btnModalChecking');
    if (!btnSetting || !btnChecking) return;

    btnSetting.textContent = setterActive ? '設定取り消し' : '設定';
    btnSetting.classList.toggle('is-cancel-mode', setterActive);
    btnSetting.disabled = false;

    btnChecking.disabled = checkerActive;
    btnChecking.textContent = checkerActive ? '確認済み' : '確認';
  }

  function applySettingLock_(modal) {
    if (!modal || !CURRENT_ENTRY) return;
    const checkItemId = getCheckItemId(CURRENT_ENTRY);
    const setterActive = isCheckStatusActive(checkItemId, 'setter');
    const checkerActive = isCheckStatusActive(checkItemId, 'checker');
    if (!setterActive && !checkerActive) return;

    modal.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.id === 'new-comment') return;
      if (el.name === 'mail_name') return;
      if (el.tagName === 'SELECT') {
        el.disabled = true;
      } else {
        el.readOnly = true;
      }
    });

    modal.classList.add('is-locked-edit');
    const saveBtn = document.getElementById('btnModalSave');
    const closeBtn = document.getElementById('btnModalClose');
    if (saveBtn) saveBtn.style.display = 'none';
    if (closeBtn) closeBtn.style.display = '';
  }

  function saveCheckStatusFromModal_(itemId, field, active) {
    return new Promise((resolve, reject) => {
      const update = { itemId, field, active, payload: {} };
      google.script.run
        .withSuccessHandler(results => {
          const list = Array.isArray(results) ? results : [];
          const result = list.find(item => item && item.item_id === itemId && item.field === field) || list[0];
          if (!result || !result.success) {
            reject(new Error('保存結果を確認できませんでした'));
            return;
          }
          setLocalCheckStatus(result.item_id, result.field, !!result.active);
          applyArchiveResult_(result.archive);
          resolve(result);
        })
        .withFailureHandler(err => reject(err))
        .saveDailyCheckStatuses([update]);
    });
  }

  function hasEditFormChanges_() {
    if (!CURRENT_ENTRY) return false;
    const modal = document.getElementById('editModal');
    if (!modal) return false;
    const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    const nextValues = normalizeMasterSubmissionPayload_(
      collectNamedFormValues(modal, { exclude: ['schedule_id', 'current_job_count'] })
    );
    return Object.keys(nextValues).some(key => {
      const next = getEntryFieldComparableValue_(nextValues, key);
      const prev = getEntryFieldComparableValue_(base, key);
      return next !== prev;
    });
  }

  function saveEditForSetting_() {
    return new Promise((resolve, reject) => {
      if (!CURRENT_ENTRY) { resolve(false); return; }
      const modal = document.getElementById('editModal');
      if (!validateRequiredFields_(modal)) { resolve(false); return; }

      const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
      const occurrenceDate = CURRENT_ENTRY.original_date || CURRENT_ENTRY.target_date;
      const itemId = [CURRENT_ENTRY.schedule_id, occurrenceDate]
        .map(v => String(v || '').trim().replace(/\s+/g, ' ')).join('|');

      const nextValues = normalizeMasterSubmissionPayload_(
        collectNamedFormValues(modal, { exclude: ['schedule_id', 'current_job_count'] })
      );
      if (String(nextValues.assignee || '').trim() === 'R') nextValues.reviewer = '';

      const overrideFields = [];
      const nextWeekday = Object.prototype.hasOwnProperty.call(nextValues, 'weekday')
        ? nextValues.weekday : CURRENT_ENTRY.weekday;
      const nextDeliveryDate = nextWeekday
        ? getDateForWeekdayInCalendarWeek(CURRENT_ENTRY.target_date, nextWeekday)
        : CURRENT_ENTRY.target_date;
      const nextHour = Object.prototype.hasOwnProperty.call(nextValues, 'hour')
        ? nextValues.hour : CURRENT_ENTRY.hour;

      const payload = {
        item_id: itemId,
        schedule_id: CURRENT_ENTRY.schedule_id,
        original_date: occurrenceDate,
        delivery_date: nextDeliveryDate || CURRENT_ENTRY.target_date,
        hour: nextHour,
        weekday: nextWeekday || getWeekdayLabelForDateString(nextDeliveryDate),
        mail_name: CURRENT_ENTRY.mail_name
      };

      Object.keys(nextValues).forEach(key => {
        const next = getEntryFieldComparableValue_(nextValues, key);
        const prev = getEntryFieldComparableValue_(base, key);
        if (next !== prev) {
          overrideFields.push(key);
          payload[key] = nextValues[key];
        }
      });
      payload.override_fields = overrideFields.join(',');
      if (CURRENT_ENTRY.original_date && CURRENT_ENTRY.original_date !== CURRENT_ENTRY.target_date) {
        const movedDate = CURRENT_ENTRY.target_date;
        if (!overrideFields.includes('start_date')) { overrideFields.push('start_date'); payload.start_date = movedDate; }
        if (!overrideFields.includes('end_date')) { overrideFields.push('end_date'); payload.end_date = movedDate; }
        payload.override_fields = overrideFields.join(',');
      }
      applySingleDeliveryPayloadRule_(payload);

      chooseScheduleEditScope_(overrideFields).then(saveScope => {
        if (!saveScope) { resolve(false); return; }
        showBusy('配信内容を保存中...');
        flushPendingCheckStatusesBefore(() => {
          const runner = google.script.run
            .withSuccessHandler(() => { hideBusy(); resolve(true); })
            .withFailureHandler(err => { hideBusy(); reject(err); });
          if (saveScope === 'future') {
            runner.saveScheduleFromDate(CURRENT_ENTRY.schedule_id, payload.delivery_date || occurrenceDate, payload);
          } else {
            runner.saveCheckStatus(itemId, 'occurrence_override', overrideFields.length > 0, payload);
          }
        }, err => { hideBusy(); reject(err); });
      });
    });
  }

  async function handleModalToggleSetting_() {
    if (!CURRENT_ENTRY) return;
    const checkItemId = getCheckItemId(CURRENT_ENTRY);
    const setterActive = isCheckStatusActive(checkItemId, 'setter');

    if (!setterActive) {
      if (hasEditFormChanges_()) {
        try {
          const saved = await saveEditForSetting_();
          if (!saved) return;
        } catch (err) {
          alert('配信内容の保存に失敗しました: ' + (err.message || err));
          return;
        }
      }
      try {
        showBusy('設定中...');
        await saveCheckStatusFromModal_(checkItemId, 'setter', true);
        hideBusy();
      } catch (err) {
        hideBusy();
        alert('設定の保存に失敗しました: ' + (err.message || err));
        return;
      }
    } else {
      try {
        showBusy('設定取り消し中...');
        await saveCheckStatusFromModal_(checkItemId, 'setter', false);
        await saveCheckStatusFromModal_(checkItemId, 'checker', false);
        hideBusy();
      } catch (err) {
        hideBusy();
        alert('設定取り消しに失敗しました: ' + (err.message || err));
        return;
      }
    }

    closeModal();
    loadData({ force: true });
  }

  async function handleModalSetChecking_() {
    if (!CURRENT_ENTRY) return;
    const checkItemId = getCheckItemId(CURRENT_ENTRY);

    try {
      showBusy('確認中...');
      await saveCheckStatusFromModal_(checkItemId, 'checker', true);
      hideBusy();
    } catch (err) {
      hideBusy();
      alert('確認の保存に失敗しました: ' + (err.message || err));
      return;
    }

    closeModal();
    loadData({ force: true });
  }

</script>
