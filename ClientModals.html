<script>
  function updateMasterFormFields() {
    const modal = document.getElementById('masterModal');
    const format = String(modal && modal.dataset.format ? modal.dataset.format : 'フリー');
    const fields = {
      'auto_job_feature_id': ['自動求人特集', 'その他'],
      'job_url': ['自動求人特集', 'その他'],
      'pr_id': ['自動求人特集', 'その他']
    };

    Object.keys(fields).forEach(key => {
      const fieldContainer = modal ? modal.querySelector(`[data-field="${key}"]`) : null;
      if (fieldContainer) {
        const isActive = fields[key].includes(format) || format === 'その他';
        fieldContainer.classList.toggle('disabled', !isActive);
        const inputs = fieldContainer.querySelectorAll('input, select, textarea');
        inputs.forEach(input => input.disabled = !isActive);
      }
    });

    const currentJobCountContainer = modal ? modal.querySelector('[data-field="current_job_count"]') : null;
    if (currentJobCountContainer) {
      currentJobCountContainer.classList.add('disabled');
      currentJobCountContainer.querySelectorAll('input, select, textarea').forEach(input => {
        input.disabled = true;
        input.readOnly = true;
        input.placeholder = format === '自動求人特集'
          ? '保存後にURLから自動取得されます'
          : '保存後に自動取得されます';
      });
    }
  }

  function openMasterModal(encodedRow) {
    const row = encodedRow ? JSON.parse(decodeURIComponent(encodedRow)) : {};
    const headers = MASTER_DATA.headers || [];
    const visibleHeaders = getVisibleMasterHeaders(headers);
    const form = document.getElementById('masterForm');
    const modal = document.getElementById('masterModal');
    const isPrMaster = MASTER_DATA.sheetName === 'app_pr';
    const mode = row.__rowNumber ? 'edit' : 'master';
    const tabsContainer = modal ? modal.querySelector('.modal-tabs-container') : null;

    document.getElementById('masterModalTitle').textContent = row.__rowNumber ? 'マスタ編集' : 'マスタ新規追加';
    document.getElementById('master-row-number').value = row.__rowNumber || '';
    if (tabsContainer) {
      tabsContainer.hidden = isPrMaster;
      if (isPrMaster) {
        tabsContainer.style.setProperty('display', 'none', 'important');
      } else {
        tabsContainer.style.removeProperty('display');
      }
    }
    if (modal) {
      modal.dataset.modalType = isPrMaster ? 'pr-master' : 'master';
      modal.dataset.mode = mode;
      modal.dataset.format = isPrMaster ? 'PRマスタ' : (row.format || 'フリー');
    }

    // マスタモーダル用の一貫したフィールド生成 (form-grid対応)
    const html = visibleHeaders.map(header => {
      if (isPrMaster && (header === 'target_ids' || header === 'is_inactive' || header === '配信停止')) return '';
      if (isHiddenMasterInputHeader(header)) return '';

      const key = normalizeScheduleEditKey_(header);
      if (key === 'format') return '';
      const value = row[key] != null ? row[key] : row[header];
      const isFullWidth = ['mail_content', 'mail_content_extract', 'mail_content_free', 'notes', 'user_other_condition', 'auto_job_other_condition'].includes(key);
      const input = renderMasterFieldInput_(header, key, value, mode);
      if (input === '') return '';

      return `<div class="form-group ${isFullWidth ? 'full-width' : ''}" data-field="${escapeAttribute(key)}"><label>${escapeHtml(getModalFieldLabel_(header, key))}</label>${input}</div>`;
    }).join('');

    form.innerHTML = html;

    if (isPrMaster) {
      const formatGroup = form.querySelector('[data-field="format"]');
      if (formatGroup) formatGroup.style.display = 'none';
      const prId = getValueByKeys(row, ['pr_id', 'PR ID', 'PR', 'ID', 'id']);
      form.insertAdjacentHTML('beforeend', renderNewsletterSelector_(prId));
    }

    // タブの初期化とルール適用
    populateModalFields(form, row, getModalFieldAliases_('masterModal'));
    refreshAdminSelects_();
    bindFormatSelects_(modal);

    if (modal) {
      const prIdField = modal.querySelector('[name="pr_id"]');
      if (prIdField) {
        prIdField.readOnly = true;
        prIdField.disabled = true;
        prIdField.placeholder = '保存時に自動採番';
      }
      window.openAndInitModalWithTab(isPrMaster ? 'PRマスタ' : (row.format || 'フリー'), 'masterModal');
      updateMasterActionButtons_(!!row.__rowNumber);
      setModalVisible_(modal, true);
    }
  }

  function updateMasterActionButtons_(hasExistingRow) {
    const stopButton = document.getElementById('stop-master-button');
    const deleteButton = document.getElementById('delete-master-button');
    const display = hasExistingRow ? '' : 'none';
    if (stopButton) stopButton.style.display = display;
    if (deleteButton) deleteButton.style.display = display;
  }

  function renderNewsletterSelector_(prId) {
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const prTargets = Array.isArray(APP_DATA.prTargets) ? APP_DATA.prTargets : [];

    // 現在紐付いているメルマガ名のセットを作成
    const linkedMailNames = new Set(
      prTargets
        .filter(t => !isInactive(t))
        .filter(t => normalizeIdKey(getValueByKeys(t, ['pr_id', 'PR ID', 'PR', 'ID', 'id'])) === normalizeIdKey(prId))
        .map(t => normalizeText(getValueByKeys(t, ['mail_name', 'メルマガ名', '対象メルマガ'])))
    );

    // メルマガ一覧を mail_name でユニーク化
    const uniqueNewsletters = [];
    const seenNames = new Set();
    schedule.forEach(item => {
      const name = normalizeText(getValueByKeys(item, ['mail_name', 'メルマガ名']));
      if (name && !seenNames.has(name)) {
        uniqueNewsletters.push({ name });
        seenNames.add(name);
      }
    });

    uniqueNewsletters.sort((a, b) => a.name.localeCompare(b.name));

    return `
      <div class="newsletter-selector">
        <div class="newsletter-selector-header">
          <strong>PRが入るメルマガを選択 (全${uniqueNewsletters.length}件)</strong>
          <input type="text" class="newsletter-selector-search" placeholder="メルマガ名で検索..." oninput="filterNewsletterList_(this.value)">
        </div>
        <div id="newsletterList" class="newsletter-list">
          ${uniqueNewsletters.map(nl => `
            <label class="newsletter-item">
              <input type="checkbox" data-target-name="${escapeAttribute(nl.name)}" ${linkedMailNames.has(nl.name) ? 'checked' : ''}>
              <span>${escapeHtml(nl.name)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }

  function filterNewsletterList_(keyword) {
    const k = keyword.trim().toLowerCase();
    document.querySelectorAll('#newsletterList .newsletter-item').forEach(item => {
      const text = item.textContent.toLowerCase();
      item.style.display = text.includes(k) ? 'flex' : 'none';
    });
  };

  function getModalFieldAliases_(modalId) {
    if (modalId === 'editModal') {
      return {
        mail_name: ['mail_name', 'block_name', 'メルマガ名'],
        delivery_count: ['delivery_count', 'mail_count', '通数'],
        mail_content: ['mail_content', 'mail_body', 'content', 'メルマガ内容'],
        mail_content_extract: ['mail_content_extract', 'メルマガ内容(抽出)'],
        mail_content_free: ['mail_content_free', 'メルマガ内容(フリー)'],
        notes: ['notes', 'note', '備考'],
        mail_type: ['mail_type', 'category', '種別'],
        format: ['format', '形式'],
        setter: ['setter', 'assignee', '設定者'],
        checker: ['checker', 'reviewer', '確認者'],
        is_new: ['is_new', 'new_flag', '新規'],
        user_other_condition: ['user_other_condition', 'USER_その他条件'],
        auto_job_other_condition: ['auto_job_other_condition', '自動求人特集_その他条件']
      };
    }

    return {
      mail_name: ['mail_name', 'block_name', 'メルマガ名'],
      delivery_count: ['delivery_count', 'mail_count', '通数'],
      mail_content: ['mail_content', 'mail_body', 'content', 'メルマガ内容'],
      mail_content_extract: ['mail_content_extract', 'メルマガ内容(抽出)'],
      mail_content_free: ['mail_content_free', 'メルマガ内容(フリー)'],
      notes: ['notes', 'note', '備考'],
      mail_type: ['mail_type', 'category', '種別'],
      format: ['format', '形式'],
      setter: ['setter', 'assignee', '設定者'],
      checker: ['checker', 'reviewer', '確認者'],
      is_new: ['is_new', 'new_flag', '新規'],
      user_other_condition: ['user_other_condition', 'USER_その他条件'],
      auto_job_other_condition: ['auto_job_other_condition', '自動求人特集_その他条件']
    };
  }

  function populateModalFields(modal, entry, aliasMap) {
    if (!modal || !entry) return;

    modal.querySelectorAll('[name]').forEach(input => {
      if (input.type === 'hidden') return;
      const name = input.name;
      const aliases = aliasMap[name] || [name];
      const value = getValueByKeys(entry, aliases);
      if (input.type === 'checkbox') {
        input.checked = isTruthyValue(value);
        return;
      }
      if (input.tagName === 'SELECT' && !input.options.length) {
        input.dataset.pendingValue = value != null ? String(value) : '';
        return;
      }
      input.value = value != null ? value : '';
    });
  }

  function setModalVisible_(modal, visible) {
    if (!modal) return;
    modal.style.display = visible ? 'flex' : 'none';
    modal.setAttribute('aria-hidden', visible ? 'false' : 'true');
  }

  function closeMasterModal() {
    const modal = document.getElementById('masterModal');
    setModalVisible_(modal, false);
  }

  function buildUniqueScheduleValues_(key) {
    const set = new Set();
    (APP_DATA.schedule || []).forEach(row => {
      const v = String((row && row[key]) || '').trim();
      if (v) set.add(v);
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'ja'));
  }

  function normalizeScheduleEditKey_(header) {
    const key = String(header == null ? '' : header).trim();
    const lower = key.toLowerCase();
    const map = {
      'メルマガ内容': 'mail_content',
      'メルマガ内容(抽出)': 'mail_content_extract',
      'メルマガ内容(フリー)': 'mail_content_free',
      '通数': 'delivery_count',
      '設定者': 'assignee',
      '確認者': 'reviewer',
      '備考': 'notes',
      '種別': 'mail_type',
      'category': 'mail_type',
      'サブカテゴリ': 'sub_category',
      '担当部署': 'sub_category',
      '形式': 'format',
      '曜日': 'weekday',
      '時間': 'hour',
      '開始': 'start_date',
      '開始日': 'start_date',
      '終了': 'end_date',
      '終了日': 'end_date',
      '自動求人特集URL': 'job_url',
      '自動求人特集_URL': 'job_url',
      '求人URL': 'job_url',
      '自動求人特集ID': 'auto_job_feature_id',
      '自動求人特集_ID': 'auto_job_feature_id',
      '対象年齢': 'target_age',
      'USER_年齢': 'target_age',
      '対象現住所': 'target_address',
      'USER_現住所': 'target_address',
      '希望勤務地': 'user_desired_location',
      'USER_希望勤務地': 'user_desired_location',
      '経験職種': 'user_experience_job',
      'USER_経験職種': 'user_experience_job',
      '希望職種': 'user_desired_job',
      'USER_希望職種': 'user_desired_job',
      'USER_その他条件': 'user_other_condition',
      'JOB_勤務地': 'job_location',
      'JOB_職種': 'job_type',
      'フリーワード': 'job_keyword',
      'JOB_フリーワード': 'job_keyword',
      'is_new': 'is_new',
      'new_flag': 'is_new',
      '新規': 'is_new',
      '自動求人特集_求人数': 'current_job_count',
      '自動求人特集_その他条件': 'auto_job_other_condition',
      '確定済': 'is_fixed',
      '配信終了': 'is_inactive',
      '配信停止': 'is_inactive',
      '削除': 'delete',
      'サイクル': 'cycle',
      'PR': 'pr',
      'ID': 'schedule_id',
      'PR ID': 'pr_id',
      'PRタイトル': 'name',
      'PR本文': 'pr_text',
      '本文': 'pr_text',
      '名称': 'name',
      'タイトル': 'name',
      '見出し': 'name',
      '紐付けID': 'pr_target_id',
      '対象ID': 'target_ids',
      'PRが入るメルマガ': 'target_ids',
      '紐付けメルマガ': 'target_ids',
      'メルマガ名': 'mail_name',
      '対象メルマガ': 'mail_name',
      '元行': 'source_row',
      '元の行': 'source_row',
      '表示順': 'target_index',
      '対象順': 'target_index'
    };
    if (map[key]) return map[key];
    if ([
      'schedule_id',
      'pr_id',
      'pr_target_id',
      'name',
      'pr_text',
      'target_ids',
      'mail_name',
      'source_row',
      'target_index',
      'delivery_count',
      'assignee',
      'reviewer',
      'notes',
      'mail_type',
      'category',
      'sub_category',
      'format',
      'weekday',
      'hour',
      'start_date',
      'end_date',
      'job_url',
      'auto_job_feature_id',
      'target_age',
      'target_address',
      'user_desired_location',
      'user_experience_job',
      'user_desired_job',
      'job_location',
      'job_type',
      'job_keyword',
      'is_new',
      'is_fixed',
      'current_job_count',
      'cycle',
      'pr',
      'is_inactive'
    ].includes(lower)) return lower;
    return key;
  }

  function getModalFieldLabel_(header, key) {
    const rawHeader = String(header == null ? '' : header).trim();
    if (rawHeader && rawHeader !== key && !/^[a-z][a-z0-9_]*$/i.test(rawHeader)) {
      return rawHeader;
    }
    return getDisplayName(key);
  }

  function getScheduleEditHeaders_() {
    // マスタ全ヘッダーを取得し、モーダル用に整理
    return (APP_DATA.scheduleHeaders || []).filter(header => {
      const key = normalizeScheduleEditKey_(header);
      return !['schedule_id', 'id', 'source_sheet', 'source_row', 'is_inactive', 'is_fixed'].includes(key) &&
        !isDeprecatedScheduleHeader(header);
    });
  }

  function renderEditInput_(header, key, value) {
    if (key === 'is_new' || key === 'new_flag') {
      return `<input type="checkbox" name="is_new" aria-label="新規" ${isTruthyValue(value) ? 'checked' : ''} ${isEditModalLockedField_('is_new') ? 'disabled' : ''}>`;
    }
    return renderMasterFieldInput_(header, key, value, 'edit');
  }

  function getEntryFieldValue_(entry, header, key) {
    const canonical = entry && entry[key];
    if (canonical != null && String(canonical).trim() !== '') return canonical;
    const raw = entry && entry[header];
    if (raw != null && String(raw).trim() !== '') return raw;
    if (key === 'hour') return getValueByKeys(entry, ['hour', '時間', '時刻', '配信時間', 'time', 'delivery_time']);
    return canonical != null ? canonical : raw;
  }

  function renderEditModalFields_(entry) {
    const container = document.getElementById('editCoreFields');
    if (!container) return;

    const excludedKeys = new Set([
      'schedule_id',
      'format',
      'mail_name',
      'assignee',
      'reviewer'
    ]);

    container.innerHTML = getScheduleEditHeaders_().filter(header => {
      const key = normalizeScheduleEditKey_(header);
      return !excludedKeys.has(key);
    }).map(header => {
      const key = normalizeScheduleEditKey_(header);
      const value = getEntryFieldValue_(entry, header, key);
      const isFullWidth = ['mail_content', 'mail_content_extract', 'mail_content_free', 'notes', 'user_other_condition', 'auto_job_other_condition'].includes(key);
      const input = renderEditInput_(header, key, value);
      if (input === '') return '';
      return `
        <div class="form-group ${isFullWidth ? 'full-width' : ''}" data-field="${escapeAttribute(key)}">
          <label>${escapeHtml(getModalFieldLabel_(header, key))}</label>
          ${input}
        </div>
      `;
    }).join('');
  }

  function syncReviewerLock_() {
    const modal = document.getElementById('editModal');
    const assigneeEl = modal ? modal.querySelector('[name="setter"]') : null;
    const reviewerEl = modal ? modal.querySelector('[name="checker"]') : null;
    if (!assigneeEl || !reviewerEl) return;

    const locked = CURRENT_ENTRY && (isFixed(CURRENT_ENTRY) || isStopped(CURRENT_ENTRY));
    if (locked) {
      reviewerEl.disabled = true;
      reviewerEl.required = false;
      return;
    }

    const assignee = String(assigneeEl.value || '').trim();
    if (assignee === 'R') {
      reviewerEl.value = '';
      reviewerEl.disabled = true;
      reviewerEl.required = false;
    } else {
      reviewerEl.disabled = false;
      reviewerEl.required = false;
    }
    reviewerEl.removeAttribute('required');
  }

  function collectNamedFormValues(form, options = {}) {
    const values = {};
    if (!form) return values;
    const exclude = new Set(options.exclude || []);
    const includeHidden = new Set(options.includeHidden || []);
    form.querySelectorAll('[name]').forEach(input => {
      if (!input.name || exclude.has(input.name)) return;
      if (input.type === 'hidden' && !includeHidden.has(input.name)) return;
      if (input.disabled) return;
      values[input.name] = input.type === 'checkbox' ? input.checked : input.value;
    });
    return values;
  }

  function validateRequiredFields_(root) {
    if (!root) return true;
    const invalid = root.querySelector('select[required]:not(:disabled):invalid, input[required]:not(:disabled):invalid, textarea[required]:not(:disabled):invalid');
    if (!invalid) return true;
    invalid.reportValidity();
    return false;
  }

  function normalizeMasterSubmissionPayload_(payload) {
    if (Object.prototype.hasOwnProperty.call(payload, 'setter')) {
      payload.assignee = payload.setter;
      delete payload.setter;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'checker')) {
      payload.reviewer = payload.checker;
      delete payload.checker;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.is_new ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'new_flag') && !Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.new_flag ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    return payload;
  }

  function bindEditModalInteractions_(modal) {
    if (!modal) return;
    bindCopyField_(modal, '[name="mail_name"]');
    bindChangeField_(modal, '[name="setter"]', () => {
      syncReviewerLock_();
      updateEditChangeHighlights_(modal);
    });
    ['mail_type', 'category', 'sub_category'].forEach(name => {
      bindChangeField_(modal, `[name="${name}"]`, () => applyValidationCycleControls_(modal));
    });
    bindEditChangeHighlights_(modal);
    updateEditChangeHighlights_(modal);
    syncReviewerLock_();
  }

  function getEditComparisonKey_(name) {
    if (name === 'setter') return 'assignee';
    if (name === 'checker') return 'reviewer';
    if (name === 'new_flag') return 'is_new';
    return name;
  }

  function normalizeComparableModalValue_(value, key) {
    if (key === 'is_new') return isTruthyValue(value) ? 'TRUE' : 'FALSE';
    if (key === 'hour') return normalizeMasterHourValue(value);
    if (key === 'weekday') return normalizeWeekdayLabel(value);
    if (key === 'start_date' || key === 'end_date' || key === 'delivery_date' || key === 'original_date') {
      return normalizeDateString(value);
    }
    return String(value == null ? '' : value);
  }

  function getFieldCurrentComparableValue_(field, key) {
    return normalizeComparableModalValue_(field.type === 'checkbox' ? field.checked : field.value, key);
  }

  function getBaseComparableValue_(key) {
    const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    return normalizeComparableModalValue_(base[key], key);
  }

  function updateEditFieldHighlight_(field) {
    if (!field || !field.name) return;
    const key = getEditComparisonKey_(field.name);
    const group = field.closest('.form-group');
    if (!group) return;
    const changed = getFieldCurrentComparableValue_(field, key) !== getBaseComparableValue_(key);
    group.classList.toggle('is-overridden', changed);
  }

  function updateEditChangeHighlights_(modal) {
    if (!modal) return;
    modal.querySelectorAll('.form-group.is-overridden').forEach(group => group.classList.remove('is-overridden'));
    modal.querySelectorAll('input[name], select[name], textarea[name]').forEach(updateEditFieldHighlight_);
  }

  function bindEditChangeHighlights_(modal) {
    if (!modal) return;
    modal.querySelectorAll('input[name], select[name], textarea[name]').forEach(field => {
      if (field.dataset.changeHighlightBound === 'true') return;
      field.dataset.changeHighlightBound = 'true';
      ['input', 'change'].forEach(type => {
        field.addEventListener(type, () => updateEditFieldHighlight_(field));
      });
    });
  }

  function bindCopyField_(root, selector) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.copyBound) return;
    field.dataset.copyBound = 'true';
    field.addEventListener('click', () => copyTextToClipboard_(field.value));
  }

  function bindChangeField_(root, selector, handler) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.changeBound) return;
    field.dataset.changeBound = 'true';
    field.addEventListener('change', handler);
  }

  function saveMasterEdit() {
    const modal = document.getElementById('masterModal');
    if (!validateRequiredFields_(modal)) return;

    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '保存中...';
    showBusy('マスタを保存中...');
    const handlePreSaveFailure = err => {
      alert('未保存の設定・確認状態を一括保存できなかったため、マスタ保存を中止しました: ' + (err.message || String(err)));
      btn.disabled = false;
      btn.textContent = '保存';
      hideBusy();
    };

    const payload = normalizeMasterSubmissionPayload_(
      Object.assign(
        { __rowNumber: document.getElementById('master-row-number').value },
        collectNamedFormValues(document.getElementById('masterModal'))
      )
    );
    payload.format = document.getElementById('masterModal').dataset.format || 'フリー';

    // PR管理の場合のみ、target_ids (PRが入るメルマガ) を取得して savePRData を呼ぶ
    if (MASTER_DATA.sheetName === 'app_pr') {
      const selectedNewsletters = [];
      document.querySelectorAll('#newsletterList input[type="checkbox"]:checked').forEach(cb => {
        const mailName = cb.dataset.targetName;
        // source_row は APP_DATA.schedule から検索
        const rowData = APP_DATA.schedule.find(s => normalizeText(getValueByKeys(s, ['mail_name', 'メルマガ名'])) === mailName);
        selectedNewsletters.push({
          mail_name: mailName,
          source_row: rowData ? rowData.source_row : ''
        });
      });
      payload.target_ids = selectedNewsletters.map(n => n.mail_name).join(',');

      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData({ force: true, includeStatic: true });
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .savePRData(payload, selectedNewsletters);
      }, handlePreSaveFailure);
    } else {
      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData({ force: true, includeStatic: true });
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .saveMasterData(MASTER_DATA.sheetName, payload);
      }, handlePreSaveFailure);
    }
  }

  function stopMasterRow(rowNumber) {
    const message = 'この行を停止扱いにします。シートの行は残りますが、通常の一覧や利用対象からは外れます。よろしいですか？';
    if (!rowNumber || !confirm(message)) return;

    showBusy('停止を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadActiveMaster();
        loadData({ force: true, includeStatic: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('停止に失敗しました: ' + (err.message || err));
      })
      .stopMasterData(MASTER_DATA.sheetName, rowNumber);
  }

  function deleteMasterRow(rowNumber) {
    const message = 'この行をスプレッドシートから削除します。停止とは違い、行そのものが消えます。よろしいですか？';
    if (!rowNumber || !confirm(message)) return;

    showBusy('削除中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        closeMasterModal();
        loadActiveMaster();
        loadData({ force: true, includeStatic: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('削除に失敗しました: ' + (err.message || err));
      })
      .deleteMasterData(MASTER_DATA.sheetName, rowNumber);
  }

  function getCurrentMasterRowNumber_() {
    const input = document.getElementById('master-row-number');
    return input ? input.value : '';
  }

  function stopCurrentMasterRow() {
    stopMasterRow(getCurrentMasterRowNumber_());
  }

  function deleteCurrentMasterRow() {
    deleteMasterRow(getCurrentMasterRowNumber_());
  }

  function closeModal() {
    const modal = document.getElementById('editModal');
    setModalVisible_(modal, false);
  }

  function openModal(encodedEntry) {
    const entry = JSON.parse(decodeURIComponent(encodedEntry));
    const scheduleRow = (APP_DATA.schedule || []).find(row => String(row && row.schedule_id || '').trim() === String(entry && entry.schedule_id || '').trim());
    const baseEntry = scheduleRow ? Object.assign({}, scheduleRow) : Object.assign({}, entry);
    baseEntry.target_date = entry.target_date;
    if (entry.original_date) baseEntry.original_date = entry.original_date;
    if (entry.source_row) baseEntry.source_row = entry.source_row;
    const masterHour = getValueByKeys(scheduleRow || {}, ['hour', '時間', '時刻', '配信時間', 'time', 'delivery_time']);
    if (masterHour !== '') {
      baseEntry.hour = masterHour;
    }

    CURRENT_ENTRY_BASE = baseEntry;
    CURRENT_ENTRY = applyOccurrenceOverrideToEntry(baseEntry);

    const modal = document.getElementById('editModal');
    if (!modal) return;
    modal.dataset.mode = 'edit';
    // 1. 追加フィールドのレンダリング
    const editCoreFields = modal.querySelector('#editCoreFields');
    if (editCoreFields) {
      renderEditModalFields_(CURRENT_ENTRY);
    }

    // 2. name属性を基準としたデータ流し込み
    populateModalFields(modal, CURRENT_ENTRY, getModalFieldAliases_('editModal'));
    refreshAdminSelects_();
    bindEditModalInteractions_(modal);

    // 3. PR情報の表示
    const prDetails = getPrRecordsForSchedule(CURRENT_ENTRY);
    const prContainer = modal.querySelector('#edit-pr-details');
    if (prContainer) {
      if (prDetails.length > 0) {
        const prList = prDetails.map(pr => {
          const title = pr.pr_title || '不明';
          const body = pr.pr_text || '（未設定）';
          return `<div class="pr-info-item"><strong>PR ID:</strong> ${escapeHtml(pr.pr_id)}<br><strong>タイトル:</strong> ${escapeHtml(title)}<br><strong>PR内容:</strong><div class="pr-info-body">${escapeHtml(body).replace(/\r?\n/g, '<br>')}</div></div>`;
        }).join('<hr>');
        prContainer.innerHTML = '<h4>紐付いているPR</h4>' + prList;
      } else {
        prContainer.innerHTML = '<h4>紐付いているPR</h4><p>なし</p>';
      }
    }

    // 4. タブの初期化とルール適用
    const currentFormat = CURRENT_ENTRY.format || 'フリー';
    window.openAndInitModalWithTab(currentFormat, 'editModal');
    updateEditChangeHighlights_(modal);
    loadCommentsForCurrentEntry();
    setEditState(isFixed(CURRENT_ENTRY), isStopped(CURRENT_ENTRY));

    setModalVisible_(modal, true);
  }

  // モーダルごとのタブ初期化（イベントリスナー登録）
  function initModalTabs(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        if (this.dataset.locked === 'true') return;
        setModalFormatState(modal, this.dataset.format);
      });
    });

    bindFormatSelects_(modal);
  }

  function bindFormatSelects_(modal) {
    if (!modal) return;
    modal.querySelectorAll('select[name="format"]').forEach(select => {
      if (select.dataset.formatBound === 'true') return;
      select.dataset.formatBound = 'true';
      select.addEventListener('change', event => {
        setModalFormatState(modal, event.target.value);
      });
    });
  }

  function isModalFormatLocked_(modal) {
    return String(modal && modal.dataset && modal.dataset.mode || '').trim() === 'edit';
  }

  function setModalFormatTabLockState(modal, locked) {
    if (!modal) return;
    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.dataset.locked = locked ? 'true' : 'false';
      tab.setAttribute('aria-disabled', locked ? 'true' : 'false');
      tab.tabIndex = locked ? -1 : 0;
      tab.classList.toggle('is-locked', locked);
    });
  }

  function setModalFormatState(modal, format) {
    if (!modal) return;
    const nextFormat = String(format || 'フリー');
    modal.dataset.format = nextFormat;
    setModalFormatTabLockState(modal, isModalFormatLocked_(modal));
    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.format === nextFormat);
    });
    modal.querySelectorAll('[name="format"]').forEach(input => {
      input.value = nextFormat;
    });
    applyDynamicInputControl(nextFormat, modal.id);
  }

  function resetModalFieldStates_(modal) {
    modal.querySelectorAll('.form-group').forEach(group => {
      group.hidden = false;
      group.style.display = '';
      group.classList.remove('disabled');
      group.querySelectorAll('input, select, textarea').forEach(input => {
        input.disabled = false;
        if ('readOnly' in input) input.readOnly = false;
      });
    });
  }

  function setFieldGroupEnabled_(modal, key, enabled) {
    const group = modal.querySelector(`[data-field="${key}"]`);
    if (!group) return;
    group.classList.toggle('disabled', !enabled);
    group.querySelectorAll('input, select, textarea').forEach(input => {
      input.disabled = !enabled;
    });
  }

  function setFieldGroupControlState_(modal, key, state) {
    const group = modal.querySelector(`[data-field="${key}"]`);
    if (!group) return;
    const normalizedState = String(state || '表示').trim();
    const hidden = normalizedState === '非表示';
    const locked = normalizedState === 'ロック';
    group.hidden = hidden;
    group.style.display = hidden ? 'none' : '';
    group.classList.toggle('disabled', hidden || locked);
    group.querySelectorAll('input, select, textarea').forEach(input => {
      input.disabled = hidden || locked;
      if ('readOnly' in input) input.readOnly = locked;
    });
  }

  function getInputControlFormatKey_(format) {
    const text = String(format || '').trim();
    if (text === '自動求人特集') return 'auto';
    if (text === '抽出') return 'extract';
    if (text === 'その他') return 'other';
    return 'free';
  }

  function getInputControlModalKey_(modal) {
    if (!modal) return '';
    if (modal.id === 'editModal') return 'deliveryEdit';
    if (modal.id === 'masterModal' && modal.dataset.mode === 'edit') return 'masterEdit';
    if (modal.id === 'masterModal') return 'masterNew';
    return '';
  }

  function getInputControlHiddenKeys_(modalKey, formatKey) {
    const hidden = new Set();
    const autoJobKeys = ['auto_job_feature_id', 'job_url', 'current_job_count', 'auto_job_other_condition'];
    const jobKeys = ['job_location', 'job_type', 'job_keyword'];

    if (formatKey === 'free') hidden.add('mail_content_extract');
    if (formatKey === 'extract' || formatKey === 'auto') hidden.add('mail_content_free');
    if (formatKey === 'free' || formatKey === 'extract') autoJobKeys.forEach(key => hidden.add(key));
    if (formatKey === 'auto') jobKeys.forEach(key => hidden.add(key));

    if (modalKey === 'masterNew') ['is_fixed', 'is_inactive'].forEach(key => hidden.add(key));
    if ((modalKey === 'deliveryEdit' || modalKey === 'masterEdit') && formatKey === 'auto') hidden.add('is_fixed');
    if (modalKey === 'deliveryEdit' && ['free', 'extract'].includes(formatKey)) hidden.add('is_fixed');
    return hidden;
  }

  function applyInputControlMatrix_(modal, format) {
    if (!modal || modal.dataset.modalType === 'pr-master') {
      applyPrMasterControls_(modal);
      return;
    }

    const modalKey = getInputControlModalKey_(modal);
    const formatKey = getInputControlFormatKey_(format);
    const hiddenKeys = getInputControlHiddenKeys_(modalKey, formatKey);
    const lockedKeys = new Set(['schedule_id']);

    if (modalKey === 'deliveryEdit') {
      ['start_date', 'end_date', 'mail_name', 'mail_type', 'cycle', 'format', 'sub_category', 'is_new'].forEach(key => lockedKeys.add(key));
    }
    if (modalKey === 'masterEdit') lockedKeys.add('is_new');
    if (formatKey === 'auto') lockedKeys.add('current_job_count');

    modal.querySelectorAll('.form-group[data-field]').forEach(group => {
      const key = String(group.dataset.field || '').trim();
      if (hiddenKeys.has(key)) {
        setFieldGroupControlState_(modal, key, '非表示');
      } else if (lockedKeys.has(key)) {
        setFieldGroupControlState_(modal, key, 'ロック');
      } else {
        setFieldGroupControlState_(modal, key, '表示');
      }
    });
  }

  function applyAutoJobFieldControls_(modal, isAutoJob) {
    const shouldEnable = isAutoJob || String(modal.dataset.format || '').trim() === 'その他';
    AUTO_JOB_CONTROL_FIELDS.forEach(key => {
      setFieldGroupEnabled_(modal, key, shouldEnable);
    });
  }

  function applyEditModalLockedFieldControls_(modal) {
    EDIT_MODAL_LOCKED_FIELDS.forEach(key => {
      setFieldGroupEnabled_(modal, key, false);
    });
  }

  function applyCurrentJobCountControls_(modal, isAutoJob) {
    const currentJobCountGroup = modal.querySelector('[data-field="current_job_count"]');
    const currentJobCountInput = currentJobCountGroup ? currentJobCountGroup.querySelector('input, select, textarea') : null;
    if (!currentJobCountInput || !currentJobCountGroup) return;
    if (!isAutoJob) return;
    currentJobCountInput.disabled = true;
    currentJobCountInput.readOnly = true;
    currentJobCountInput.placeholder = isAutoJob
      ? '保存後にURLから自動取得されます'
      : '保存後に自動取得されます';
    currentJobCountGroup.classList.add('disabled');
  }

  function applyValidationCycleControls_(modal) {
    const cycleInput = modal.querySelector('[name="cycle"]');
    if (!cycleInput) return;

    const categoryText = [
      getModalFieldValue_(modal, ['mail_type', 'category']),
      getModalFieldValue_(modal, ['sub_category'])
    ].join(' ');
    const isValidation = categoryText.includes('検証');
    cycleInput.required = false;
    cycleInput.removeAttribute('required');
    cycleInput.closest('.form-group')?.classList.toggle('optional-field', isValidation);
  }

  function getModalFieldValue_(modal, names) {
    for (const name of names) {
      const field = modal.querySelector(`[name="${name}"]`);
      if (field && String(field.value || '').trim()) return String(field.value || '').trim();
    }
    return '';
  }

  function applyPrMasterControls_(modal) {
    if (modal.dataset.modalType !== 'pr-master') return;
    const prIdInput = modal.querySelector('[name="pr_id"]');
    if (!prIdInput) return;
    prIdInput.readOnly = true;
    prIdInput.disabled = true;
    prIdInput.placeholder = '保存時に自動採番';
  }

  // 形式ごとの入力制御
  function applyDynamicInputControl(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    const normalizedFormat = String(format || '').trim();
    const isAutoJob = normalizedFormat === '自動求人特集';
    resetModalFieldStates_(modal);
    applyInputControlMatrix_(modal, normalizedFormat);
    applyAutoJobFieldControls_(modal, isAutoJob);

    if (modalId === 'editModal') {
      applyEditModalLockedFieldControls_(modal);
    }

    applyCurrentJobCountControls_(modal, isAutoJob);
    applyValidationCycleControls_(modal);
    applyPrMasterControls_(modal);
  }

  function openAndInitModalWithTab(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    setModalFormatState(modal, format);
  }
  function saveEdit() {
    if (CURRENT_ENTRY && isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は編集できません');
      return;
    }
    if (CURRENT_ENTRY && isStopped(CURRENT_ENTRY)) {
      alert('配信停止中の配信は編集できません。再開してから編集してください。');
      return;
    }

    const modal = document.getElementById('editModal');
    if (!validateRequiredFields_(modal)) return;

    const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    const itemId = getCheckItemId(CURRENT_ENTRY);

    const nextValues = normalizeMasterSubmissionPayload_(
      collectNamedFormValues(modal, { exclude: ['schedule_id', 'current_job_count'] })
    );

    if (String(nextValues.assignee || '').trim() === 'R') {
      nextValues.reviewer = '';
    }

    const overrideFields = [];
    const payload = {
      item_id: itemId,
      schedule_id: CURRENT_ENTRY.schedule_id,
      original_date: CURRENT_ENTRY.target_date,
      delivery_date: CURRENT_ENTRY.target_date,
      hour: CURRENT_ENTRY.hour,
      mail_name: CURRENT_ENTRY.mail_name
    };

    Object.keys(nextValues).forEach(key => {
      const next = normalizeComparableModalValue_(nextValues[key], key);
      const prev = normalizeComparableModalValue_(base[key], key);
      if (next !== prev) {
        overrideFields.push(key);
        payload[key] = nextValues[key];
      }
    });
    payload.override_fields = overrideFields.join(',');

    showBusy('配信内容を保存中...');
    flushPendingCheckStatusesBefore(() => {
      google.script.run
        .withSuccessHandler(() => {
          hideBusy();
          closeModal();
          loadData({ force: true });
        })
        .withFailureHandler(err => {
          hideBusy();
          alert('保存に失敗しました: ' + (err.message || err));
        })
        .saveCheckStatus(itemId, 'occurrence_override', overrideFields.length > 0, payload);
    }, err => {
      hideBusy();
      alert('未保存の設定・確認状態を一括保存できなかったため、配信内容の保存を中止しました: ' + (err.message || String(err)));
    });
  }

  function stopCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }
    if (!confirm('この週の配信を停止し、カレンダーをグレーアウトします。よろしいですか？')) return;

    showBusy('配信停止を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, true);
        CURRENT_ENTRY.is_inactive = true;
        if (CURRENT_ENTRY_BASE) CURRENT_ENTRY_BASE.is_inactive = true;
        renderScheduleGrid();
        setEditState(isFixed(CURRENT_ENTRY), true);
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信停止に失敗しました: ' + (err.message || err));
      })
      .stopDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function resumeCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }

    showBusy('配信再開を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, false);
        CURRENT_ENTRY.is_inactive = false;
        if (CURRENT_ENTRY_BASE) CURRENT_ENTRY_BASE.is_inactive = false;
        renderScheduleGrid();
        setEditState(isFixed(CURRENT_ENTRY), false);
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信再開に失敗しました: ' + (err.message || err));
      })
      .resumeDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function buildAssigneeOptions() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows.map(row => {
      const value = row.initial || row.name || row.full_name || row['略称'] || row['名前'] || row['氏名'] || '';
      const label = row.full_name || row.fullName || row.name || row['氏名'] || row['名前'] || value;
      return `<option value="${escapeAttribute(value)}">${escapeHtml(value)}${label && label !== value ? ` (${escapeHtml(label)})` : ''}</option>`;
    }).join('');
  }

  function getAdminOptionValues() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows
      .map(row => {
        const value = row.initial || row.name || row.full_name || row['略称'] || row['名前'] || row['氏名'] || '';
        const label = row.full_name || row.fullName || row.name || row['氏名'] || row['名前'] || value;
        return value ? { value, label: label && label !== value ? `${value} (${label})` : value } : null;
      })
      .filter(Boolean);
  }

</script>
