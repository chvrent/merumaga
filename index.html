<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="app-shell">
      <nav class="app-tabs" aria-label="画面切り替え">
        <button type="button" class="tab-button active" data-tab="calendar">配信カレンダー</button>
        <button type="button" class="tab-button" data-tab="schedule">メルマガ一覧</button>
        <button type="button" class="tab-button" data-tab="pr">PR管理</button>
      </nav>

      <section id="view-calendar" class="tab-view active">
      <header class="toolbar">
        <div>
          <h1>配信カレンダー</h1>
          <p>開始日を選んで、日別の配信予定を確認・編集します。</p>
          <div class="screen-note">この画面の編集は、選択した日付の配信だけに反映されます。設定・確認が両方赤くなると、その日付分を確定バックアップします。</div>
        </div>
        <div class="toolbar-controls">
          <input type="date" id="startInput" class="hidden-start-input" aria-label="開始日">
          <div class="legend-container toolbar-legend" aria-label="凡例">
            <div class="legend-item"><span class="legend-color" style="background-color: #FFFFFF;"></span>毎週</div>
            <div class="legend-item"><span class="legend-color" style="background-color: #E6E6FA;"></span>特殊配信</div>
            <div class="legend-item"><span class="legend-color" style="background-color: #FFF0F5;"></span>毎月</div>
            <div class="legend-item"><span class="legend-color" style="background-color: #E0FFE0;"></span>隔週A</div>
            <div class="legend-item"><span class="legend-color" style="background-color: #FFD1DC;"></span>隔週B</div>
            <div class="legend-item"><span class="legend-color" style="background-color: #E0FFFF;"></span>自動求人/その他</div>
          </div>
          <button type="button" id="rFillToggle" class="secondary-button toolbar-button" onclick="toggleRFill()">Rをすべて塗りつぶす: OFF</button>
          <button type="button" id="moveModeToggle" class="secondary-button toolbar-button" onclick="toggleMoveMode()">移動: OFF</button>
          <button type="button" class="secondary-button toolbar-button" onclick="jumpToCurrentWeek()">今週</button>
          <label class="field">
            <span>検索</span>
            <input type="text" id="searchInput" placeholder="メルマガ名、曜日、担当者">
          </label>
        </div>
      </header>

      <main class="content">
        <div id="tableContainer" class="table-container"></div>
      </main>
      </section>

      <section id="view-master" class="tab-view">
        <header class="toolbar">
          <div>
            <h1 id="masterTitle">メルマガ一覧</h1>
            <p id="masterDescription">スプレッドシートの最新データを表形式で確認・編集します。</p>
            <div class="screen-note">この画面の編集は、マスタ行を更新します。今日以降に発生する同じメルマガ予定へ反映されます。</div>
          </div>
          <div class="toolbar-controls">
            <label class="field" id="masterSheetField">
              <span>管理対象</span>
              <select id="masterSheetSelect"></select>
            </label>
            <label class="field">
              <span>検索</span>
              <input type="text" id="masterSearchInput" placeholder="キーワード">
            </label>
            <button type="button" class="secondary-button toolbar-button" onclick="loadActiveMaster()">再読込</button>
            <button type="button" class="primary-button toolbar-button" onclick="openMasterModal()">新規追加</button>
          </div>
        </header>

        <div id="masterFilterChips" class="filter-chips"></div>

        <main class="content master-content">
          <div id="masterTableContainer" class="table-container master-table-container"></div>
        </main>
      </section>
    </div>

    <div id="editModal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2>配信編集</h2>
          <button type="button" class="icon-button" onclick="closeModal()" aria-label="閉じる">×</button>
        </div>
        <input type="hidden" id="edit-id">
        <label class="field">
          <span>メルマガ名</span>
          <input type="text" id="edit-name" readonly title="クリックでコピー">
        </label>
        <label class="field">
          <span>通数</span>
          <input type="text" id="edit-count">
        </label>
        <label class="field">
          <span>設定者</span>
          <select id="edit-assignee"></select>
        </label>
        <label class="field">
          <span>確認者</span>
          <select id="edit-reviewer"></select>
        </label>
        <label class="field">
          <span>備考</span>
          <textarea id="edit-notes"></textarea>
        </label>
        <div id="editExtraFields" class="edit-extra-fields"></div>
        <div id="edit-pr-details" class="pr-info-container"></div>
        <section class="comment-panel" aria-label="コメントスレッド">
          <div class="comment-panel-header">
            <h3>コメント</h3>
            <span id="comment-count-label">0件</span>
          </div>
          <div id="comment-thread" class="comment-thread">
            <div class="empty-state">コメントを読み込み中...</div>
          </div>
          <label class="field comment-input-field">
            <span>新しいコメント</span>
            <textarea id="new-comment" placeholder="コメントを入力"></textarea>
          </label>
          <div class="comment-actions">
            <button type="button" class="secondary-button" onclick="loadCommentsForCurrentEntry()">再読込</button>
            <button type="button" class="primary-button" onclick="postComment()">送信</button>
          </div>
        </section>
        <section class="exception-panel" aria-label="配信停止・再開">
          <div id="job-alert-guidance" class="job-alert-guidance" style="display:none;"></div>
          <button type="button" id="stop-delivery-button" class="danger-button" onclick="stopCurrentDelivery()">この週を配信停止にする</button>
          <button type="button" id="resume-delivery-button" class="resume-button" onclick="resumeCurrentDelivery()">配信を再開する（元に戻す）</button>
        </section>
        <div class="modal-actions">
          <button type="button" class="primary-button" onclick="saveEdit()">保存</button>
          <button type="button" class="secondary-button" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>

    <div id="masterModal" class="modal" aria-hidden="true">
      <div class="modal-card master-modal-card">
        <div class="modal-header">
          <h2 id="masterModalTitle">マスタ編集</h2>
          <button type="button" class="icon-button" onclick="closeMasterModal()" aria-label="閉じる">×</button>
        </div>
        <input type="hidden" id="master-row-number">
        <div id="masterForm" class="master-form"></div>
        <div class="modal-actions">
          <button type="button" class="primary-button" onclick="saveMasterEdit()">保存</button>
          <button type="button" class="secondary-button" onclick="closeMasterModal()">キャンセル</button>
        </div>
      </div>
    </div>

    <?!= include('Client'); ?>
  </body>
</html>
