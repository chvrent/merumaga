  gap: 8px !important;
  border-bottom: 2px solid #e2e8f0 !important;

  width: 100% !important;

  display: inline-block !important;

  border: 1px solid #e2e8f0 !important;

  color: #ffffff !important;
  background-color: #1a73e8 !important; /* システム標準の鮮やかな青 */
  border-color: #1a73e8 !important;
  font-weight: bold !important;
}
</style>
<script>
  let APP_DATA = {};
  let CURRENT_ENTRY = null;
  let CURRENT_ENTRY_BASE = null;
  let ACTIVE_MASTER = 'schedule';
  let MASTER_DATA = { sheetName: '', headers: [], rows: [] };
  let IS_MOVE_MODE = false;
  let BUSY_COUNT = 0;
  let BUSY_TIMER = null;
  let LOCAL_CHECK_CHANGES = {};
  let PENDING_CHECK_SAVE_TIMER = null;
  let SORTABLES = [];
  const CHECK_STATUS_STORAGE_KEY = 'mailMagazineMaker.pendingCheckStatuses.v1';
  const MASTER_RENDER_LIMIT = 300;
  let MASTER_SUBCATEGORY_FILTER = '__all__';
  let MASTER_FORMAT_FILTER = '__all__';
  let MASTER_CATEGORY_FILTER = '__all__';
  let MASTER_STATUS_FILTER = 'active';
  let MASTER_NEW_ONLY = false;
  let MASTER_FILTERS = {
    'format:自動求人特集': false,
    'category:イレギュラー': false,
    'category:検証': false
  };
  const CYCLE_BASE_DATE = new Date(2026, 3, 28);
  const DAY_MS = 24 * 60 * 60 * 1000;
  const PR_START_DATE_KEYS = ['start_date', '開始日', '開始'];
  const PR_END_DATE_KEYS = ['end_date', '終了日', '終了'];
  const DISPLAY_NAMES = {
    __rowNumber: '行番号',
    schedule_id: 'ID',
    id: 'ID',
    source_sheet: '元シート',
    source_row: '元行',
    mail_name: 'メルマガ名',
    mail_type: '種別',
    category: '種別',
    sub_category: 'サブカテゴリ',
    sub_category_class: 'サブカテゴリクラス',
    cycle: 'サイクル',
    weekday: '曜日',
    hour: '時間',
    format: '形式',
    delivery_count: '通数',
    assignee: '設定者',
    reviewer: '確認者',
    start_date: '開始日',
    end_date: '終了日',
    pr: 'PR',
    pr_id: 'PR ID',
    pr_text: 'PR本文',
    name: 'PRタイトル',
    insert_position: '挿入位置',
    notes: '備考',
    mail_content: 'メルマガ内容',
    job_url: '自動求人特集URL',
    auto_job_feature_id: '自動求人特集ID',
    target_age: '対象年齢',
    target_address: '対象現住所',
    is_new: '新規',
    current_job_count: '現在求人数',
    job_count_updated_at: '求人数最終取得日時',
    is_inactive: '配信停止',
    is_fixed: '確定済',
    target_ids: 'PRが入るメルマガ',
    target_mails: '紐づいたメルマガ',
    schedule_name: 'スケジュール名',
    target_mail_name: '対象メルマガ',
    mail_target: '対象メルマガ',
    timestamp: '投稿日時',
    user: '投稿者',
    comment_text: 'コメント',
    pr_title: 'PRタイトル'
  };
  const MASTER_ID_HEADERS = {
    app_schedule: ['schedule_id', 'id'],
    app_pr: ['id'],
    app_pr_targets: ['pr_target_id', 'id']
  };
  const MASTER_CONFIG = {
    schedule: {
      title: 'メルマガ一覧',
      description: 'app_schedule の配信マスタを編集します。',
      sheets: [
        { label: '配信マスタ', name: 'app_schedule' }
      ]
    },
    pr: {
      title: 'PR管理',
      description: 'PR本文を主軸とした紐付け管理を行います。',
      sheets: [
        { label: 'PR本文', name: 'app_pr' }
      ]
    }
  };

  function loadData() {
    showBusy('データを読み込み中...');
    const startInput = document.getElementById('startInput');
    const start = startInput && startInput.value ? new Date(startInput.value) : getTuesdayWeekStart(new Date());
    const rangeStart = formatDate(start);
    const rangeEndDate = new Date(start);
    rangeEndDate.setDate(start.getDate() + 6);
    const rangeEnd = formatDate(rangeEndDate);

    google.script.run
      .withSuccessHandler(data => {
        APP_DATA = data || {};
        loadPendingCheckStatuses();
        renderScheduleGrid();
        updatePendingCheckSaveButton();
        if (IS_MOVE_MODE) setTimeout(initDragAndDrop, 100);
        hideBusy();
      })
      .withFailureHandler(err => {
        document.getElementById('tableContainer').innerHTML =
          '<div class="empty-state">データの読み込みに失敗しました: ' + escapeHtml(err.message || String(err)) + '</div>';
        hideBusy();
      })
      .getInitialData({ startDate: rangeStart, endDate: rangeEnd });
  }

  function toggleMoveMode() {
    IS_MOVE_MODE = !IS_MOVE_MODE;
    const btn = document.getElementById('moveModeToggle');
    const shell = document.querySelector('.app-shell');

    if (btn) {
      btn.textContent = `移動: ${IS_MOVE_MODE ? 'ON' : 'OFF'}`;
      btn.classList.toggle('is-active', IS_MOVE_MODE);
    }
    if (shell) shell.classList.toggle('is-move-mode', IS_MOVE_MODE);

    if (IS_MOVE_MODE) {
      initDragAndDrop();
    } else {
      destroyDragAndDrop();
    }
  }

  function showBusy(message) {
    BUSY_COUNT++;
    const overlay = document.getElementById('busyOverlay');
    const messageEl = document.getElementById('busyMessage');
    if (messageEl) messageEl.textContent = message || '処理中...';
    document.body.classList.add('is-busy');
    if (BUSY_TIMER) return;
    BUSY_TIMER = setTimeout(() => {
      BUSY_TIMER = null;
      if (BUSY_COUNT <= 0) return;
      if (overlay) {
        overlay.classList.add('is-active');
        overlay.setAttribute('aria-hidden', 'false');
      }
    }, 350);
  }

  function hideBusy() {
    BUSY_COUNT = Math.max(0, BUSY_COUNT - 1);
    if (BUSY_COUNT > 0) return;
    if (BUSY_TIMER) {
      clearTimeout(BUSY_TIMER);
      BUSY_TIMER = null;
    }
    const overlay = document.getElementById('busyOverlay');
    if (overlay) {
      overlay.classList.remove('is-active');
      overlay.setAttribute('aria-hidden', 'true');
    }
    document.body.classList.remove('is-busy');
  }

  function fillRForDay(dateStr) {
    const updates = [];
    document.querySelectorAll(`#tableContainer td[data-date="${escapeCssValue(dateStr)}"] .check-status-cell[data-check-field="setter"]`).forEach(cell => {
      if (String(cell.textContent || '').trim() !== 'R') return;
      if (cell.classList.contains('archived-cell')) return;
      const itemId = cell.dataset.itemId;
      if (isCheckStatusActive(itemId, 'setter')) return;
      updates.push({
        itemId,
        field: 'setter',
        active: true,
        payload: parseCheckLogPayload(cell.dataset.logPayload)
      });
    });

    if (!updates.length) {
      updatePendingCheckSaveButton();
      return;
    }

    updates.forEach(update => setPendingCheckStatus(update.itemId, update.field, update.active, update.payload));
    schedulePendingCheckPersist();
    renderScheduleGrid();
    updatePendingCheckSaveButton();
  }

  function escapeCssValue(value) {
    if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(String(value || ''));
    return String(value || '').replace(/["\\]/g, '\\$&');
  }

  function initDragAndDrop() {
    destroyDragAndDrop();
    if (typeof Sortable === 'undefined') return;

    const cells = document.querySelectorAll('#tableContainer td[data-date][data-hour]');
    cells.forEach(cell => {
      const s = Sortable.create(cell, {
        group: 'calendar',
        animation: 150,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        filter: '.is-fixed',
        onStart: () => {
          document.querySelectorAll('#tableContainer td[data-date]').forEach(c => c.classList.add('drag-over-target'));
        },
        onEnd: (evt) => {
          document.querySelectorAll('.drag-over-target').forEach(c => c.classList.remove('drag-over-target'));

          const itemEl = evt.item;
          const fromEl = evt.from;
          const toEl = evt.to;

          if (fromEl === toEl) return;

          const scheduleId = itemEl.dataset.scheduleId || itemEl.dataset.itemId;
          const oldDate = itemEl.dataset.originalDate || itemEl.dataset.targetDate;
          const newDate = toEl.dataset.date;
          const newHour = toEl.dataset.hour;

          if (!scheduleId || !newDate || !newHour) return;

          showBusy('配信日時を移動中...');
          google.script.run
            .withSuccessHandler(() => {
              console.log('移動完了');
              hideBusy();
              loadData();
            })
            .withFailureHandler(err => {
              hideBusy();
              alert('移動に失敗しました: ' + err.message);
              loadData();
            })
            .updateItemDate(scheduleId, oldDate, newDate, newHour);
        }
      });
      SORTABLES.push(s);
    });
  }

  function destroyDragAndDrop() {
    SORTABLES.forEach(s => {
      if (s && typeof s.destroy === 'function') s.destroy();
    });
    SORTABLES = [];
  }

  function renderScheduleGrid() {
    const container = document.getElementById('tableContainer');
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const startInput = document.getElementById('startInput');
    const searchInput = document.getElementById('searchInput');
    const start = startInput.value ? new Date(startInput.value) : getTuesdayWeekStart(new Date());
    const keyword = String(searchInput.value || '').trim().toLowerCase();
    const dates = buildDates(start, 7);
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    const holidayDates = getHolidayDateSet();

    if (!startInput.value) {
      startInput.value = formatDateForInput(start);
    }

    const filtered = schedule.filter(row => {
      if (!keyword) return true;
      return [
        row.mail_name,
        row.weekday,
        row.hour,
        row.mail_type || row.category,
        row.cycle,
        row.format,
        row.assignee,
        row.reviewer,
        row.source_sheet
      ]
        .map(value => String(value || '').toLowerCase())
        .join(' ')
        .includes(keyword);
    });

    let html = '<table><thead><tr><th class="time-col" rowspan="2">時間</th>';
    const todayStr = formatDate(new Date());

    dates.forEach((date, index) => {
      const cycleInfo = getCycleInfo(date);
      const monthEndInfo = getMonthEndInfo(date);
      const dateStr = formatDate(date);
      const isWeekend = date.getDay() === 0 || date.getDay() === 6;
      const isHoliday = holidayDates.has(dateStr);
      const isToday = dateStr === todayStr;
      const headerClasses = [
        monthEndInfo.isInWindow ? 'month-end-header' : '',
        isWeekend ? 'is-weekend' : '',
        isHoliday ? 'is-holiday' : '',
        isToday ? 'is-today' : ''
      ].filter(Boolean).join(' ');
      const label = `${date.getMonth() + 1}/${date.getDate()} (${weekdays[date.getDay()]})`;
      const headerDateControl = index === 0
        ? `<input type="date" class="date-header-picker ${isWeekend || isHoliday ? 'is-emphasis-date' : ''} ${isToday ? 'is-today' : ''}" value="${formatDateForInput(date)}" onchange="setCalendarStartDate(this.value)" aria-label="開始日">`
        : `<div class="date-title">${label}</div>`;
      
      const bulkActions = `
        <div class="day-bulk-actions">
           <button type="button" class="bulk-stop-button" data-action="stop-all-for-day" data-date="${escapeAttribute(dateStr)}" title="この日の配信予定をすべて停止します">全停止</button>
           <button type="button" class="bulk-resume-button" data-action="resume-all-for-day" data-date="${escapeAttribute(dateStr)}" title="この日の停止設定をすべて解除します">再開</button>
           <button type="button" class="bulk-r-button" data-action="fill-r-for-day" data-date="${escapeAttribute(dateStr)}" title="この日のR枠だけ設定済みにします">R一括設定</button>
        </div>
      `;

      html += `
        <th class="${headerClasses}">
          <div class="date-header">
            ${headerDateControl}
            ${bulkActions}
            ${monthEndInfo.isInWindow ? '<div class="date-note">月末配信期間</div>' : ''}
            <div class="date-cycles">
              <span class="cycle-chip cycle-chip-${cycleInfo.weekGroup}">${cycleInfo.weekLabel}</span>
              <span class="cycle-chip cycle-chip-${cycleInfo.threeWeekNum}">${cycleInfo.threeWeekLabel}</span>
            </div>
          </div>
        </th>
      `;
    });
    html += '</tr><tr>';
    dates.forEach((date) => {
      const dateStr = formatDate(date);
      const isToday = dateStr === todayStr;
      html += `
        <th class="grid-header-cell ${isToday ? 'is-today' : ''}" style="padding:0; border-top:none;">
          <div class="grid-header">
            <div class="col-name">内容</div>
            <div class="col-count">通数</div>
            <div class="col-setter">設定</div>
            <div class="col-checker">確認</div>
          </div>
        </th>
      `;
    });
    html += '</tr></thead><tbody>';

    for (let hour = 8; hour <= 21; hour++) {
      html += `<tr><td class="time-col">${hour}:00</td>`;
      dates.forEach(date => {
        const dateStr = formatDate(date);
        const isToday = dateStr === todayStr;
        const dayLabel = weekdays[date.getDay()];
        const monthEndInfo = getMonthEndInfo(date);
        const entries = filtered.filter(row => {
          if (isPastDateString(dateStr) && getArchivedOccurrenceForRow(row, dateStr)) return false;
          const rowHour = String(row.hour || '').split(':')[0].trim();
          const startDate = normalizeDateString(row.start_date);
          const endDate = normalizeDateString(row.end_date);
          const prStates = getPrStates(row, dateStr);
          const weekday = normalizeWeekdayLabel(row.weekday);
          const category = String(row.mail_type || row.category || '').trim();
          const rowCycle = normalizeCycleLabel(row.cycle);
          const rowCycleNum = extractCycleNumber(rowCycle);
          const isWithinScheduleRange = (!startDate || startDate <= dateStr) && (!endDate || endDate >= dateStr);

          if (isInactive(row)) return false;

          // この日付/時間における「有効」な状態
          const moveOverride = getMoveOverrideForDate(row, dateStr);
          let isMatch = false;

          if (moveOverride) {
            const effectiveHour = String(moveOverride.hour || '').split(':')[0].trim();
            isMatch = effectiveHour === String(hour);
          } else {
            // 移動先ではない場合、元のスケジュール通りか確認
            // ただし、もし他の日時に移動されている場合はこの枠には出さない
            if (isMovedOriginalOccurrence(row, dateStr)) return false;

            isMatch = (isWithinScheduleRange || prStates.length > 0) &&
              weekday === dayLabel &&
              rowHour === String(hour);

            // サイクル判定も本来の日程で行う
            if (isMatch) {
              if (category.includes('毎月') && !monthEndInfo.isInWindow) isMatch = false;
              else if (rowCycle === 'A' || rowCycle === 'B') {
                if (rowCycle !== getCycleForRow(row, date)) isMatch = false;
              } else if (rowCycleNum != null) {
                const expectedCycle = getCycleForRow(row, date);
                if (typeof expectedCycle !== 'number' || !cycleContains(row.cycle, expectedCycle)) isMatch = false;
              } else if (rowCycle && rowCycle !== '毎週') {
                isMatch = false;
              }
            }
          }
          return isMatch;
        });
        const slotEntries = entries.concat(getArchivedOccurrencesForSlot(dateStr, hour, keyword));
        html += `<td data-date="${dateStr}" data-hour="${hour}:00" class="${isToday ? 'is-today-column' : ''}" style="padding:0;">`;
        if (slotEntries.length) {
          const renderedPrIds = new Set();
          slotEntries.forEach(entry => {
            const entryForDate = Object.assign({}, entry, { target_date: dateStr });
            const moveOverride = getMoveOverrideForDate(entry, dateStr);
            if (moveOverride) {
              if (moveOverride.hour) entryForDate.hour = moveOverride.hour;
              if (moveOverride.original_date) entryForDate.original_date = moveOverride.original_date;
            }

            const effectiveEntry = applyOccurrenceOverrideToEntry(entryForDate);
            const payload = escapeAttribute(encodeURIComponent(JSON.stringify(effectiveEntry)));
            const scheduleId = effectiveEntry.schedule_id || 'unknown';
            const checkItemId = getCheckItemId(entryForDate);
            const subCategoryClass = getSubCategoryClass(effectiveEntry);
            const itemBg = getBgColor(effectiveEntry);
            const fixed = isFixed(entry, dateStr);
            const stopped = !fixed && isStopped(entryForDate);
            const fixedBadge = fixed ? '<span class="fixed-badge">確定済</span>' : '';
            const stoppedBadge = stopped ? '<span class="stopped-badge">配信停止中</span>' : '';
            const jobAlert = getJobCountAlert(effectiveEntry);
            const jobAlertIcon = renderJobAlertIcon(jobAlert);
            const rowTitle = jobAlert ? ` title="${escapeAttribute(getJobAlertTooltip(jobAlert))}"` : '';
            const prLabel = getPrStates(effectiveEntry, dateStr)
              .filter(prState => {
                const key = normalizeText(prState.pr_id);
                if (!key || renderedPrIds.has(key)) return false;
                renderedPrIds.add(key);
                return true;
              })
              .map(prState => `<div class="pr-label pr-label-${prState.status}">${escapeHtml(prState.label)}</div>`)
              .join('');
            html += `
            <div class="delivery-row slot-item ${subCategoryClass} ${fixed ? 'is-fixed' : ''} ${stopped ? 'is-stopped' : ''}" data-action="open-modal" data-entry="${payload}" data-item-id="${escapeAttribute(scheduleId)}" data-schedule-id="${escapeAttribute(scheduleId)}" data-target-date="${escapeAttribute(dateStr)}" data-original-date="${escapeAttribute(effectiveEntry.original_date || dateStr)}" style="background-color: ${itemBg};"${rowTitle}>
              <div class="col-name">
                <div class="mail-name">
                  ${jobAlertIcon}
                  ${escapeHtml(effectiveEntry.mail_name)}
                  ${fixedBadge}
                  ${stoppedBadge}
                  ${renderCommentBadge(entryForDate)}
                </div>
                ${prLabel}
              </div>
              <div class="col-count">${escapeHtml(effectiveEntry.delivery_count)}</div>
              ${renderCheckStatusCell(checkItemId, 'setter', effectiveEntry.assignee, 'col-setter', entryForDate)}
              ${renderCheckStatusCell(checkItemId, 'checker', effectiveEntry.reviewer, 'col-checker', entryForDate)}
            </div>
          `;
          });
        } else {
          html += '&nbsp;';
        }
        html += '</td>';
      });
      html += '</tr>';
    }

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function switchTab(tabName) {
    document.querySelectorAll('.tab-button').forEach(button => {
      button.classList.toggle('active', button.dataset.tab === tabName);
    });

    document.getElementById('view-calendar').classList.toggle('active', tabName === 'calendar');
    document.getElementById('view-master').classList.toggle('active', tabName !== 'calendar');

    if (tabName !== 'calendar') {
      ACTIVE_MASTER = tabName;
      setupMasterView(tabName);
      loadActiveMaster();
    }
  }

  function setupMasterView(tabName) {
    const config = MASTER_CONFIG[tabName];
    if (!config) return;

    document.getElementById('masterTitle').textContent = config.title;
    document.getElementById('masterDescription').textContent = config.description;

    const select = document.getElementById('masterSheetSelect');
    select.innerHTML = config.sheets
      .map(sheet => `<option value="${escapeAttribute(sheet.name)}">${escapeHtml(sheet.label)}</option>`)
      .join('');
    document.getElementById('masterSheetField').style.display = config.sheets.length > 1 ? 'grid' : 'none';
  }

  function loadActiveMaster() {
    const sheetName = document.getElementById('masterSheetSelect').value || getActiveMasterSheetName();
    const container = document.getElementById('masterTableContainer');
    container.innerHTML = '<div class="empty-state">読み込み中...</div>';

    const successHandler = data => {
      try {
        MASTER_DATA = data || { sheetName, headers: [], rows: [] };
        if (!Array.isArray(MASTER_DATA.headers)) MASTER_DATA.headers = [];
        if (!Array.isArray(MASTER_DATA.rows)) MASTER_DATA.rows = [];
        renderMasterFilterChips();
        renderMasterTable();
      } catch (error) {
        container.innerHTML = '<div class="empty-state">マスタ表示の描画に失敗しました: ' + escapeHtml(error.message || String(error)) + '</div>';
        console.error(error);
      }
    };
    const failureHandler = err => {
      container.innerHTML = '<div class="empty-state">マスタの読み込みに失敗しました: ' + escapeHtml(err.message || String(err)) + '</div>';
    };

    if (sheetName === 'app_pr') {
      google.script.run
        .withSuccessHandler(successHandler)
        .withFailureHandler(failureHandler)
        .getPRData();
    } else {
      google.script.run
        .withSuccessHandler(successHandler)
        .withFailureHandler(failureHandler)
        .getMasterData(sheetName);
    }
  }

  function renderMasterFilterChips() {
    const container = document.getElementById('masterFilterChips');
    if (!container) return;

    if (MASTER_DATA.sheetName !== 'app_schedule') {
      container.innerHTML = '';
      container.style.display = 'none';
      MASTER_SUBCATEGORY_FILTER = '__all__';
      MASTER_FORMAT_FILTER = '__all__';
      MASTER_CATEGORY_FILTER = '__all__';
      MASTER_STATUS_FILTER = 'active';
      MASTER_NEW_ONLY = false;
      return;
    }

    container.style.display = 'flex';
    const headers = MASTER_DATA.headers || [];
    const subCategoryHeader = headers.find(h => ['sub_category', 'サブカテゴリ'].includes(String(h || '').trim())) || '';
    const formatHeader = headers.find(h => ['format', '形式'].includes(String(h || '').trim())) || '';
    const mailTypeHeader = headers.find(h => ['mail_type', 'category', '種別'].includes(String(h || '').trim())) || '';

    const uniqValues = header => {
      if (!header) return [];
      const set = new Set();
      (MASTER_DATA.rows || []).forEach(row => {
        const v = String((row && row[header]) || '').trim();
        if (v) set.add(v);
      });
      return Array.from(set).sort((a, b) => a.localeCompare(b, 'ja'));
    };

    const subCategories = uniqValues(subCategoryHeader);
    const formats = uniqValues(formatHeader);
    const categories = uniqValues(mailTypeHeader);

    const subCategorySelect = subCategories.length ? `
      <select id="masterSubCategorySelect" class="filter-select" onchange="setMasterSubCategoryFilter(this.value)">
        <option value="__all__" ${MASTER_SUBCATEGORY_FILTER === '__all__' ? 'selected' : ''}>サブカテゴリ: すべて</option>
        <option value="__contains:商品" ${MASTER_SUBCATEGORY_FILTER === '__contains:商品' ? 'selected' : ''}>サブカテゴリ: 商品</option>
        ${subCategories.map(v => `<option value="${escapeAttribute(v)}" ${v === MASTER_SUBCATEGORY_FILTER ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('')}
      </select>
    ` : '';
    const statusSelect = `
      <select id="masterStatusSelect" class="filter-select" onchange="setMasterStatusFilter(this.value)">

  function renderMasterTable() {
    const container = document.getElementById('masterTableContainer');
    const headers = MASTER_DATA.headers || [];
    const visibleHeaders = getVisibleMasterHeaders(headers);
    const searchInput = document.getElementById('masterSearchInput');
    const keyword = String(searchInput ? searchInput.value : '').trim().toLowerCase();

    const subCategoryHeader = headers.find(h => ['sub_category', 'サブカテゴリ'].includes(String(h || '').trim())) || '';
    const formatHeader = headers.find(h => ['format', '形式'].includes(String(h || '').trim())) || '';
    const mailTypeHeader = headers.find(h => ['mail_type', 'category', '種別'].includes(String(h || '').trim())) || '';
    const endDateHeader = headers.find(h => ['end_date', '終了日'].includes(String(h || '').trim())) || '';
    const isNewHeader = headers.find(h => ['is_new', 'new_flag', '新規'].includes(String(h || '').trim())) || '';

    const rows = (MASTER_DATA.rows || []).filter(row => {
      // 検索キーワードフィルター
      if (keyword && !headers.map(header => row[header] == null ? '' : String(row[header])).join(' ').toLowerCase().includes(keyword)) {
        return false;
      }

      // サブカテゴリフィルター (app_schedule のみ適用)
      if (MASTER_DATA.sheetName === 'app_schedule' && MASTER_SUBCATEGORY_FILTER !== '__all__' && subCategoryHeader) {
        const v = String(row[subCategoryHeader] || '').trim();
        if (MASTER_SUBCATEGORY_FILTER === '__contains:商品') {
          if (!v.includes('商品')) return false;
        } else if (v !== MASTER_SUBCATEGORY_FILTER) {
          return false;
        }
      }

      // 形式フィルター (app_schedule のみ適用)
      if (MASTER_DATA.sheetName === 'app_schedule' && MASTER_FORMAT_FILTER !== '__all__' && formatHeader) {
        if (String(row[formatHeader] || '').trim() !== MASTER_FORMAT_FILTER) return false;
      }

      // 種別フィルター (app_schedule のみ適用)
      if (MASTER_DATA.sheetName === 'app_schedule' && MASTER_CATEGORY_FILTER !== '__all__' && mailTypeHeader) {
        if (String(row[mailTypeHeader] || '').trim() !== MASTER_CATEGORY_FILTER) return false;
      }

      // 状態フィルター (app_schedule のみ適用)
      if (MASTER_DATA.sheetName === 'app_schedule' && endDateHeader) {
        const endDate = normalizeDateString(row[endDateHeader]);
        const today = formatDate(new Date());
        const isEnded = !!endDate && endDate < today;
        if (MASTER_STATUS_FILTER === 'active' && isEnded) return false;
        if (MASTER_STATUS_FILTER === 'ended' && !isEnded) return false;
      }

      if (MASTER_DATA.sheetName === 'app_schedule' && MASTER_NEW_ONLY && isNewHeader) {
        if (!isTruthyValue(row[isNewHeader])) return false;
      }

      return true;
    });

    if (!headers.length) {
      container.innerHTML = '<div class="empty-state">ヘッダー行がありません。</div>';
      return;
    }

    const visibleRows = rows.slice(0, MASTER_RENDER_LIMIT);
    const isLimited = rows.length > visibleRows.length;

    let html = `
      <div class="master-result-summary">
        ${escapeHtml(String(rows.length))}件中 ${escapeHtml(String(visibleRows.length))}件を表示
        ${isLimited ? `<span>表示を絞るには検索またはフィルタを使ってください。</span>` : ''}
      </div>
      <table class="master-table"><thead><tr><th class="actions-col">操作</th>
    `;

    // PR管理画面では紐づいたメルマガを最後に1列だけ表示する。
    const targetHeader = MASTER_DATA.sheetName === 'app_pr' ? 'target_mails' : '';
    const tableHeaders = visibleHeaders.filter(h => {
      if (!targetHeader) return true;
      return h !== 'target_mails' && h !== 'mail_name';
    });
    tableHeaders.forEach(header => {
      html += `<th title="${escapeAttribute(header)}">${escapeHtml(getDisplayName(header))}</th>`;
    });
    if (targetHeader) html += `<th>紐づいたメルマガ</th>`;
    html += '</tr></thead><tbody>';

    visibleRows.forEach(row => {
      const linkedNames = row.target_mails || row.mail_name || '（未設定）';
      const encodedRow = escapeAttribute(encodeURIComponent(JSON.stringify(row)));

      html += `
      <tr>
      <td class="actions-col">
        <button type="button" class="table-action-button" data-action="open-master-modal" data-row="${encodedRow}">編集</button>
        <button type="button" class="table-action-button danger" data-action="delete-master-row" data-row-number="${escapeAttribute(row.__rowNumber)}">削除</button>
      </td>
    `;

      tableHeaders.forEach(h => {
        const cellValue = row[h] == null ? '' : String(row[h]);
        const isExpandable = cellValue.length > 60 || cellValue.includes('\n');
        html += `<td class="${isExpandable ? 'expandable-cell' : ''}" ${isExpandable ? 'data-action="toggle-cell-expand"' : ''} title="${escapeAttribute(cellValue)}">${escapeHtml(cellValue)}</td>`;
      });

      if (targetHeader) html += `<td>${escapeHtml(linkedNames)}</td>`;
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function getNewsletterNameMap_() { // 509行目：独立した関数として開始
    const map = {};

  function updateMasterFormFields() {
    const modal = document.getElementById('masterModal');
    const format = String(modal && modal.dataset.format ? modal.dataset.format : 'フリー');
    const fields = {
      'auto_job_feature_id': ['自動求人特集', 'その他'],
      'job_url': ['自動求人特集', 'その他'],

    };

      if (fieldContainer) {
        const isActive = fields[key].includes(format) || format === 'その他';
        fieldContainer.classList.toggle('disabled', !isActive);
        const inputs = fieldContainer.querySelectorAll('input, select, textarea');
        inputs.forEach(input => input.disabled = !isActive);
      }
    });

  function openMasterModal(encodedRow) {
    const row = encodedRow ? JSON.parse(decodeURIComponent(encodedRow)) : {};
    const headers = MASTER_DATA.headers || [];
    const visibleHeaders = getVisibleMasterHeaders(headers);
    const form = document.getElementById('masterForm');
    const modal = document.getElementById('masterModal');
    const isPrMaster = MASTER_DATA.sheetName === 'app_pr';
    const mode = row.__rowNumber ? 'edit' : 'master';
    const tabsContainer = modal ? modal.querySelector('.modal-tabs-container') : null;

    document.getElementById('masterModalTitle').textContent = row.__rowNumber ? 'マスタ編集' : 'マスタ新規追加';
    document.getElementById('master-row-number').value = row.__rowNumber || '';
    if (tabsContainer) tabsContainer.style.display = isPrMaster ? 'none' : '';
    if (modal) modal.dataset.modalType = isPrMaster ? 'pr-master' : 'master';
    if (modal) modal.dataset.format = isPrMaster ? 'PRマスタ' : (row.format || 'フリー');

    // マスタモーダル用の一貫したフィールド生成 (form-grid対応)
    const html = visibleHeaders.map(header => {
      if (isPrMaster && (header === 'target_ids' || header === 'is_inactive' || header === '配信停止')) return '';
      if (isHiddenMasterInputHeader(header)) return '';

      const key = normalizeScheduleEditKey_(header);
      if (key === 'format') return '';
      const value = row[key] != null ? row[key] : row[header];
      const isFullWidth = ['mail_content', 'notes'].includes(key);
      const input = renderMasterFieldInput_(header, key, value, mode);
      if (input === '') return '';

      return `<div class="form-group ${isFullWidth ? 'full-width' : ''}" data-field="${escapeAttribute(key)}"><label>${escapeHtml(getDisplayName(key))}</label>${input}</div>`;
    }).join('');

    form.innerHTML = html;

    if (isPrMaster) {
      const formatGroup = form.querySelector('[data-field="format"]');
      if (formatGroup) formatGroup.style.display = 'none';
      form.insertAdjacentHTML('beforeend', renderNewsletterSelector_(row.pr_id));
    }

    // タブの初期化とルール適用
    populateModalFields(form, row, getModalFieldAliases_('masterModal'));
    refreshAdminSelects_();

    if (modal) {
      const prIdField = modal.querySelector('[name="pr_id"]');
      if (prIdField) {
        prIdField.readOnly = true;
        prIdField.disabled = true;
        prIdField.placeholder = '保存時に自動採番';
      }
      window.openAndInitModalWithTab(isPrMaster ? 'PRマスタ' : (row.format || 'フリー'), 'masterModal');
      modal.style.display = 'flex';
      modal.setAttribute('aria-hidden', 'false');
    }
  }

  function renderNewsletterSelector_(prId) {
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const prTargets = Array.isArray(APP_DATA.prTargets) ? APP_DATA.prTargets : [];

    // 現在紐付いているメルマガ名のセットを作成
    const linkedMailNames = new Set(
      prTargets.filter(t => String(t.pr_id) === String(prId)).map(t => String(t.mail_name))
    );

    // メルマガ一覧を mail_name でユニーク化
    const uniqueNewsletters = [];
    const seenNames = new Set();
    schedule.forEach(item => {
      const name = String(item.mail_name || '').trim();
      if (name && !seenNames.has(name)) {
        uniqueNewsletters.push({ name });
        seenNames.add(name);
      }
    });

    uniqueNewsletters.sort((a, b) => a.name.localeCompare(b.name));

    return `
      <div class="newsletter-selector">
        <div class="newsletter-selector-header">
          <strong>PRが入るメルマガを選択 (全${uniqueNewsletters.length}件)</strong>
          <input type="text" class="newsletter-selector-search" placeholder="メルマガ名で検索..." oninput="filterNewsletterList_(this.value)">
        </div>
        <div id="newsletterList" class="newsletter-list">
          ${uniqueNewsletters.map(nl => `
            <label class="newsletter-item">
              <input type="checkbox" data-target-name="${escapeAttribute(nl.name)}" ${linkedMailNames.has(nl.name) ? 'checked' : ''}>
              <span>${escapeHtml(nl.name)}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }

  function populateModalFields(modal, entry, aliasMap) {
    if (!modal || !entry) return;

    modal.querySelectorAll('[name]').forEach(input => {
      if (input.type === 'hidden') return;
      const name = input.name;
      const aliases = aliasMap[name] || [name];
      const value = getValueByKeys(entry, aliases);
      if (input.type === 'checkbox') {
        input.checked = isTruthyValue(value);
        return;
      }
      input.value = value != null ? value : '';
    });
  }

  function buildUniqueScheduleValues_(key) {
    const set = new Set();
    (APP_DATA.schedule || []).forEach(row => {
      const v = String((row && row[key]) || '').trim();
      if (v) set.add(v);
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'ja'));

  function normalizeScheduleEditKey_(header) {
    const key = String(header == null ? '' : header).trim();
    const lower = key.toLowerCase();
    const map = {
      'メルマガ内容': 'mail_content',
      '通数': 'delivery_count',
      '設定者': 'assignee',
      '確認者': 'reviewer',
      '備考': 'notes',
      '種別': 'mail_type',
      'category': 'mail_type',
      'サブカテゴリ': 'sub_category',
      '形式': 'format',
      '曜日': 'weekday',
      '時間': 'hour',
      '開始': 'start_date',
      '開始日': 'start_date',
      '終了': 'end_date',
      '終了日': 'end_date',
      '自動求人特集URL': 'job_url',
      '求人URL': 'job_url',
      '自動求人特集ID': 'auto_job_feature_id',
      '対象年齢': 'target_age',
      '対象現住所': 'target_address',
      'is_new': 'is_new',
      'new_flag': 'is_new',
      '新規': 'is_new',
      'サイクル': 'cycle',
      'PR': 'pr'
    };
    if (map[key]) return map[key];
    if ([
      'schedule_id',
      'mail_name',
      'delivery_count',
      'assignee',
      'reviewer',
      'notes',
      'mail_type',
      'category',
      'sub_category',
      'format',
      'weekday',
      'hour',
      'start_date',
      'end_date',
      'job_url',
      'auto_job_feature_id',
      'target_age',
      'target_address',
      'is_new',
      'cycle',
      'pr'
    ].includes(lower)) return lower;
    return key;
  }

  function renderEditModalFields_(entry) {

    if (!container) return;

      'schedule_id',

      'mail_name',
