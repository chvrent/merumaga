  function getWeekRangeForLoad_() {
    const startInput = document.getElementById('startInput');
    const start = startInput && startInput.value ? new Date(startInput.value) : getTuesdayWeekStart(getEffectiveToday());
    const rangeStart = formatDate(start);
    const rangeEndDate = new Date(start);
    rangeEndDate.setDate(start.getDate() + 6);
    const rangeEnd = formatDate(rangeEndDate);
    return { start, rangeStart, rangeEnd, cacheKey: `${rangeStart}|${rangeEnd}` };
  }

  function invalidatePrLookupIndex_() {
    if (APP_DATA) APP_DATA._prLookup = null;
  }

  function ensurePrLookupIndex_() {
    if (APP_DATA && APP_DATA._prLookup) return APP_DATA._prLookup;

    const prRows = Array.isArray(APP_DATA.pr) ? APP_DATA.pr.filter(prRow => !isInactive(prRow) && !isDraft(prRow)) : [];
    const prById = new Map();
    const prsByScheduleId = new Map();
    const prsByMailName = new Map();

    prRows.forEach(prRow => {
      const prId = getPrLinkIdFromMasterRow_(prRow);
      if (prId) prById.set(normalizeIdKey(prId), prRow);
      String(getValueByKeys(prRow, ['target_ids', '紐付けID']) || '')
        .split(',')
        .map(part => normalizeIdKey(part.trim()))
        .filter(Boolean)
        .forEach(scheduleId => {
          if (!prsByScheduleId.has(scheduleId)) prsByScheduleId.set(scheduleId, []);
          prsByScheduleId.get(scheduleId).push(prRow);
        });
      ['mail_name', 'メルマガ名', 'target_mail_name', '対象メルマガ'].forEach(key => {
        const mailName = prRow[key] ? normalizeText(String(prRow[key])) : '';
        if (!mailName) return;
        if (!prsByMailName.has(mailName)) prsByMailName.set(mailName, []);
        prsByMailName.get(mailName).push(prRow);
      });
    });

    const prTargets = Array.isArray(APP_DATA.prTargets)
      ? APP_DATA.prTargets.filter(target => !isInactive(target) && !isDraft(target))
      : [];
    const targetsByMailName = new Map();
    prTargets.forEach(target => {
      const mailName = getPrTargetMailName_(target) ||
        normalizeText(getValueByKeys(target, ['mail_name', 'メルマガ内容', 'target_mail_name', '対象メルマガ']));
      if (!mailName) return;
      if (!targetsByMailName.has(mailName)) targetsByMailName.set(mailName, []);
      targetsByMailName.get(mailName).push(target);
    });

    APP_DATA._prLookup = { prById, prsByScheduleId, prsByMailName, targetsByMailName, prRows };
    return APP_DATA._prLookup;
  }

  function applyLoadedData_(data, cacheKey, cacheable, options) {
    const applyOptions = options || {};
    const nextData = data || {};
    // サーバーの getCheckStatuses_ は setter/checker フィールドを返さないため、
    // loadData 後もセッション中に設定した setter/checker 状態(= true)が消えないよう維持する
    if (DATA_STATIC_READY && nextData.checkStatuses && APP_DATA.checkStatuses) {
      Object.keys(APP_DATA.checkStatuses).forEach(key => {
        if (APP_DATA.checkStatuses[key] === true && !Object.prototype.hasOwnProperty.call(nextData.checkStatuses, key)) {
          nextData.checkStatuses[key] = true;
        }
      });
    }
    APP_DATA = DATA_STATIC_READY
      ? Object.assign({}, APP_DATA, nextData)
      : nextData;
    DATA_STATIC_READY = true;
    LAST_SUCCESSFUL_LOAD_AT = Date.now();
    if (Object.prototype.hasOwnProperty.call(nextData, 'pr') || Object.prototype.hasOwnProperty.call(nextData, 'prTargets')) {
      invalidatePrLookupIndex_();
    }
    if (cacheable && cacheKey) {
      WEEK_DATA_CACHE[cacheKey] = {
        cachedAt: Date.now(),
        commentCounts: APP_DATA.commentCounts || {},
        fixedOccurrences: APP_DATA.fixedOccurrences || {},
        archivedOccurrences: APP_DATA.archivedOccurrences || {},
        stoppedOccurrences: APP_DATA.stoppedOccurrences || {},
        checkStatuses: APP_DATA.checkStatuses || {}
      };
    }
    if (applyOptions.skipRender) return;
    loadPendingCheckStatuses();
    renderScheduleGrid();
    updatePendingCheckSaveButton();
    if (IS_MOVE_MODE) setTimeout(initDragAndDrop, 100);
  }

  function getFreshWeekDataCache_(cacheKey) {
    const cached = WEEK_DATA_CACHE[cacheKey];
    if (!cached) return null;
    if (Date.now() - Number(cached.cachedAt || 0) > WEEK_DATA_CACHE_TTL_MS) {
      delete WEEK_DATA_CACHE[cacheKey];
      return null;
    }
    return cached;
  }

  function invalidateWeekDataCache(cacheKey) {
    if (cacheKey) {
      delete WEEK_DATA_CACHE[cacheKey];
      return;
    }
    Object.keys(WEEK_DATA_CACHE).forEach(key => delete WEEK_DATA_CACHE[key]);
  }

  function invalidateAllDataCache() {
    DATA_STATIC_READY = false;
    invalidateWeekDataCache();
  }

  function loadData(options = {}) {
    const loadOptions = (options && typeof options === 'object') ? options : {};
    const { rangeStart, rangeEnd, cacheKey } = getWeekRangeForLoad_();

    if (loadOptions.includeStatic) invalidateAllDataCache();
    if (loadOptions.force) invalidateWeekDataCache(cacheKey);

    const cachedWeekData = !loadOptions.force ? getFreshWeekDataCache_(cacheKey) : null;
    if (DATA_STATIC_READY && cachedWeekData) {
      if (loadOptions.resumeOnly) return;
      applyLoadedData_(cachedWeekData, cacheKey, false);
      return;
    }
    if (loadOptions.resumeOnly && DATA_STATIC_READY) {
      const age = Date.now() - LAST_SUCCESSFUL_LOAD_AT;
      if (age < RESUME_REFRESH_COOLDOWN_MS) return;
    }

    if (DATA_LOAD_IN_FLIGHT_KEY === cacheKey) {
      if (!loadOptions.force) return;
      DATA_LOAD_GENERATION++;
    }
    DATA_LOAD_IN_FLIGHT_KEY = cacheKey;
    const myGen = DATA_LOAD_GENERATION;
    if (!loadOptions.silent) showBusy('データを読み込み中...');
    const runner = google.script.run
      .withSuccessHandler(data => {
        if (DATA_LOAD_GENERATION !== myGen) { if (!loadOptions.silent) hideBusy(); return; }
        applyLoadedData_(data, cacheKey, true);
        if (DATA_LOAD_IN_FLIGHT_KEY === cacheKey) DATA_LOAD_IN_FLIGHT_KEY = '';
        if (!loadOptions.silent) hideBusy();
      })
      .withFailureHandler(err => {
        if (DATA_LOAD_GENERATION !== myGen) { if (!loadOptions.silent) hideBusy(); return; }
        if (DATA_LOAD_IN_FLIGHT_KEY === cacheKey) DATA_LOAD_IN_FLIGHT_KEY = '';
        document.getElementById('tableContainer').innerHTML =
          '<div class="empty-state">データの読み込みに失敗しました: ' + escapeHtml(err.message || String(err)) + '</div>';
        if (!loadOptions.silent) hideBusy();
      });

    if (DATA_STATIC_READY && !loadOptions.includeStatic) {
      runner.getOperationalData({ startDate: rangeStart, endDate: rangeEnd });
    } else {
      runner.getInitialData({ startDate: rangeStart, endDate: rangeEnd });
    }
  }

  function toggleMoveMode() {
    IS_MOVE_MODE = !IS_MOVE_MODE;
    const shell = document.querySelector('.app-shell');

    if (shell) shell.classList.toggle('is-move-mode', IS_MOVE_MODE);

    if (IS_MOVE_MODE) {
      initDragAndDrop();
      updateMoveModeToggleLabel_();
    } else {
      destroyDragAndDrop();
      // ⑦ OFF時に貯めた移動をまとめて送信する。
      flushPendingMoves_();
      updateMoveModeToggleLabel_();
    }
  }

  // 移動モードトグルの表示更新（保留件数も表示）
  function updateMoveModeToggleLabel_() {
    const btn = document.getElementById('moveModeToggle');
    if (!btn) return;
    const pending = PENDING_MOVES.size;
    if (IS_MOVE_MODE) {
      btn.textContent = pending > 0 ? `移動: ON (${pending}件保留)` : '移動: ON';
    } else {
      btn.textContent = '移動: OFF';
    }
    btn.classList.toggle('is-active', IS_MOVE_MODE);
    btn.classList.toggle('has-pending', IS_MOVE_MODE && pending > 0);
  }

  // ⑦ バッファした移動を一括送信する。
  function flushPendingMoves_() {
    const moves = Array.from(PENDING_MOVES.values());
    PENDING_MOVES.clear();
    if (!moves.length) return;

    showBusy(`配信日時を移動中... (${moves.length}件)`);
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadData({ force: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('移動に失敗しました: ' + (err && err.message ? err.message : err));
        loadData({ force: true });
      })
      .updateItemDates(moves);
  }

  function showBusy(message) {
    BUSY_COUNT++;
    const overlay = document.getElementById('busyOverlay');
    const messageEl = document.getElementById('busyMessage');
    if (messageEl) messageEl.textContent = message || '処理中...';
    document.body.classList.add('is-busy');
    if (BUSY_TIMER) return;
    BUSY_TIMER = setTimeout(() => {
      BUSY_TIMER = null;
      if (BUSY_COUNT <= 0) return;
      if (overlay) {
        overlay.classList.add('is-active');
        overlay.setAttribute('aria-hidden', 'false');
      }
    }, 350);
  }

  function hideBusy() {
    BUSY_COUNT = Math.max(0, BUSY_COUNT - 1);
    if (BUSY_COUNT > 0) return;
    if (BUSY_TIMER) {
      clearTimeout(BUSY_TIMER);
      BUSY_TIMER = null;
    }
    const overlay = document.getElementById('busyOverlay');
    if (overlay) {
      overlay.classList.remove('is-active');
      overlay.setAttribute('aria-hidden', 'true');
    }
    document.body.classList.remove('is-busy');
  }

  function isAnyModalOpen_() {
    return Array.from(document.querySelectorAll('.modal')).some(modal => {
      if (modal.getAttribute('aria-hidden') === 'false') return true;
      const style = window.getComputedStyle(modal);
      return style.display !== 'none' && style.visibility !== 'hidden';
    });
  }

  function escapeCssValue(value) {
    if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(String(value || ''));
    return String(value || '').replace(/["\\]/g, '\\$&');
  }

  function initDragAndDrop() {
    destroyDragAndDrop();
    if (typeof Sortable === 'undefined') return;

    const cells = document.querySelectorAll('#tableContainer td[data-date][data-hour]');
    cells.forEach(cell => {
      const s = Sortable.create(cell, {
        group: 'calendar',
        animation: 150,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        filter: '.is-fixed',
        onStart: () => {
          document.querySelectorAll('#tableContainer td[data-date]').forEach(c => c.classList.add('drag-over-target'));
        },
        onEnd: (evt) => {
          document.querySelectorAll('.drag-over-target').forEach(c => c.classList.remove('drag-over-target'));

          const itemEl = evt.item;
          const fromEl = evt.from;
          const toEl = evt.to;

          if (fromEl === toEl) return;

          const scheduleId = itemEl.dataset.scheduleId || itemEl.dataset.itemId;
          const oldDate = itemEl.dataset.originalDate || itemEl.dataset.targetDate;
          const newDate = toEl.dataset.date;
          const newHour = toEl.dataset.hour;

          if (!scheduleId || !newDate || !newHour) return;

          // ⑦ 即時送信せずバッファに貯める。送信は移動モードOFF時にまとめて行う。
          // oldDate(=originalDate) はサーバ側の発生分識別子なので、同一アイテムを
          // 複数回動かしてもキーは不変。最終移動先で上書きされる。
          const moveKey = `${scheduleId}|${oldDate}`;
          PENDING_MOVES.set(moveKey, { scheduleId, oldDate, newDate, newHour });
          itemEl.classList.add('is-pending-move');
          updateMoveModeToggleLabel_();
        }
      });
      SORTABLES.push(s);
    });
  }

  function destroyDragAndDrop() {
    SORTABLES.forEach(s => {
      if (s && typeof s.destroy === 'function') s.destroy();
    });
    SORTABLES = [];
  }

  // rAF ラッパー: 同一フレーム内の連続呼び出しを1回に間引く
  function renderScheduleGrid() {
    if (RENDER_GRID_FRAME) cancelAnimationFrame(RENDER_GRID_FRAME);
    RENDER_GRID_FRAME = requestAnimationFrame(() => {
      RENDER_GRID_FRAME = null;
      renderScheduleGridNow_();
    });
  }

  function renderScheduleGridNow_() {
    const container = document.getElementById('tableContainer');
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const startInput = document.getElementById('startInput');
    const searchInput = document.getElementById('searchInput');
    const start = startInput.value ? new Date(startInput.value) : getTuesdayWeekStart(getEffectiveToday());
    const keyword = String(searchInput.value || '').trim().toLowerCase();
    const dates = buildDates(start, 7);
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    const holidayDates = getHolidayDateSet();

    if (!startInput.value) {
      startInput.value = formatDateForInput(start);
    }

    const filtered = schedule.filter(row => {
      if (!keyword) return true;
      return [
        row.mail_name,
        row.weekday,
        row.hour,
        row.mail_type || row.category,
        row.cycle,
        row.format,
        row.assignee,
        row.reviewer,
        row.source_sheet
      ]
        .map(value => String(value || '').toLowerCase())
        .join(' ')
        .includes(keyword);
    });

    // スロットマップを事前構築: O(7N + A) で済む（従来は O(98N + 98A)）
    const scheduleSlotMap = buildScheduleSlotMap_(filtered, dates, weekdays);
    const archivedSlotMap = buildArchivedSlotMap_(keyword);

    let html = '<table><thead><tr><th class="time-col" rowspan="2">時間</th>';
    const todayStr = formatDate(new Date());

    dates.forEach((date, index) => {
      const cycleInfo = getCycleInfo(date);
      const monthEndInfo = getMonthEndInfo(date);
      const dateStr = formatDate(date);
      const isWeekend = date.getDay() === 0 || date.getDay() === 6;
      const isHoliday = holidayDates.has(dateStr);
      const isToday = dateStr === todayStr;
      const headerClasses = [
        monthEndInfo.isInWindow ? 'month-end-header' : '',
        isWeekend ? 'is-weekend' : '',
        isHoliday ? 'is-holiday' : '',
        isToday ? 'is-today' : ''
      ].filter(Boolean).join(' ');
      const label = `${date.getMonth() + 1}/${date.getDate()} (${weekdays[date.getDay()]})`;
      const headerDateControl = index === 0
        ? `<input type="date" class="date-header-picker ${isWeekend || isHoliday ? 'is-emphasis-date' : ''} ${isToday ? 'is-today' : ''}" value="${formatDateForInput(date)}" onchange="setCalendarStartDate(this.value)" aria-label="開始日">`
        : `<div class="date-title">${label}</div>`;

      const bulkActions = `
        <div class="day-bulk-actions">
           <button type="button" class="bulk-stop-button" data-action="stop-all-for-day" data-date="${escapeAttribute(dateStr)}" title="この日の配信予定をすべて停止します">全停止</button>
           <button type="button" class="bulk-resume-button" data-action="resume-all-for-day" data-date="${escapeAttribute(dateStr)}" title="この日の停止設定をすべて解除します">再開</button>
           <button type="button" class="bulk-r-button" data-action="fill-r-for-day" data-date="${escapeAttribute(dateStr)}" title="この日のR枠を一括確定します">R確定</button>
        </div>
      `;

      html += `
        <th class="${headerClasses}">
          <div class="date-header">
            ${headerDateControl}
            <div class="date-cycles">
              <span class="cycle-chip cycle-chip-${cycleInfo.weekGroup}">${cycleInfo.weekLabel}</span>
              <span class="cycle-chip cycle-chip-${cycleInfo.threeWeekNum}">${cycleInfo.threeWeekLabel}</span>
              ${monthEndInfo.isInWindow ? '<span class="date-note">月末配信</span>' : ''}
            </div>
            ${bulkActions}
          </div>
        </th>
      `;
    });
    html += '</tr><tr>';
    dates.forEach((date) => {
      const dateStr = formatDate(date);
      const isToday = dateStr === todayStr;
      html += `
        <th class="grid-header-cell ${isToday ? 'is-today' : ''}" style="padding:0; border-top:none;">
          <div class="grid-header">
            <div class="col-name">内容</div>
            <div class="col-count">通数</div>
            <div class="col-setter">設定</div>
            <div class="col-checker">確認</div>
          </div>
        </th>
      `;
    });
    html += '</tr></thead><tbody>';

    for (let hour = 8; hour <= 21; hour++) {
      html += `<tr><td class="time-col">${hour}:00</td>`;
      dates.forEach(date => {
        const dateStr = formatDate(date);
        const isToday = dateStr === todayStr;

        const monthEndInfo = getMonthEndInfo(date);
        const entries = scheduleSlotMap[`${dateStr}|${hour}`] || [];
        const archivedSlotEntries = archivedSlotMap[`${dateStr}|${hour}`] || [];
        const slotEntries = dedupeSlotEntries_(archivedSlotEntries.concat(entries), dateStr, hour);
        // ⑬ 時間帯合計配信数ツールチップ
        const slotTooltip = slotEntries.length > 0 ? buildSlotTooltip_(slotEntries, dateStr, hour) : '';
        html += `<td data-date="${dateStr}" data-hour="${hour}:00" class="${isToday ? 'is-today-column' : ''}" style="padding:0;"${slotTooltip}>`;

              if (moveOverride.hour) entryForDate.hour = moveOverride.hour;
              entryForDate.weekday = moveOverride.weekday || getWeekdayLabelForDateString(dateStr);
              if (moveOverride.original_date) entryForDate.original_date = moveOverride.original_date;
            }
            const occurrenceOverride = getOccurrenceOverrideForDate(entryForDate, dateStr);
            if (occurrenceOverride && occurrenceOverride.original_date) {
              entryForDate.original_date = occurrenceOverride.original_date;
            }

            const effectiveEntry = applyOccurrenceOverrideObjectToEntry(
              applyOccurrenceOverrideToEntry(entryForDate),
              occurrenceOverride
            );
            const payload = escapeAttribute(encodeURIComponent(JSON.stringify(effectiveEntry)));
            const scheduleId = effectiveEntry.schedule_id || 'unknown';
            const checkItemId = getCheckItemId(entryForDate);
            const hasOccurrenceOverrides = getOccurrenceOverrideFieldsForEntry(entryForDate).length > 0;
            const nameChanged = isOccurrenceFieldOverridden(entryForDate, [
              'mail_name',
              'mail_content',
              'mail_content_extract',
              'mail_content_free',
              'notes',
              'format',
              'cycle',
              'weekday',
              'hour',
              'start_date',
              'end_date',
              'job_url',
              'auto_job_feature_id',
              'target_age',
              'target_address',
              'user_desired_location',
              'user_experience_job',
              'user_desired_job',
              'user_other_condition',
              'parameter',
              'job_location',
              'job_type',
              'job_keyword',
              'is_new',
              'auto_job_other_condition'
            ]);
            const countChanged = isOccurrenceFieldOverridden(entryForDate, ['delivery_count']);
            const setterChanged = isOccurrenceFieldOverridden(entryForDate, ['assignee']);
            const checkerChanged = isOccurrenceFieldOverridden(entryForDate, ['reviewer']);
            const subCategoryClass = getSubCategoryClass(effectiveEntry);

            const stopped = !fixed && isStopped(entryForDate);
            const fixedBadge = fixed ? '<span class="fixed-badge">確定済</span>' : '';
            const stoppedBadge = stopped ? '<span class="stopped-badge">配信停止中</span>' : '';
            const jobAlert = getJobCountAlert(effectiveEntry);
            const jobAlertIcon = renderJobAlertIcon(jobAlert);
            const rowTitle = jobAlert ? ` title="${escapeAttribute(getJobAlertTooltip(jobAlert))}"` : '';
            const prStates = getPrStates(effectiveEntry, dateStr);
            const prLabelItems = prStates
              .filter(prState => {

                if (!key || renderedPrIds.has(key)) return false;

              .join('');
            const prLabel = prLabelItems ? `<div class="pr-labels-row">${prLabelItems}</div>` : '';
            html += `

              ${renderCheckStatusCell(checkItemId, 'checker', effectiveEntry.reviewer, `col-checker ${checkerChanged ? 'is-occurrence-overridden' : ''}`, entryForDate)}
            </div>

          html += '&nbsp;';
        }
        html += '</td>';
      });
      html += '</tr>';

    html += '</tbody></table>';

  /**
   * エントリーが指定日に表示される時間帯（時 string）を返す。
   * 表示されない場合は null。renderScheduleGridNow_ のフィルタロジックを抽出。
   */
  function getEntryEffectiveHour_(row, date, dateStr, dayLabel, monthEndInfo) {
    const occurrenceOverride = getOccurrenceOverrideForDate(row, dateStr);
    const rowForDate = applyOccurrenceOverrideObjectToEntry(
      applyMoveOverrideToEntry(Object.assign({}, row, { target_date: dateStr })),
      occurrenceOverride
    );

    if (isDraft(rowForDate)) return null;

    const startDate = normalizeDateString(row.start_date);
    const endDate = normalizeDateString(row.end_date);
    const isWithinScheduleRange = (!startDate || startDate <= dateStr) && (!endDate || endDate >= dateStr);

    // end_dateがある場合はisWithinScheduleRangeに委ねる（停止当日は配信あり）
    if (isInactive(rowForDate) && !endDate) return null;
    if (!isWithinScheduleRange) return null;

    const moveOverride = getMoveOverrideForDate(row, dateStr);

    if (moveOverride) {
      // original_date で occurrence_override を引く（edit-then-move / move-then-edit 両対応）
      const occItemId = `${String(row.schedule_id || '').trim()}|${String(moveOverride.original_date || '').trim()}`;
      const occurrenceOverrideForMove = getOccurrenceOverrideForItemId(occItemId);
      // occurrence_override が別の日付へ移動済みなら、ここには表示しない（コピー防止）
      if (occurrenceOverrideForMove &&
          occurrenceOverrideForMove.delivery_date &&
          normalizeDateString(occurrenceOverrideForMove.delivery_date) !== dateStr) {
        return null;
      }
      const overrideHasHour = occurrenceOverrideForMove &&
        String(occurrenceOverrideForMove.override_fields || '').split(',').includes('hour');
      const rawHour = overrideHasHour ? occurrenceOverrideForMove.hour : moveOverride.hour;
      return String(normalizeMasterHourValue(rawHour) || rawHour || '').split(':')[0].trim() || null;
    }

    if (occurrenceOverride) {
      return String(normalizeMasterHourValue(occurrenceOverride.hour || rowForDate.hour) || occurrenceOverride.hour || rowForDate.hour || '').split(':')[0].trim() || null;
    }

    // 移動先ではない場合、元のスケジュール通りか確認
    // ただし、もし他の日時に移動されている場合はこの枠には出さない
    if (isMovedOriginalOccurrence(row, dateStr) || isOccurrenceOverrideOriginal(row, dateStr)) return null;

    const rowHour = String(normalizeMasterHourValue(rowForDate.hour) || rowForDate.hour || '').split(':')[0].trim();
    if (!rowHour) return null;

    const weekday = normalizeWeekdayLabel(row.weekday);
    const scheduleCycleType = getScheduleCycleType(row);
    let cycleMatch = false;

    if (scheduleCycleType === 'single') {
      cycleMatch = !!startDate && startDate === dateStr;
    } else if (scheduleCycleType === 'daily') {
      cycleMatch = true;
    } else if (scheduleCycleType === 'monthly') {
      cycleMatch = isMonthlyCycleDate_(startDate, date);
    } else if (scheduleCycleType === 'month_end') {
      cycleMatch = monthEndInfo.isInWindow && weekday === dayLabel;
    } else if (scheduleCycleType === 'A' || scheduleCycleType === 'B') {
      cycleMatch = weekday === dayLabel && scheduleCycleType === getCycleForRow(row, date);
    } else if (/^M[1-4]$/.test(scheduleCycleType)) {
      const n = parseInt(scheduleCycleType.substring(1), 10);
      cycleMatch = weekday === dayLabel && isNthWeekOfMonth(date, n);
    } else if (typeof scheduleCycleType === 'number') {
      const expectedCycle = getCycleForRow(row, date);
      cycleMatch = weekday === dayLabel && typeof expectedCycle === 'number' && cycleContains(row.cycle, expectedCycle);
    } else {
      cycleMatch = weekday === dayLabel;
    }

    return cycleMatch ? rowHour : null;
  }

  /**
   * ⑬ 時間枠ホバー用ツールチップを構築。
   * 「N件 / 合計 X万通」形式で返す。配信数が不明なエントリは件数のみ。
   */
  function buildSlotTooltip_(slotEntries, dateStr, hour) {
    let totalCount = 0;
    let hasCount = false;
    slotEntries.forEach(entry => {
      const effectiveEntry = applyOccurrenceOverrideObjectToEntry(
        applyMoveOverrideToEntry(Object.assign({}, entry, { target_date: dateStr })),
        getOccurrenceOverrideForDate(entry, dateStr)
      );
      const count = parseFloat(effectiveEntry.delivery_count);
      if (Number.isFinite(count) && count > 0) { totalCount += count; hasCount = true; }
    });
    let tip = slotEntries.length + '件の配信';
    if (hasCount) {
      const totalRounded = Math.round(totalCount * 10) / 10;
      tip += ' / 合計 ' + totalRounded + '万 (上限 16万)';
    }
    return ' title="' + escapeAttribute(tip) + '"';
  }

  /**
   * スケジュールエントリーを「dateStr|hour」キーで事前グループ化。
   * O(7N) で構築し、レンダリング時は O(1) で参照できる。
   */
  function buildScheduleSlotMap_(filtered, dates, weekdays) {
    const map = {};
    dates.forEach(date => {
      const dateStr = formatDate(date);
      const dayLabel = weekdays[date.getDay()];
      const monthEndInfo = getMonthEndInfo(date);
      filtered.forEach(row => {
        const hour = getEntryEffectiveHour_(row, date, dateStr, dayLabel, monthEndInfo);
        if (!hour) return;
        const key = `${dateStr}|${hour}`;
        if (!map[key]) map[key] = [];
        map[key].push(row);
      });
    });
    return map;
  }

  /**
   * アーカイブ済み発生分を「dateStr|hour」キーで事前グループ化。
   * O(A) で構築し、レンダリング時は O(1) で参照できる。
   */
  function buildArchivedSlotMap_(keyword) {
    const map = {};
    Object.values(APP_DATA.archivedOccurrences || {}).forEach(row => {
      const dateStr = normalizeDateString(row && row.target_date);
      const rawHour = normalizeMasterHourValue(row && row.hour) || (row && row.hour) || '';
      const hour = String(rawHour).split(':')[0].trim();
      if (!dateStr || !hour) return;
      if (keyword) {
        const text = [
          row.mail_name, row.weekday, row.hour,
          row.mail_type || row.category, row.cycle, row.format,
          row.assignee, row.reviewer, row.source_sheet
        ].map(v => String(v || '').toLowerCase()).join(' ');
        if (!text.includes(keyword)) return;
      }
      const key = `${dateStr}|${hour}`;
      if (!map[key]) map[key] = [];
      map[key].push(row);
    });
    return map;
  }

  function dedupeSlotEntries_(entries, dateStr, hour) {
    const seen = new Set();
    return (entries || []).filter(entry => {
      const id = String(entry && (entry.schedule_id || entry.source_row || entry.mail_name) || '').trim();
      const originalDate = String(entry && (entry.original_date || entry.target_date) || dateStr || '').trim();
      const key = [id, originalDate, dateStr, String(hour)].join('|');
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function findMasterHeaderByAliases_(aliases) {
    const headers = MASTER_DATA.headers || [];
    const normalizedAliases = aliases.map(alias => String(alias || '').trim()).filter(Boolean);
    const found = headers.find(header => {
      const h = String(header || '').trim();
      if (normalizedAliases.includes(h)) return true;
      if (h.includes('/')) {
        return h.split('/').map(seg => seg.trim()).some(seg => normalizedAliases.includes(seg));
      }
      return false;
    });
    if (!found) return '';
    const h = String(found).trim();
    if (h.includes('/')) {
      const segments = h.split('/').map(seg => seg.trim());
      for (let i = 0; i < normalizedAliases.length; i++) {
        const alias = normalizedAliases[i];
        if (segments.includes(alias)) return alias;
      }
      const englishSegment = segments.find(seg => /^[a-z][a-z0-9_]*$/i.test(seg));
      return englishSegment || segments[segments.length - 1];
    }
    if (normalizedAliases.includes(h)) {
      const englishKey = normalizedAliases.find(alias => /^[a-z][a-z0-9_]*$/i.test(alias));
      return englishKey || h;
    }
    return h;
  }

  // テーブルセルを rawHeader（日本語/英語形式）または正規キーのどちらでも取得するヘルパー
  function getCellByHeader_(row, header) {
    const h = String(header || '');
    if (row[h] != null) return String(row[h]);
    if (h.includes('/')) {
      const segs = h.split('/').map(s => s.trim());
      for (const s of segs) { if (row[s] != null) return String(row[s]); }
    }
    return '';
  }

  function getUniqueMasterColumnValues_(header) {
    if (!header) return [];

    (MASTER_DATA.rows || []).forEach(row => {
      const v = String(getCellByHeader_(row, header) || '').trim();
      if (v) set.add(v);
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'ja'));
  }
