    const textHeader = findMasterHeaderByAliases_(['pr_text', 'PR本文', '本文', '文面', 'content']);
    const startDateHeader = findMasterHeaderByAliases_(['start_date', '開始日']);
    const endDateHeader = findMasterHeaderByAliases_(['end_date', '終了日']);
    const targetIdsHeader = findMasterHeaderByAliases_(['target_ids', '紐付けID', 'PRが入るメルマガ', '紐付けメルマガ']);
    const notesHeader = findMasterHeaderByAliases_(['notes', '備考', 'memo']);

    function getPrCardState_(row) {
      const startDate = normalizeDateString(startDateHeader ? getCellByHeader_(row, startDateHeader) : '');
      const endDate = normalizeDateString(endDateHeader ? getCellByHeader_(row, endDateHeader) : '');
      if (endDate && endDate < today) return 'end';
      if (startDate && startDate > today) return 'start';
      return 'active';
    }

    let rows = (MASTER_DATA.rows || []).filter(row => {
      if (!keyword) return true;
      return Object.values(row).map(v => v == null ? '' : String(v)).join(' ').toLowerCase().includes(keyword);
    });

    // ステータスフィルター
    const statusFilter = masterFilters.status || '__all__';
    if (statusFilter !== '__all__') {
      rows = rows.filter(row => getPrCardState_(row) === statusFilter);
    }

    const stateOrder = { active: 0, start: 1, end: 2 };
    rows.sort((a, b) => {
      const sa = stateOrder[getPrCardState_(a)] || 0;
      const sb = stateOrder[getPrCardState_(b)] || 0;
      if (sa !== sb) return sa - sb;
      const ea = normalizeDateString(endDateHeader ? getCellByHeader_(a, endDateHeader) : '');
      const eb = normalizeDateString(endDateHeader ? getCellByHeader_(b, endDateHeader) : '');
      return ea.localeCompare(eb);
    });

    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">該当するPRがありません。</div>';
      return;
    }

    const stateLabels = { active: '掲出中', start: '開始予定', end: '終了済' };
    const stateClasses = { active: 's-active', start: 's-start', end: 's-end' };
    const statusBadgeClasses = { active: 'active', start: 'start', end: 'end' };

    let html = '<div class="pr-list">';
    rows.forEach(row => {
      const prId = prIdHeader ? getCellByHeader_(row, prIdHeader) : '';
      const title = (titleHeader ? getCellByHeader_(row, titleHeader) : '') || '(タイトルなし)';
      const text = textHeader ? getCellByHeader_(row, textHeader) : '';
      const startDateRaw = startDateHeader ? getCellByHeader_(row, startDateHeader) : '';
      const endDateRaw = endDateHeader ? getCellByHeader_(row, endDateHeader) : '';
      const targetIdsRaw = targetIdsHeader ? getCellByHeader_(row, targetIdsHeader) : '';
      const notes = notesHeader ? getCellByHeader_(row, notesHeader) : '';
      const state = getPrCardState_(row);

      const startDate = normalizeDateString(startDateRaw);
      const endDate = normalizeDateString(endDateRaw);
      const dateStr = startDate || endDate
        ? `${startDate ? startDate.replace(/-/g, '/') : '?'} — ${endDate ? endDate.replace(/-/g, '/') : '?'}`
        : '';

      // 紐づきメルマガ
      const targetIds = String(targetIdsRaw).split(',').map(s => normalizeIdKey(s.trim())).filter(Boolean);
      const targetNames = targetIds.map(id => newsMap[id] || id);
      const maxShown = 8;
      const shownNames = targetNames.slice(0, maxShown);
      const moreCount = targetNames.length - maxShown;
      const chipClass = state === 'active' ? 'live' : '';
      const mailChips = shownNames.map(n => `<span class="mc ${chipClass}">${escapeHtml(n)}</span>`).join('')
        + (moreCount > 0 ? `<span class="mc more">+${moreCount}件</span>` : '');

      const encodedRow = escapeAttribute(encodeURIComponent(JSON.stringify(row)));
      const rowNumber = escapeAttribute(String(row.__rowNumber || ''));

      html += `
        <div class="pr-card ${stateClasses[state]}">
          <div class="pr-head">
            <div class="pr-head-left">
              <div class="pr-id">PR ID: ${escapeHtml(String(prId))}</div>
              <div class="pr-title">${escapeHtml(title)}</div>
              <div class="pr-meta">
                <span class="pr-status ${statusBadgeClasses[state]}">${stateLabels[state]}</span>
                ${dateStr ? `<span class="pr-date">${escapeHtml(dateStr)}</span>` : ''}
              </div>
            </div>
            <div class="pr-head-right">
              <div class="pr-actions">
                <button type="button" class="act-btn" data-action="open-master-modal" data-row="${encodedRow}">編集</button>
                ${state !== 'end' ? `<button type="button" class="act-btn danger" data-action="delete-master-row" data-row-number="${rowNumber}" title="この行を削除します（取り消し不可）">削除</button>` : ''}
              </div>
              <span class="pr-count">紐づき <b>${targetNames.length}</b> 件</span>
            </div>
          </div>
          ${text ? `<div class="pr-body"><span class="pr-body-label">PR本文</span><div class="pr-body-text">${escapeHtml(text)}</div></div>` : ''}
          <div class="pr-targets">
            <span class="pr-targets-label">紐づき先</span>
            <div class="mail-chips">${mailChips || '<span class="pr-targets-empty">なし</span>'}</div>
          </div>
          ${notes ? `<div class="pr-notes"><span class="pr-notes-label">備考</span><span class="pr-notes-text">${escapeHtml(notes)}</span></div>` : ''}
        </div>
      `;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function setMasterDraftOnly(checked) {
    masterFilters.draftOnly = !!checked;
    renderMasterTable();
    renderMasterFilterChips();
  }

  function renderMasterTable() {
    if (MASTER_DATA.sheetName === 'app_pr') { renderPrCards(); return; }
    const container = document.getElementById('masterTableContainer');
    const headers = MASTER_DATA.headers || [];
    const visibleHeaders = getVisibleMasterHeaders(headers);
    const searchInput = document.getElementById('masterSearchInput');
    const keyword = String(searchInput ? searchInput.value : '').trim().toLowerCase();

    const subCategoryHeader = findMasterHeaderByAliases_(['sub_category', 'サブカテゴリ', '担当部署']);
    const formatHeader = findMasterHeaderByAliases_(['format', '形式']);
    const mailTypeHeader = findMasterHeaderByAliases_(['mail_type', 'category', '種別']);
    const endDateHeader = findMasterHeaderByAliases_(['end_date', '終了日', '終了']);
    const inactiveHeader = findMasterHeaderByAliases_(['is_inactive', '配信終了', '配信停止', '停止', '無効']);
    const isNewHeader = findMasterHeaderByAliases_(['is_new', 'new_flag', '新規']);
    const verifyingHeader = findMasterHeaderByAliases_(['is_verifying', 'verifying_flag', '検証中', '検証中/is_verifying']);
    const today = formatDate(new Date());

    const rows = (MASTER_DATA.rows || []).filter(row => {
      if (keyword && !Object.values(row).map(v => v == null ? '' : String(v)).join(' ').toLowerCase().includes(keyword)) {
        return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.subcategory !== '__all__' && subCategoryHeader) {
        if (String(getCellByHeader_(row, subCategoryHeader) || '').trim() !== masterFilters.subcategory) return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.format !== '__all__' && formatHeader) {
        if (String(getCellByHeader_(row, formatHeader) || '').trim() !== masterFilters.format) return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.category !== '__all__' && mailTypeHeader) {
        if (String(getCellByHeader_(row, mailTypeHeader) || '').trim() !== masterFilters.category) return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.newOnly && isNewHeader) {
        if (!isTruthyValue(getCellByHeader_(row, isNewHeader))) return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.verifyingOnly && verifyingHeader) {
        if (!isTruthyValue(getCellByHeader_(row, verifyingHeader))) return false;
      }
      if (MASTER_DATA.sheetName === 'app_schedule' && masterFilters.draftOnly) {
        if (!isDraft(row)) return false;
        return true;
      }
      if (masterFilters.status !== '__all__') {
        const rowEndDate = endDateHeader ? normalizeDateString(getCellByHeader_(row, endDateHeader)) : '';
        const rowInactive = inactiveHeader ? isTruthyValue(getCellByHeader_(row, inactiveHeader)) : false;
        const isEffectivelyInactive = rowInactive || (!!rowEndDate && rowEndDate < today);
        if (masterFilters.status === 'active' && (isEffectivelyInactive || isDraft(row))) return false;
        if (masterFilters.status === 'inactive' && !isEffectivelyInactive) return false;
      }
      return true;
    });

    if (!headers.length) {
      container.innerHTML = '<div class="empty-state">ヘッダー行がありません。</div>';
      return;
    }

    const visibleRows = rows.slice(0, MASTER_RENDER_LIMIT);
    const isLimited = rows.length > visibleRows.length;

    let html = `
      <div class="master-result-summary">
        ${escapeHtml(String(rows.length))}件中 ${escapeHtml(String(visibleRows.length))}件を表示
        ${isLimited ? `<span>表示を絞るには検索またはフィルターを使ってください。</span>` : ''}
      </div>
      <table class="master-table"><thead><tr><th class="actions-col">操作</th>
    `;

    const tableHeaders = visibleHeaders;
    tableHeaders.forEach(header => {
      html += `<th title="${escapeAttribute(header)}">${escapeHtml(getDisplayName(header))}</th>`;
    });
    html += '</tr></thead><tbody>';

    visibleRows.forEach(row => {
      const encodedRow = escapeAttribute(encodeURIComponent(JSON.stringify(row)));
      const deleteButton = `<button type="button" class="table-action-button danger" data-action="delete-master-row" data-row-number="${escapeAttribute(row.__rowNumber)}" title="シートからこの行を完全に削除します。取り消せません。">削除</button>`;

      html += `
      <tr>
      <td class="actions-col">
        <button type="button" class="table-action-button" data-action="open-master-modal" data-row="${encodedRow}">編集</button>
        ${deleteButton}
      </td>
    `;

      tableHeaders.forEach(h => {
        let cellValue = getCellByHeader_(row, h);
        // 配信終了列: end_date が今日より前なら自動で TRUE 表示
        if (inactiveHeader && (h === inactiveHeader ||
            (h.includes('/') && h.split('/').map(s => s.trim()).includes(inactiveHeader)))) {
          const rowEndDate = endDateHeader ? normalizeDateString(getCellByHeader_(row, endDateHeader)) : '';
          if (!isTruthyValue(cellValue) && !!rowEndDate && rowEndDate < today) {
            cellValue = 'TRUE';
          }
        }
        const isExpandable = cellValue.length > 60 || cellValue.includes('\n');
        html += `<td class="${isExpandable ? 'expandable-cell' : ''}" ${isExpandable ? 'data-action="toggle-cell-expand"' : ''} title="${escapeAttribute(cellValue)}">${escapeHtml(cellValue)}</td>`;
      });

      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderPrCards() {
    const container = document.getElementById('masterTableContainer');
    const rows = MASTER_DATA.rows || [];
    const today = formatDate(new Date());
    const keyword = String((document.getElementById('masterSearchInput') || {}).value || '').trim().toLowerCase();

    const prIdHeader = findMasterHeaderByAliases_(['pr_id', 'PR ID', 'ID']);
    const nameHeader = findMasterHeaderByAliases_(['name', 'pr_title', 'PRタイトル']);
    const startDateHeader = findMasterHeaderByAliases_(['start_date', '開始日', '開始']);
    const endDateHeader = findMasterHeaderByAliases_(['end_date', '終了日', '終了']);
    const prTextHeader = findMasterHeaderByAliases_(['pr_text', 'PR本文']);
    const targetIdsHeader = findMasterHeaderByAliases_(['target_ids', 'target_mails', 'PRが入るメルマガ', '紐づいたメルマガ']);
    const notesHeader = findMasterHeaderByAliases_(['notes', '備考']);
    const inactiveHeader = findMasterHeaderByAliases_(['is_inactive', '配信終了', '配信停止']);

    // 紐付けは app_pr_targets シート (APP_DATA.prTargets) に分離されている。
    // pr_id をキーにメルマガ名を引けるよう Map を構築。
    const prTargetsByPrId = new Map();
    const allPrTargets = Array.isArray(APP_DATA.prTargets) ? APP_DATA.prTargets : [];
    allPrTargets.forEach(t => {
      if (isInactive(t) || isDraft(t)) return;
      const linkedPrId = normalizeIdKey(getValueByKeys(t, ['pr_id', 'PR ID', 'ＰＲ ID', 'PR_ID', 'PRID', 'PR', 'pr']));
      if (!linkedPrId) return;
      const mailName = getPrTargetMailName_(t);
      if (!mailName) return;
      if (!prTargetsByPrId.has(linkedPrId)) prTargetsByPrId.set(linkedPrId, []);
      prTargetsByPrId.get(linkedPrId).push(mailName);
    });

    function getPrStatus(row) {
      const endDate = endDateHeader ? normalizeDateString(getCellByHeader_(row, endDateHeader)) : '';
      const startDate = startDateHeader ? normalizeDateString(getCellByHeader_(row, startDateHeader)) : '';
      const inactive = inactiveHeader ? isTruthyValue(getCellByHeader_(row, inactiveHeader)) : false;
      if (inactive || (endDate && endDate < today)) return 'end';
      if (startDate && startDate > today) return 'start';
      return 'active';
    }

    const allActive = rows.filter(r => !isDraft(r) && getPrStatus(r) === 'active');
    const allStart  = rows.filter(r => !isDraft(r) && getPrStatus(r) === 'start');
    const allEnd    = rows.filter(r => !isDraft(r) && getPrStatus(r) === 'end');

    const filteredRows = rows.filter(row => {
      if (isDraft(row)) return false;
      if (keyword && !Object.values(row).map(v => v == null ? '' : String(v)).join(' ').toLowerCase().includes(keyword)) return false;
      const st = getPrStatus(row);
      if (masterFilters.status === 'active'                                          && st !== 'active') return false;
      if ((masterFilters.status === 'upcoming' || masterFilters.status === 'start') && st !== 'start')  return false;
      if ((masterFilters.status === 'inactive' || masterFilters.status === 'end')   && st !== 'end')    return false;
      return true;
    });

    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">PRデータがありません。</div>';
      return;
    }

    const nameMap = getNewsletterNameMap_();

    const endHidden = masterFilters.status !== 'inactive' && masterFilters.status !== '__all__';
    let html = `
      <div class="pr-stats-bar">
        <div class="pr-si"><div class="pr-si-dot" style="background:var(--accent)"></div>掲出中 <b>${allActive.length}</b> 件</div>
        <div class="pr-si"><div class="pr-si-dot" style="background:var(--ok)"></div>開始予定 <b>${allStart.length}</b> 件</div>
        <div class="pr-si"><div class="pr-si-dot" style="background:var(--border-strong)"></div>終了済 <b>${allEnd.length}</b> 件${endHidden ? '（非表示中）' : ''}</div>
      </div>
      <div class="pr-list">
    `;

    if (!filteredRows.length) {
      html += '<div class="empty-state">該当するPRがありません。</div>';
    } else {
      filteredRows.forEach(row => {
        const prStatus = getPrStatus(row);
        const cardClass = prStatus === 'active' ? 's-active' : prStatus === 'start' ? 's-start' : 's-end';
        const statusLabel = prStatus === 'active' ? '掲出中' : prStatus === 'start' ? '開始予定' : '終了済';
        const statusBadge = prStatus === 'active' ? 'active' : prStatus === 'start' ? 'start' : 'end';

        const prId    = prIdHeader    ? escapeHtml(getCellByHeader_(row, prIdHeader))    : '';
        const title   = nameHeader    ? escapeHtml(getCellByHeader_(row, nameHeader))    : '(名称なし)';
        const sdRaw   = startDateHeader ? getCellByHeader_(row, startDateHeader) : '';
        const edRaw   = endDateHeader   ? getCellByHeader_(row, endDateHeader)   : '';
        const sd      = sdRaw ? escapeHtml(sdRaw) : '';
        const ed      = edRaw ? escapeHtml(edRaw) : '';
        const prText  = prTextHeader  ? getCellByHeader_(row, prTextHeader)  : '';
        const notes   = notesHeader   ? getCellByHeader_(row, notesHeader)   : '';
        // 紐付け取得: ① app_pr_targets 経由 (新方式・優先) → ② 旧 target_ids カラム (後方互換)
        const currentPrIdKey = prIdHeader ? normalizeIdKey(getCellByHeader_(row, prIdHeader)) : '';
        let mailNames = currentPrIdKey ? (prTargetsByPrId.get(currentPrIdKey) || []).slice() : [];
        if (!mailNames.length && targetIdsHeader) {
          const rawIds = getCellByHeader_(row, targetIdsHeader);
          const ids = rawIds ? String(rawIds).split(',').map(s => s.trim()).filter(Boolean) : [];
          mailNames = ids.map(id => nameMap[normalizeIdKey(id)] || id);
        }
        // 重複除去 + 名前順
        mailNames = Array.from(new Set(mailNames)).sort((a, b) => a.localeCompare(b, 'ja'));
        const ids = mailNames;

        const encodedRow = escapeAttribute(encodeURIComponent(JSON.stringify(row)));

        const MAX_CHIPS = 10;
        const chipsHtml = mailNames.slice(0, MAX_CHIPS).map(name => {
          return `<span class="mc${prStatus === 'active' ? ' live' : ''}">${escapeHtml(name)}</span>`;
        }).join('') + (mailNames.length > MAX_CHIPS ? `<span class="mc more">+${mailNames.length - MAX_CHIPS}件</span>` : '');

        const dateRange = (sd || ed) ? `${sd} — ${ed}` : '';

        html += `
          <div class="pr-card ${cardClass}">
            <div class="pr-head">
              <div class="pr-head-left">
                ${prId ? `<div class="pr-id">PR ID: ${prId}</div>` : ''}
                <div class="pr-title">${title}</div>
                <div class="pr-meta">
                  <span class="pr-status ${statusBadge}">${escapeHtml(statusLabel)}</span>
                  ${dateRange ? `<span class="pr-date"><i class="ti ti-calendar" aria-hidden="true"></i>${dateRange}</span>` : ''}
                </div>
              </div>
              <div class="pr-head-right">
                <div class="pr-actions">
                  <button type="button" class="act-btn" data-action="open-master-modal" data-row="${encodedRow}">編集</button>
                </div>
                ${ids.length ? `<span class="pr-count">紐づき <b>${ids.length}</b> 件</span>` : ''}
              </div>
            </div>
            ${prText ? `<div class="pr-body"><span class="pr-body-label">PR本文</span><div class="pr-body-text">${escapeHtml(prText)}</div></div>` : ''}
            ${ids.length ? `<div class="pr-targets"><span class="pr-targets-label">紐づき先</span><div class="mail-chips">${chipsHtml}</div></div>` : ''}
            ${notes ? `<div class="pr-notes"><span class="pr-notes-label">備考</span><span class="pr-notes-text">${escapeHtml(notes)}</span></div>` : ''}
          </div>
        `;
      });
    }

    html += '</div>';
    container.innerHTML = html;
  }

  function getNewsletterNameMap_() { // 509行目：独立した関数として開始
    const map = {};
    const schedule = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    schedule.forEach(row => {
      // normalizeIdKey で参照側と同じキー形(末尾 .0 を除去)に揃える。
      // Sheets が数値IDを '5.0' で返すケースで参照側 '5' と不一致になりヒットしない問題の修正。
      const id = normalizeIdKey(getValueByKeys(row, ['schedule_id', 'ID', 'id']));
      if (id) map[id] = row.mail_name || id;
    });
    return map;
  }

  function loadAdminList() {
    google.script.run
      .withSuccessHandler(rows => {
        APP_DATA.adminMaster = Array.isArray(rows) ? rows : [];
        refreshAdminSelects_();
        const editModal = document.getElementById('editModal');
        if (editModal && editModal.getAttribute('aria-hidden') === 'false' && typeof scheduleEditModalHighlights_ === 'function') {
          scheduleEditModalHighlights_(editModal);
        }
      })
      .withFailureHandler(() => {
        refreshAdminSelects_();
      })
      .getAdminList();
  }

  function getAdminSelectOptions_() {
    return getAdminOptionValues().map(option => {
      if (option && typeof option === 'object') {
        return {
          value: String(option.value == null ? '' : option.value).trim(),
          label: String(option.label == null ? option.value : option.label)
        };
      }
      const value = String(option == null ? '' : option).trim();
      return { value, label: value };
    });
  }

  function refreshAdminSelects_() {
    const optionValues = getAdminSelectOptions_().filter(option => {
      const value = String(option && option.value || '').trim().toUpperCase();
      return value !== 'TRUE' && value !== 'FALSE';
    });
    document.querySelectorAll('#masterModal select[name="setter"], #masterModal select[name="checker"], #editModal select[name="setter"], #editModal select[name="checker"]').forEach(select => {
      const pending = Object.prototype.hasOwnProperty.call(select.dataset, 'pendingValue')
        ? String(select.dataset.pendingValue || '').trim()
        : '';
      const selected = pending || String(select.value || '').trim();
      const sanitizedSelected = ['TRUE', 'FALSE'].includes(selected.toUpperCase()) ? '' : selected;
      const nextSelected = sanitizedSelected;
      const placeholder = `<option value="" ${nextSelected ? '' : 'selected '}disabled hidden>-- 選択してください --</option>`;
      select.innerHTML = placeholder + optionValues.map(option => `<option value="${escapeAttribute(option.value)}" ${option.value === nextSelected ? 'selected' : ''}>${escapeHtml(option.label || option.value)}</option>`).join('');
      if (nextSelected && !optionValues.some(option => option.value === nextSelected)) {
        select.insertAdjacentHTML('beforeend', `<option value="${escapeAttribute(nextSelected)}" selected>${escapeHtml(nextSelected)}</option>`);
      }
      select.required = false;
      select.removeAttribute('required');
      select.value = nextSelected;
      delete select.dataset.pendingValue;
    });
    if (typeof syncReviewerLock_ === 'function') syncReviewerLock_();
  }

  function renderSelectInput(header, currentValue, options, selectName) {
    const normalizedCurrent = String(currentValue == null ? '' : currentValue).trim();
    const name = String(selectName == null ? header : selectName).trim();
    const normalizedOptions = options.map(option => {
      if (option && typeof option === 'object') {
        return {
          value: String(option.value == null ? '' : option.value).trim(),
          label: String(option.label == null ? option.value : option.label)
        };
      }
      const value = String(option == null ? '' : option).trim();
      return value ? { value, label: value } : null;
    }).filter(Boolean);
    const selectedValue = normalizedCurrent;
    if (selectedValue && !normalizedOptions.some(option => option.value === selectedValue)) {
      normalizedOptions.push({ value: selectedValue, label: selectedValue });
    }

    const placeholder = `<option value="" ${selectedValue ? '' : 'selected '}disabled hidden>-- 選択してください --</option>`;
    const optionHtml = normalizedOptions.map(option => `
      <option value="${escapeAttribute(option.value)}" ${option.value === selectedValue ? 'selected' : ''}>${escapeHtml(option.label || option.value)}</option>
    `).join('');
    return `<select name="${escapeAttribute(name)}" data-header="${escapeAttribute(header)}">${placeholder}${optionHtml}</select>`;
  }

  function renderNamedSelectInput(name, currentValue, options) {
    return renderSelectInput(name, currentValue, options, name).replace('<select ', `<select data-select-name="${escapeAttribute(name)}" `);
  }

  function renderCycleButtonInput_(currentValue) {
    const value = normalizeCycleSelectValue_(currentValue);
    const buttons = SCHEDULE_CYCLE_OPTIONS.map(option => `
      <button type="button" class="cycle-option-button ${option === value ? 'active' : ''}" data-cycle-value="${escapeAttribute(option)}">${escapeHtml(option)}</button>
    `).join('');
    return `
      <input type="hidden" name="cycle" value="${escapeAttribute(value)}" data-include-value="true">
      <div class="cycle-button-group">${buttons}</div>
    `;
  }

  function getMasterSelectConfig_(header, key, value, mode) {
    if (key === 'cycle') {
      return null;
    }
    if (key === 'mail_type' || key === 'category') {
      return { name: key, value, options: buildUniqueScheduleValues_('mail_type') };
    }
    if (key === 'sub_category') {
      return { name: key, value, options: buildUniqueScheduleValues_('sub_category') };
    }
    if (isWeekdayHeader(header) || key === 'weekday') {
      return { name: key, value, options: WEEKDAY_OPTIONS };
    }
    if (isFormatHeader(header) || key === 'format') {
      return { name: key, value, options: FORMAT_OPTIONS };
    }
    if (isTimeHeader(header) || key === 'hour') {
      return { name: key, value: normalizeMasterHourValue(value), options: buildHourOptions() };
    }
    return null;
  }

  function getMasterTextInputConfig_(header, key, value) {
    const textValue = value == null ? '' : String(value);
    if (['mail_content', 'mail_content_extract', 'mail_content_free', 'notes', 'user_other_condition', 'job_keyword', 'auto_job_other_condition', 'pr_text', 'name', 'mail_name'].includes(key)) {
      return { type: 'textarea', name: key, value: textValue };
    }
    // ① パラメータは1行テキスト入力でOK（複数行/長文でも textarea にしない）
    if (key === 'parameter') {
      return { type: 'text', name: key, value: textValue };
    }
    if (isDateTimeHeader(header)) {
      return { type: 'datetime-local', name: key, value: normalizeDateTimeLocalString(textValue) };
    }
    if (isDateHeader(header) || key === 'start_date' || key === 'end_date') {
      return { type: 'date', name: key, value: normalizeDateString(textValue) };
    }
    if (textValue.length > 60 || textValue.includes('\n')) {
      return { type: 'textarea', name: key, value: textValue };
    }
    return { type: 'text', name: key, value: textValue };
  }

  function renderTextInputFromConfig_(config) {
    if (!config) return '';
    if (config.type === 'textarea') {
      return `<textarea name="${escapeAttribute(config.name)}">${escapeHtml(config.value)}</textarea>`;
    }
    return `<input type="${escapeAttribute(config.type)}" name="${escapeAttribute(config.name)}" value="${escapeAttribute(config.value)}">`;
  }

  function computeTentativeScheduleId_() {
    const schedule = Array.isArray(APP_DATA && APP_DATA.schedule) ? APP_DATA.schedule : [];
    let max = 0;
    schedule.forEach(function(r) {
      const m = String(r.schedule_id || '').match(/^SCH_(\d+)$/);
      if (m) max = Math.max(max, Number(m[1]));
    });
    return 'SCH_' + String(max + 1).padStart(3, '0');
  }

  function computeTentativePrId_() {
    const prData = Array.isArray(APP_DATA && APP_DATA.pr) ? APP_DATA.pr : [];
    let max = 0;
    prData.forEach(function(r) {
      const m = String(getValueByKeys(r, ['pr_id', 'PR ID']) || '').match(/^(\d+)(?:\.0+)?$/);
      if (m) max = Math.max(max, Number(m[1]));
    });
    return String(max + 1);
  }

  function getMasterSpecialFieldConfig_(key, value, mode) {
    const textValue = value == null ? '' : String(value);
    if (key === 'mail_name') {
      return { kind: 'input', html: `<textarea name="mail_name" ${mode === 'edit' ? 'readonly' : ''}>${escapeHtml(textValue)}</textarea>` };
    }
    if (key === 'schedule_id') {
      const displayVal = textValue || (mode === 'master' ? computeTentativeScheduleId_() : '');
      return { kind: 'input', html: `<input type="text" name="schedule_id" value="${escapeAttribute(displayVal)}" readonly disabled>` };
    }
    if (key === 'pr_id') {
      const displayVal = textValue || (mode !== 'edit' ? computeTentativePrId_() : '');
      return { kind: 'input', html: `<input type="text" name="pr_id" value="${escapeAttribute(displayVal)}" readonly disabled placeholder="自動採番">` };
    }
    if (key === 'assignee') {
      return { kind: 'input', html: renderNamedSelectInput('setter', textValue, getAdminSelectOptions_()) };
    }
    if (key === 'reviewer') {
      return { kind: 'input', html: renderNamedSelectInput('checker', textValue, getAdminSelectOptions_()) };
    }
    if (key === 'cycle') {
      return { kind: 'input', html: renderCycleButtonInput_(textValue) };
    }
    if (['is_new', 'new_flag', '新規/is_new', 'is_verifying', 'verifying_flag', '検証中/is_verifying', 'is_draft', '下書き/is_draft', 'is_fixed', '確定済/is_fixed', 'is_inactive', '配信終了/is_inactive'].includes(key)) {
      const name = (key === 'is_verifying' || key === 'verifying_flag' || key === '検証中/is_verifying')
        ? 'is_verifying'
        : (key === 'is_draft' || key === '下書き/is_draft') ? 'is_draft'
        : (key === 'is_fixed' || key === '確定済/is_fixed') ? 'is_fixed'
        : (key === 'is_inactive' || key === '配信終了/is_inactive') ? 'is_inactive'
        : 'is_new';
      return { kind: 'input', html: `<input type="checkbox" name="${escapeAttribute(name)}" aria-label="${escapeAttribute(getDisplayName(name))}" ${isTruthyValue(textValue) ? 'checked' : ''}>` };
    }
    if (key === 'current_job_count') {
      return { kind: 'input', html: `<input type="text" name="current_job_count" value="${escapeAttribute(textValue)}" readonly disabled placeholder="保存後に自動取得されます">` };
    }
    if (key === 'pr') {
      const locked = mode === 'edit' && isEditModalLockedField_(key);
      return { kind: 'input', html: `<input type="text" name="pr" value="${escapeAttribute(textValue)}" ${locked ? 'readonly disabled' : ''}>` };
    }
    return null;
  }

  function renderMasterSpecialFieldInput_(key, value, mode) {
    const config = getMasterSpecialFieldConfig_(key, value, mode);
    if (!config) return null;
    if (config.kind === 'skip') return '';
    return config.html;
  }

  function renderMasterFieldInput_(header, key, value, mode) {
    const textValue = value == null ? '' : value;
    const specialInput = renderMasterSpecialFieldInput_(key, textValue, mode);
    if (specialInput != null) return specialInput;

    const selectConfig = getMasterSelectConfig_(header, key, textValue, mode);
    if (selectConfig) {
      return renderSelectInput(selectConfig.name, selectConfig.value, selectConfig.options);
    }
    return renderTextInputFromConfig_(getMasterTextInputConfig_(header, key, textValue));
  }

  function buildHourOptions() {
    const options = [];
    for (let hour = 8; hour <= 21; hour++) {
      options.push(`${hour}:00`);
    }
    return options;
  }

  function normalizeMasterHourValue(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const dateTimeMatch = text.match(/(?:T|\s)(\d{1,2}):(\d{2})(?::\d{2})?/);
    if (dateTimeMatch) return `${Number(dateTimeMatch[1])}:00`;
    if (/^\d+(\.\d+)?$/.test(text)) {
      const numeric = Number(text);
      if (!Number.isNaN(numeric)) {
        if (numeric > 0 && numeric < 1) {
          return `${Math.round(numeric * 24)}:00`;
        }
        if (numeric >= 8 && numeric <= 21) {
          return `${Math.floor(numeric)}:00`;
        }
      }
    }
    const dateMatch = text.match(/T(\d{1,2}):(\d{2})/);
    if (dateMatch) return `${Number(dateMatch[1])}:00`;
    const match = text.match(/^(\d{1,2})(?::\d{2})?/);
    if (!match) return text;
    return `${Number(match[1])}:00`;
  }

  function normalizeCycleSelectValue_(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const normalized = normalizeCycleLabel(text);
    if (!normalized) return '毎週配信';
    if (normalized === 'A') return '隔週配信A';
    if (normalized === 'B') return '隔週配信B';
    if (normalized === '単発') return text;
    if (normalized === '毎日') return '毎日配信';
    if (normalized === '毎月') return '毎月配信';
    if (normalized === '月末') return '月末増発';
    const cycleNumber = extractCycleNumber(normalized);
    if (cycleNumber != null) return `特殊サイクル${cycleNumber}`;
    return text;
  }

  function getBgColor(row) {
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();
    const cycle = String(row && row.cycle != null ? row.cycle : '').trim();
    const format = String(row && row.format != null ? row.format : '').trim();
    const subCategory = String(row && row.sub_category != null ? row.sub_category : '').trim();
    const text = [category, cycle, format, subCategory].join(' ');
    const scheduleCycleType = getScheduleCycleType(row);

    if (scheduleCycleType === 'single' || category.includes('検証') || isTruthyValue(getValueByKeys(row || {}, ['is_verifying', 'verifying_flag', '検証中', '検証中/is_verifying']))) return SCHEDULE_BACKGROUND_COLORS.checkingSingle;
    if (scheduleCycleType === 'month_end') return SCHEDULE_BACKGROUND_COLORS.monthEnd;
    if (text.includes('商品')) return SCHEDULE_BACKGROUND_COLORS.product;
    return SCHEDULE_BACKGROUND_COLORS.default;
  }

  function getScheduleCycleType(row) {
    const cycle = normalizeCycleLabel(row && row.cycle);
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();

    if (cycle === '単発') return 'single';
    if (cycle === '毎日') return 'daily';
    if (cycle === '毎月') return 'monthly';
    if (cycle === '月末') return 'month_end';
    if (/^M[1-4]$/.test(cycle)) return cycle;
    if (cycle === 'A' || cycle === 'B') return cycle;
    const cycleNumber = extractCycleNumber(cycle);
    if (cycleNumber != null) return cycleNumber;

    // 旧データ互換: 種別で運用していた周期情報を読み取る。
    if (category.includes('月末')) return 'month_end';
    if (category.includes('毎月')) return 'monthly';
    return 'weekly';
  }

  function isMonthlyCycleDate_(startDate, date) {
    if (!startDate) return false;
    const day = Number(String(startDate).slice(8, 10));
    return Number.isFinite(day) && day > 0 && date.getDate() === day;
  }

  function renderScheduleLegend() {
    document.documentElement.style.setProperty('--schedule-line-biweekly-a', SCHEDULE_LINE_COLORS.biweeklyA);
    document.documentElement.style.setProperty('--schedule-line-biweekly-b', SCHEDULE_LINE_COLORS.biweeklyB);
    document.documentElement.style.setProperty('--schedule-line-special-cycle', SCHEDULE_LINE_COLORS.specialCycle);

    const container = document.getElementById('scheduleLegend');
    if (!container) return;
    container.innerHTML = SCHEDULE_LEGEND_ITEMS.map(item => {
      if (item.type === 'badge') {
        // PR バッジ凡例。カレンダー本体のバッジと同じクラスを使うことで
        // 「ヘッダーの凡例 = カレンダーのバッジ」を視覚的に統一する。
        const cls = escapeHtml(String(item.badgeClass || ''));
        return `<div class="legend-item"><span class="pr-label ${cls} legend-badge">${escapeHtml(item.label)}</span></div>`;
      }
      const className = item.type === 'line' ? 'legend-line' : 'legend-color';
      return `<div class="legend-item"><span class="${className}" style="background-color: ${item.color};"></span>${escapeHtml(item.label)}</div>`;
    }).join('');
  }

  function getSubCategoryClass(row) {
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();
    const scheduleCycleType = getScheduleCycleType(row);
    const className = String(row && row.sub_category_class != null ? row.sub_category_class : '').trim();
    if ([
      'is-biweekly-a',
      'is-biweekly-b',
      'is-special-cycle'
    ].includes(className)) return className;

    const text = String(row && row.sub_category != null ? row.sub_category : '').trim();
    if (scheduleCycleType === 'A') return 'is-biweekly-a';
    if (scheduleCycleType === 'B') return 'is-biweekly-b';
    if (typeof scheduleCycleType === 'number') return 'is-special-cycle';
    return '';
  }

  function isPositionMatch(row) {
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();
    const mailName = String(row && row.mail_name != null ? row.mail_name : '').trim();
    const notes = String(row && row.notes != null ? row.notes : '').trim();
    const cycle = String(row && row.cycle != null ? row.cycle : '').trim();
    const text = [category, mailName, notes].join(' ');

    // キーワードが含まれているか、もしくはサイクルが数値（1,2,3）であれば3週サイクルとみなす
    return text.includes('ポジションマッチ') || extractCycleNumber(normalizeCycleLabel(cycle)) != null;
  }

  function getJobCountAlert(row) {
    const countText = String(row && row.current_job_count != null ? row.current_job_count : '').replace(/,/g, '').trim();
    if (countText === '') return null;

    const count = Number(countText);
    if (!Number.isFinite(count)) return null;
    if (count <= 10 || count >= 700) {
      return {
        level: 'critical',
        icon: '[!]',
        count,
        message: count <= 10
          ? '求人数が10件以下です。配信停止を検討してください'
          : '求人数が700件以上です。配信停止を検討してください'
      };
    }
    return null;
  }
  function renderJobAlertIcon(alert) {
    if (!alert) return '';
    return `<span class="job-alert-icon job-alert-${alert.level}" title="${escapeAttribute(getJobAlertTooltip(alert))}">${escapeHtml(alert.icon)}</span>`;
  }

  function getJobAlertTooltip(alert) {
    if (!alert) return '';
    const countText = alert.count == null ? '取得不可' : `${alert.count.toLocaleString()}件`;
    return `件数：${countText} / ${alert.message}`;
  }


  function getPrStates(row, targetDateString) {
    const records = getPrRecordsForSchedule(row);
    const states = records
      .map(record => getPrState(record, targetDateString))
      .filter(Boolean);
    return collapsePrStates_(states);
  }

  function getPrState(record, targetDateString) {
    const prId = normalizeIdKey(record && record.pr_id);
    if (!prId) return null;

    const startDate = normalizeDateString(record.start_date);
    const endDate = normalizeDateString(record.end_date);
    const targetMs = dateStringToMs(targetDateString);
    const startMs = dateStringToMs(startDate);
    const endMs = dateStringToMs(endDate);
    if (targetMs == null) return null;
    if (startMs == null && endMs == null) return null;

    let status = '';
    let action = '';
    if (endMs != null && targetMs > endMs && targetMs <= endMs + 7 * DAY_MS) {
      status = 'remove';
      action = '\u524a\u9664';
    } else if (startMs != null && targetMs >= startMs && targetMs < startMs + 7 * DAY_MS) {
      status = 'add';
      action = '\u8ffd\u52a0';
    } else if ((startMs == null || targetMs >= startMs) && (endMs == null || targetMs <= endMs)) {
      status = 'active';
      action = '\u63b2\u51fa\u4e2d';
    }

    return status ? { pr_id: prId, status, label: `PR${prId} ${action}` } : null;
  }

  function collapsePrStates_(states) {
    const priority = { add: 3, remove: 2, active: 1 };
    const byPrId = new Map();

    states.forEach(state => {
      const key = normalizeText(state.pr_id);
      if (!key) return;
      const current = byPrId.get(key);
      if (!current || priority[state.status] > priority[current.status]) {
        byPrId.set(key, state);
      }
    });

    return Array.from(byPrId.values());
  }

  function mapPrRowsToRecords_(prRows) {
    return (prRows || []).map(prRow => ({
      pr_id: getPrLinkIdFromMasterRow_(prRow),
      pr_title: getPrTitle_(prRow),
      pr_text: getPrText_(prRow),
      start_date: getPrStartDate_(prRow),
      end_date: getPrEndDate_(prRow)
    })).filter(record => record.pr_id);
  }

  function getPrRecordsForSchedule(row) {
    if (!row) return [];

    const scheduleId = normalizeIdKey(getValueByKeys(row, ['schedule_id', 'ID', 'id']));
    const mailName = normalizeText(getValueByKeys(row, ['mail_name', 'メルマガ名']));
    const lookup = ensurePrLookupIndex_();
    const seenPrRows = new Set();

    const matchedPrs = [];
    if (scheduleId && lookup.prsByScheduleId.has(scheduleId)) {
      lookup.prsByScheduleId.get(scheduleId).forEach(prRow => {
        if (!seenPrRows.has(prRow)) {
          seenPrRows.add(prRow);
          matchedPrs.push(prRow);
        }
      });
    }
    if (mailName && lookup.prsByMailName.has(mailName)) {
      lookup.prsByMailName.get(mailName).forEach(prRow => {
        if (!seenPrRows.has(prRow)) {
          seenPrRows.add(prRow);
          matchedPrs.push(prRow);
        }
      });
    }

    const records = mapPrRowsToRecords_(matchedPrs);
    const prById = lookup.prById;

    const targetRecords = mailName && lookup.targetsByMailName.has(mailName)
      ? lookup.targetsByMailName.get(mailName).map(target => buildPrRecordFromTarget_(target, prById)).filter(Boolean)
      : [];

    const directPrId = normalizeIdKey(getValueByKeys(row, ['pr', 'PR', 'PR ID', 'pr_id', 'PR_ID']));
    const directPrRow = directPrId ? (prById.get(normalizeIdKey(directPrId)) || {}) : {};
    const directRecord = directPrId ? [{
      pr_id: directPrId,
      pr_title: getPrTitle_(directPrRow) || getPrTitle_(row),
      pr_text: getPrText_(directPrRow) || getPrText_(row),
      start_date: getPrStartDate_(row),
      end_date: getPrEndDate_(row)
    }] : [];

    return dedupePrRecords_(records.concat(targetRecords, directRecord));
  }

  function getPrTargetMailName_(target) {
    return normalizeText(getValueByKeys(target, ['mail_name', 'メルマガ名', '対象メルマガ', 'target_mail_name']));
  }

  function buildPrRecordFromTarget_(target, prById) {
    const prId = getPrLinkIdFromTargetRow_(target);
    if (!prId) return null;

    const prRow = prById.get(prId) || {};
    return {
      pr_id: prId,
      pr_title: getPrTitle_(prRow) || getPrTitle_(target),
      pr_text: getPrText_(prRow) || getPrText_(target),
      start_date: getPrStartDate_(prRow) || getPrStartDate_(target),
      end_date: getPrEndDate_(prRow) || getPrEndDate_(target)
    };
  }

  function getPrRecordsByScanningPrRows_(mailName, prRows) {
    return prRows
      .filter(prRow => Object.keys(prRow).some(key => normalizeText(prRow[key]) === mailName))
      .map(prRow => ({
        pr_id: getPrLinkIdFromMasterRow_(prRow),
        start_date: getPrStartDate_(prRow),
        end_date: getPrEndDate_(prRow)
      }))
      .filter(record => record.pr_id);
  }

  function getPrLinkIdFromMasterRow_(row) {
    return normalizeIdKey(getValueByKeys(row, ['pr_id', 'PR ID', 'ＰＲ ID', 'PR_ID', 'PRID', 'PR', 'pr', 'ID', 'id']));
  }

  function getPrLinkIdFromTargetRow_(row) {
    return normalizeIdKey(getValueByKeys(row, ['pr_id', 'PR ID', 'ＰＲ ID', 'PR_ID', 'PRID', 'PR', 'pr']));
  }

  function getPrStartDate_(row) {
    return getValueByKeys(row, PR_START_DATE_KEYS);
  }

  function getPrEndDate_(row) {
    return getValueByKeys(row, PR_END_DATE_KEYS);
  }

  function dedupePrRecords_(records) {
    const byId = new Map();
    records.forEach(record => {
      const prId = normalizeIdKey(record && record.pr_id);
      if (!prId) return;
      const existing = byId.get(prId);
      if (!existing) {
        byId.set(prId, Object.assign({}, record, { pr_id: prId }));
        return;
      }
      byId.set(prId, {
        pr_id: prId,
        pr_title: existing.pr_title || record.pr_title || '',
        pr_text: existing.pr_text || record.pr_text || '',
        start_date: existing.start_date || record.start_date || '',
        end_date: existing.end_date || record.end_date || ''
      });
    });
    return Array.from(byId.values());
  }

  function getPrTitle_(row) {
    return getValueByKeys(row, ['pr_title', 'name', 'タイトル', '名称', 'PRタイトル']);
  }

  function getPrText_(row) {
    return getValueByKeys(row, ['pr_text', 'PR本文', '本文', 'PR文面', 'content']);
  }

  function setEditState(fixed, stopped) {
    const locked = fixed || stopped;
    const modalCard = document.querySelector('#editModal .modal-card');
    if (modalCard) modalCard.classList.toggle('is-stopped-edit', !!stopped && !fixed);
    setModalFormatTabLockState(document.getElementById('editModal'), true);

    document.querySelectorAll('#editModal input, #editModal select, #editModal textarea').forEach(field => {
      if (field.id === 'new-comment') return;
      if (field.name === 'mail_name') {
        field.readOnly = true;
        field.disabled = false;
        return;
      }
      if (field.name === 'current_job_count') {
        field.readOnly = true;
        field.disabled = true;
        return;
      }
      if (field.tagName === 'SELECT') {
        field.disabled = locked;
      } else {
        field.readOnly = locked;
        field.disabled = false;
      }
    });
    // 保存ボタン（新フッター対応）
    const saveButton = document.getElementById('btnModalSave');
    if (saveButton) {
      saveButton.disabled = locked;
      saveButton.style.display = locked ? 'none' : '';
    }
    const closeButton = document.getElementById('btnModalClose');
    if (closeButton) {
      closeButton.style.display = locked ? '' : 'none';
    }

    const stopButton = document.getElementById('stop-delivery-button');
    const resumeButton = document.getElementById('resume-delivery-button');
    const stopResumeRow = document.getElementById('stopResumeRow');
    const showStop = !fixed && !stopped;
    const showResume = !fixed && stopped;
    if (stopButton) stopButton.style.display = showStop ? '' : 'none';
    if (resumeButton) resumeButton.style.display = showResume ? '' : 'none';
    if (stopResumeRow) stopResumeRow.style.display = (showStop || showResume) ? '' : 'none';

    const statusPill = document.getElementById('delivery-status-pill');
    if (statusPill) {
      statusPill.classList.toggle('is-stopped', !!stopped && !fixed);
      statusPill.classList.toggle('is-active', !stopped && !fixed);
      statusPill.textContent = fixed
        ? '確定済'
        : stopped
          ? '配信停止中'
          : '配信予定';
      statusPill.style.display = '';
    }

    let notice = document.getElementById('fixedNotice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'fixedNotice';
      notice.className = 'fixed-notice';
      const scrollBody = document.querySelector('#editModal .modal-scroll-body');
      if (scrollBody) scrollBody.insertBefore(notice, scrollBody.firstChild);
    }
    notice.textContent = fixed
      ? 'この配信は確定済みのため編集できません。コメントの追加は可能です。'
      : stopped
        ? 'この配信は手動で配信停止中です。再開すると編集できます。コメントの追加は可能です。'
        : '';
    notice.style.display = locked ? 'block' : 'none';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  function toggleCellExpand(event) {
    if (!event || !event.currentTarget) return;
    // ボタン操作やテキスト選択を邪魔しない
    if (event.target && (event.target.tagName === 'BUTTON' || event.target.tagName === 'A')) return;
    event.currentTarget.classList.toggle('is-expanded');
  }

  function copyTextToClipboard_(text) {
    const value = String(text == null ? '' : text);
    if (!value) return;

    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      navigator.clipboard.writeText(value).catch(() => {});
      return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = value;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(textarea);
  }

  function handleActionClick(event) {
    const actionElement = event.target.closest('[data-action]');
    if (!actionElement) {
      // ⑫ カレンダー時間枠の隙間クリックで新規メルマガ追加（空セル・既存エントリの隙間どちらも対応）
      if (!IS_MOVE_MODE) {
        const cell = event.target.closest('#tableContainer td[data-date][data-hour]');
        // delivery-row の上でなく、セル本体またはセル直下の隙間をクリックした場合
        if (cell && !event.target.closest('.delivery-row')) {
          const clickDate = cell.dataset.date;
          const clickHour = cell.dataset.hour;
          if (clickDate && clickHour) {
            openSlotAddPicker_(clickDate, clickHour);
          }
        }
      }
      return;
    }

    const action = String(actionElement.dataset.action || '').trim();
    if (!action) return;

    event.preventDefault();
    event.stopPropagation();

    if (action === 'toggle-cell-expand') {
      toggleCellExpand({ currentTarget: actionElement, target: event.target });
      return;
    }

    if (action === 'toggle-check-status') {
      toggleCheckStatusFromCell(actionElement, event);
      return;
    }

    if (action === 'open-modal') {
      openModal(actionElement.dataset.entry || '');
      return;
    }

    if (action === 'open-master-modal') {
      openMasterModal(actionElement.dataset.row || '');
      return;
    }


    if (action === 'delete-master-row') {
      deleteMasterRow(actionElement.dataset.rowNumber || '');
      return;
    }

    if (action === 'stop-all-for-day') {
      stopAllForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'resume-all-for-day') {
      resumeAllForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'fill-r-for-day') {
      fillRForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'modal-toggle-setting') {
      handleModalToggleSetting_();
      return;
    }

    if (action === 'modal-set-checking' || action === 'modal-toggle-checking') {
      handleModalToggleChecking_();
      return;
    }

    if (action === 'save-pending-check-statuses') {
      savePendingCheckStatuses();
      return;
    }

    if (action === 'toggle-move-mode') {
      toggleMoveMode();
      return;
    }

    if (action === 'jump-to-current-week') {
      jumpToCurrentWeek();
      return;
    }

    if (action === 'jump-week') {
      jumpWeek(Number(actionElement.dataset.weekOffset || 0));
      return;
    }

    if (action === 'load-active-master') {
      loadActiveMaster();
      return;
    }

    if (action === 'toggle-master-new-only') {
      setMasterNewOnly(!masterFilters.newOnly);
      return;
    }

    if (action === 'close-modal') {
      closeModal();
      return;
    }

    if (action === 'close-master-modal') {
      closeMasterModal();
      return;
    }

    if (action === 'reload-comments') {
      loadCommentsForCurrentEntry();
      return;
    }

    if (action === 'post-comment') {
      postComment();
      return;
    }

    if (action === 'stop-current-delivery') {
      stopCurrentDelivery();
      return;
    }

    if (action === 'resume-current-delivery') {
      resumeCurrentDelivery();
      return;
    }

    if (action === 'save-edit') {
      saveEdit();
      return;
    }

    if (action === 'save-master-edit') {
      saveMasterEdit();
      return;
    }

    if (action === 'save-master-draft') {
      saveMasterEdit({ draft: true });
      return;
    }

    if (action === 'delete-master-current') {
      deleteCurrentMasterRow();
      return;
    }

    if (action === 'copy-create-master') {
      copyCreateMaster();
      return;
    }
  }

  // ⑫ カレンダー時間枠クリック → 既存メルマガ選択 or 新規作成ピッカーを表示
  function openSlotAddPicker_(clickDate, clickHour) {
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    const d = new Date(clickDate + 'T00:00:00');
    const wdLabel = weekdays[d.getDay()];

    // ピッカーモーダルを構築
    let picker = document.getElementById('slotAddPicker');
    if (!picker) {
      picker = document.createElement('div');
      picker.id = 'slotAddPicker';
      picker.className = 'modal slot-add-picker-modal';
      picker.setAttribute('aria-hidden', 'true');
      picker.style.display = 'none';
      picker.innerHTML = `
        <div class="modal-card slot-add-picker-card" role="dialog" aria-modal="true">
          <div class="modal-header">
            <h2 id="slotAddPickerTitle"></h2>
            <button type="button" class="icon-button" data-slot-picker-close aria-label="閉じる">×</button>
          </div>
          <div class="slot-add-picker-body">
            <input type="text" id="slotAddPickerSearch" placeholder="メルマガ名で検索..." class="slot-add-picker-search" />
            <div id="slotAddPickerList" class="slot-add-picker-list"></div>
            <button type="button" class="primary-button slot-add-picker-new" id="slotAddPickerNew">＋ 新規メルマガを作成</button>
          </div>
        </div>
      `;
      document.body.appendChild(picker);
    }

    // タイトル設定
    const title = picker.querySelector('#slotAddPickerTitle');
    title.textContent = clickDate.replace(/-/g, '/') + ' ' + clickHour + ' に追加';

    // 既存メルマガリスト構築（下書き含む、停止除外なし）
    const schedules = Array.isArray(APP_DATA.schedule) ? APP_DATA.schedule : [];
    const listEl = picker.querySelector('#slotAddPickerList');
    const searchEl = picker.querySelector('#slotAddPickerSearch');
    searchEl.value = '';

    function renderList(keyword) {
      const kw = String(keyword || '').trim().toLowerCase();
      const items = schedules.filter(function(row) {
        if (!row || !row.schedule_id) return false;
        if (kw && String(row.mail_name || '').toLowerCase().indexOf(kw) === -1) return false;
        return true;
      });
      // 名前順ソート、重複除去(schedule_id)
      const seen = new Set();
      const unique = [];
      items.sort(function(a, b) { return String(a.mail_name || '').localeCompare(String(b.mail_name || '')); });
      items.forEach(function(row) {
        var id = String(row.schedule_id || '').trim();
        if (seen.has(id)) return;
        seen.add(id);
        unique.push(row);
      });
      if (unique.length === 0) {
        listEl.innerHTML = '<div class="slot-add-picker-empty">該当するメルマガがありません</div>';
        return;
      }
      listEl.innerHTML = unique.map(function(row) {
        var cycle = String(row.cycle || '').trim();
        var draft = isDraft(row) ? '<span class="slot-add-picker-badge draft">下書き</span>' : '';
        var inactive = isInactive(row) ? '<span class="slot-add-picker-badge stopped">停止中</span>' : '';
        return '<div class="slot-add-picker-item" data-schedule-id="' + escapeAttribute(row.schedule_id) + '">'
          + '<span class="slot-add-picker-name">' + escapeHtml(row.mail_name || '(名前なし)') + '</span>'
          + '<span class="slot-add-picker-meta">' + escapeHtml(cycle) + draft + inactive + '</span>'
          + '</div>';
      }).join('');
    }
    renderList('');

    searchEl.oninput = function() { renderList(searchEl.value); };

    // イベント
    var cleanup = function() {
      picker.removeEventListener('click', handlePickerClick);
      document.removeEventListener('keydown', handlePickerKey);
      setModalVisible_(picker, false);
    };

    var handlePickerClick = function(event) {
      // 閉じるボタン or 背景クリック
      if (event.target.closest('[data-slot-picker-close]') || event.target === picker) {
        cleanup();
        return;
      }
      // 新規作成
      if (event.target.closest('#slotAddPickerNew')) {
        cleanup();
        openMasterModalFromSlot_(clickDate, clickHour, {});
        return;
      }
      // 既存メルマガ選択
      var item = event.target.closest('.slot-add-picker-item');
      if (item) {
        var scheduleId = item.dataset.scheduleId;
        var source = schedules.find(function(r) { return String(r.schedule_id || '').trim() === scheduleId; });
        if (source) {
          cleanup();
          openMasterModalFromSlot_(clickDate, clickHour, source);
        }
      }
    };
    var handlePickerKey = function(event) {
      if (event.key === 'Escape') cleanup();
    };

    picker.addEventListener('click', handlePickerClick);
    document.addEventListener('keydown', handlePickerKey);
    setModalVisible_(picker, true);
    searchEl.focus();
  }

  // ⑫ 選択後にマスタ新規追加モーダルを開く（既存メルマガベース or 空白）
  function openMasterModalFromSlot_(clickDate, clickHour, sourceRow) {
    var weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    var d = new Date(clickDate + 'T00:00:00');
    var wdLabel = weekdays[d.getDay()];

    // sourceRow があれば既存メルマガの値をコピー（IDと管理フィールドは除外）
    var prefill = {};
    if (sourceRow && sourceRow.schedule_id) {
      var exclude = ['__rowNumber', 'schedule_id', 'pr_id', 'is_fixed', 'is_inactive', 'is_draft',
                     'source_sheet', 'source_row', 'current_job_count', 'job_count_updated_at'];
      Object.keys(sourceRow).forEach(function(key) {
        if (exclude.indexOf(key) === -1 && key.indexOf('__') !== 0) {
          prefill[key] = sourceRow[key];
        }
      });
    }
    // 日付・時間・曜日・サイクルを上書き
    prefill.start_date = clickDate;
    prefill.end_date = clickDate;
    prefill.hour = clickHour;
    prefill.weekday = wdLabel;
    prefill.cycle = '単発';

    // MASTER_DATA が app_schedule でロード済みなら即座に開く
    if (MASTER_DATA.sheetName === 'app_schedule' && MASTER_DATA.headers && MASTER_DATA.headers.length) {
      openMasterModal(encodeURIComponent(JSON.stringify(prefill)));
      return;
    }
    // 未ロードなら非同期でロードしてから開く
    showBusy('マスタデータを読み込み中...');
    google.script.run
      .withSuccessHandler(function(data) {
        hideBusy();
        MASTER_DATA = data || { sheetName: 'app_schedule', headers: [], rows: [] };
        if (!Array.isArray(MASTER_DATA.headers)) MASTER_DATA.headers = [];
        if (!Array.isArray(MASTER_DATA.rows)) MASTER_DATA.rows = [];
        openMasterModal(encodeURIComponent(JSON.stringify(prefill)));
      })
      .withFailureHandler(function(err) {
        hideBusy();
        alert('マスタデータの読み込みに失敗しました: ' + (err.message || err));
      })
      .getMasterData('app_schedule');
  }

  function toggleCheckStatusFromCell(cell, event) {
    if (!cell || !event) return;
    event.stopPropagation();
    const field = String(cell.dataset.checkField || '').trim();
    const encodedItemId = String(cell.dataset.encodedItemId || '').trim();
    const itemId = encodedItemId ? decodeURIComponent(encodedItemId) : String(cell.dataset.itemId || '').trim();
    if (!itemId || !field) return;

    saveCheckStatusImmediately(cell, itemId, field);
  }

  function scheduleResumeDataRefresh_() {
    if (!DATA_STATIC_READY || isAnyModalOpen_()) return;
    if (RESUME_REFRESH_TIMER) clearTimeout(RESUME_REFRESH_TIMER);
    RESUME_REFRESH_TIMER = setTimeout(() => {
      RESUME_REFRESH_TIMER = null;
      if (document.visibilityState !== 'visible') return;
      if (!DATA_STATIC_READY || isAnyModalOpen_()) return;
      loadData({ silent: true, resumeOnly: true });
    }, 500);
  }

  function wireEvents() {
    renderScheduleLegend();
    document.addEventListener('click', handleActionClick);
    // ⑦ 日付入力(input[type=date])はクリックで即ネイティブカレンダーを開く
    document.addEventListener('click', event => {
      const t = event.target;
      if (t && t.tagName === 'INPUT' && t.type === 'date' && typeof t.showPicker === 'function') {
        try { t.showPicker(); } catch (_) { /* ユーザー操作外などは無視 */ }
      }
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') scheduleResumeDataRefresh_();
    });
    window.addEventListener('focus', scheduleResumeDataRefresh_);
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => switchTab(button.dataset.tab));
    });
    document.getElementById('startInput').addEventListener('change', loadData);
    document.getElementById('searchInput').addEventListener('input', renderScheduleGrid);
    document.getElementById('masterSearchInput').addEventListener('input', renderMasterTable);
    document.getElementById('masterSheetSelect').addEventListener('change', loadActiveMaster);
    document.getElementById('editModal').addEventListener('click', event => {
      if (event.target.id === 'editModal') closeModal();
    });
    const editName = document.querySelector('#editModal [name="mail_name"]');
    if (editName) {
      editName.addEventListener('click', () => copyTextToClipboard_(editName.value));
    }
    const editAssignee = document.querySelector('#editModal [name="setter"]');
    if (editAssignee) {
      editAssignee.addEventListener('change', syncReviewerLock_);
    }
    document.getElementById('masterModal').addEventListener('click', event => {
      if (event.target.id === 'masterModal') closeMasterModal();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModal();
        closeMasterModal();
      }
    });

    initModalTabs('editModal');
    initModalTabs('masterModal');
    loadAdminList();
  }

  function stopAllForDay(dateStr) {
    const ids = [];
    document.querySelectorAll(`td[data-date="${dateStr}"] .delivery-row`).forEach(row => {
       const id = row.getAttribute('data-item-id');
       if (id && !row.classList.contains('is-fixed') && !row.classList.contains('is-stopped')) {
          ids.push(id);
       }
    });

    if (ids.length === 0) {
      alert('停止可能な配信予定がありません。');
      return;
    }

    if (!confirm(`${dateStr} の全${ids.length}件を一括で配信停止にしますか？\n（確定済みのものは除外されます）`)) return;

    showBusy('一括停止処理中...');
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">一括停止処理中...</div>';
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadData({ force: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('一括停止に失敗しました: ' + err.message);
        loadData({ force: true });
      })
      .stopAllDeliveriesForDay(dateStr, ids);
  }

  function resumeAllForDay(dateStr) {
    if (!confirm(`${dateStr} の停止設定をすべて解除し、再開しますか？\n（確定済みのものは除外されます）`)) return;

    showBusy('一括再開処理中...');
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">一括再開処理中...</div>';
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadData({ force: true });
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('一括再開に失敗しました: ' + err.message);
        loadData({ force: true });
      })
      .resumeAllDeliveriesForDay(dateStr);
  }

  function fillRForDay(dateStr) {
    const updates = [];
    document.querySelectorAll(`td[data-date="${dateStr}"] .delivery-row`).forEach(row => {
      try {
        const entry = JSON.parse(decodeURIComponent(row.dataset.entry || '{}'));
        if (String(entry.assignee || '').trim() !== 'R') return;
        // getCheckItemId で正規化キーに揃える (raw な scheduleId|dateStr だと
        // 描画/保存時の正規化キーと食い違い、確定済み判定や赤塗りがズレる)
        const checkItemId = getCheckItemId(Object.assign({}, entry, { target_date: dateStr }));
        if (isCheckStatusActive(checkItemId, 'checker')) return;
        updates.push({
          itemId: checkItemId,
          field: 'checker',
          active: true,
          payload: buildCheckLogPayload(checkItemId, 'checker', Object.assign({}, entry, { target_date: dateStr }))
        });
      } catch (e) {}
    });

    if (!updates.length) {
      alert('確定対象のRエントリーが見つかりません（すでに確定済みの場合も含みます）。');
      return;
    }

    if (!confirm(`${dateStr} のR枠${updates.length}件を一括確定しますか？`)) return;

    showBusy('R一括確定中...');
    google.script.run
      .withSuccessHandler(results => {
        (Array.isArray(results) ? results : []).forEach(result => {
          if (!result || !result.success) return;
          setLocalCheckStatus(result.item_id, result.field, !!result.active);
          applyArchiveResult_(result.archive);
        });
        hideBusy();
        renderScheduleGrid();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('R一括確定に失敗しました: ' + (err.message || String(err)));
      })
      .saveDailyCheckStatuses(updates);
  }

  window.addEventListener('beforeunload', event => {
    if (!getPendingCheckStatusUpdates().length) return;
    flushPendingCheckPersist();
    event.preventDefault();
    event.returnValue = '';
  });
  loadPendingCheckStatuses();
  wireEvents();
  loadData();
</script>
