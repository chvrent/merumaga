  function syncReviewerLock_() {
    const modal = document.getElementById('editModal');
    const assigneeEl = modal ? modal.querySelector('[name="setter"]') : null;
    const reviewerEl = modal ? modal.querySelector('[name="checker"]') : null;
    if (!assigneeEl || !reviewerEl) return;

    const locked = CURRENT_ENTRY && (isFixed(CURRENT_ENTRY) || isStopped(CURRENT_ENTRY));
    if (locked) {
      reviewerEl.disabled = true;
      return;
    }

    const assignee = String(assigneeEl.value || '').trim();
    if (assignee === 'R') {
      reviewerEl.value = '';
      reviewerEl.disabled = true;
    } else {
      reviewerEl.disabled = false;
    }
  }

  function collectNamedFormValues(form, options = {}) {
    const values = {};
    if (!form) return values;
    const exclude = new Set(options.exclude || []);
    const includeHidden = new Set(options.includeHidden || []);
    form.querySelectorAll('[name]').forEach(input => {
      if (!input.name || exclude.has(input.name)) return;
      if (input.type === 'hidden' && !includeHidden.has(input.name)) return;
      if (input.disabled) return;
      values[input.name] = input.type === 'checkbox' ? input.checked : input.value;
    });
    return values;
  }

  function normalizeMasterSubmissionPayload_(payload) {
    if (Object.prototype.hasOwnProperty.call(payload, 'setter')) {
      payload.assignee = payload.setter;
      delete payload.setter;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'checker')) {
      payload.reviewer = payload.checker;
      delete payload.checker;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.is_new ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    if (Object.prototype.hasOwnProperty.call(payload, 'new_flag') && !Object.prototype.hasOwnProperty.call(payload, 'is_new')) {
      payload.is_new = payload.new_flag ? 'TRUE' : 'FALSE';
      delete payload.new_flag;
    }
    return payload;
  }

  function bindEditModalInteractions_(modal) {
    if (!modal) return;
    bindCopyField_(modal, '[name="mail_name"]');
    bindChangeField_(modal, '[name="setter"]', syncReviewerLock_);
    syncReviewerLock_();
  }

  function bindCopyField_(root, selector) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.copyBound) return;
    field.dataset.copyBound = 'true';
    field.addEventListener('click', () => copyTextToClipboard_(field.value));
  }

  function bindChangeField_(root, selector, handler) {
    const field = root ? root.querySelector(selector) : null;
    if (!field || field.dataset.changeBound) return;
    field.dataset.changeBound = 'true';
    field.addEventListener('change', handler);
  }

  function saveMasterEdit() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '保存中...';
    showBusy('マスタを保存中...');
    const handlePreSaveFailure = err => {
      alert('未保存の設定・確認状態を一括保存できなかったため、マスタ保存を中止しました: ' + (err.message || String(err)));
      btn.disabled = false;
      btn.textContent = '保存';
      hideBusy();
    };

    const payload = normalizeMasterSubmissionPayload_(
      Object.assign(
        { __rowNumber: document.getElementById('master-row-number').value },
        collectNamedFormValues(document.getElementById('masterModal'))
      )
    );
    payload.format = document.getElementById('masterModal').dataset.format || 'フリー';

    // PR管理の場合のみ、target_ids (PRが入るメルマガ) を取得して savePRData を呼ぶ
    if (MASTER_DATA.sheetName === 'app_pr') {
      const selectedNewsletters = [];
      document.querySelectorAll('#newsletterList input[type="checkbox"]:checked').forEach(cb => {
        const mailName = cb.dataset.targetName;
        // source_row は APP_DATA.schedule から検索
        const rowData = APP_DATA.schedule.find(s => String(s.mail_name || '').trim() === mailName);
        selectedNewsletters.push({
          mail_name: mailName,
          source_row: rowData ? rowData.source_row : ''
        });
      });
      payload.target_ids = selectedNewsletters.map(n => n.mail_name).join(',');

      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData();
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .savePRData(payload, selectedNewsletters);
      }, handlePreSaveFailure);
    } else {
      flushPendingCheckStatusesBefore(() => {
        google.script.run
          .withSuccessHandler(() => {
            closeMasterModal();
            loadActiveMaster();
            loadData();
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .withFailureHandler(err => {
            alert('保存に失敗しました: ' + (err.message || err));
            btn.disabled = false;
            btn.textContent = '保存';
            hideBusy();
          })
          .saveMasterData(MASTER_DATA.sheetName, payload);
      }, handlePreSaveFailure);
    }
  }

  function deleteMasterRow(rowNumber) {
    if (!rowNumber || !confirm('この行を削除しますか？')) return;

    showBusy('行を削除中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadActiveMaster();
        loadData();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('削除に失敗しました: ' + (err.message || err));
      })
      .deleteMasterData(MASTER_DATA.sheetName, rowNumber);
  }

  function closeModal() {
    const modal = document.getElementById('editModal');
    if (modal) {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    }
  }

  function openModal(encodedEntry) {
    const entry = JSON.parse(decodeURIComponent(encodedEntry));
    const scheduleRow = (APP_DATA.schedule || []).find(row => String(row && row.schedule_id || '').trim() === String(entry && entry.schedule_id || '').trim());
    const baseEntry = scheduleRow ? Object.assign({}, scheduleRow) : Object.assign({}, entry);
    baseEntry.target_date = entry.target_date;
    if (entry.hour) baseEntry.hour = entry.hour;
    if (entry.source_row) baseEntry.source_row = entry.source_row;
    
    CURRENT_ENTRY_BASE = baseEntry;
    CURRENT_ENTRY = applyOccurrenceOverrideToEntry(baseEntry);

    const modal = document.getElementById('editModal');
    if (!modal) return;

    // 1. 追加フィールドのレンダリング
    const editCoreFields = modal.querySelector('#editCoreFields');
    if (editCoreFields) {
      renderEditModalFields_(CURRENT_ENTRY);
    }

    // 2. name属性を基準としたデータ流し込み
    populateModalFields(modal, CURRENT_ENTRY, getModalFieldAliases_('editModal'));
    refreshAdminSelects_();
    bindEditModalInteractions_(modal);

    // 3. PR情報の表示
    const prDetails = getPrRecordsForSchedule(CURRENT_ENTRY);
    const prContainer = modal.querySelector('#edit-pr-details');
    if (prContainer) {
      if (prDetails.length > 0) {
        const prList = prDetails.map(pr => {
          const prData = (APP_DATA.pr || []).find(p => String(p.pr_id) === String(pr.pr_id));
          return `<div class="pr-info-item"><strong>ID:</strong> ${escapeHtml(pr.pr_id)}<br><strong>タイトル:</strong> ${escapeHtml(prData ? prData.name : '不明')}</div>`;
        }).join('<hr>');
        prContainer.innerHTML = '<h4>紐付いているPR</h4>' + prList;
      } else {
        prContainer.innerHTML = '<h4>紐付いているPR</h4><p>なし</p>';
      }
    }

    // 4. タブの初期化とルール適用
    const currentFormat = CURRENT_ENTRY.format || 'フリー';
    window.openAndInitModalWithTab(currentFormat, 'editModal');
    loadCommentsForCurrentEntry();

    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
  }

  // モーダルごとのタブ初期化（イベントリスナー登録）
  function initModalTabs(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        setModalFormatState(modal, this.dataset.format);
      });
    });

    modal.querySelectorAll('select[name="format"]').forEach(select => {
      if (select.dataset.formatBound === 'true') return;
      select.dataset.formatBound = 'true';
      select.addEventListener('change', event => {
        setModalFormatState(modal, event.target.value);
      });
    });
  }

  function setModalFormatState(modal, format) {
    if (!modal) return;
    const nextFormat = String(format || 'フリー');
    modal.dataset.format = nextFormat;
    modal.querySelectorAll('.modal-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.format === nextFormat);
    });
    modal.querySelectorAll('[name="format"]').forEach(input => {
      input.value = nextFormat;
    });
    if (modal.id === 'masterModal') {
      if (modal.dataset.modalType !== 'pr-master') {
        updateMasterFormFields();
      }
      return;
    }
    applyDynamicInputControl(nextFormat, modal.id);
  }

  // 形式ごとの入力制御
  function applyDynamicInputControl(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;

    const normalizedFormat = String(format || '').trim();
    const isAutoJob = normalizedFormat === '自動求人特集';
    const isOther = normalizedFormat === 'その他';
    const autoJobFields = ['auto_job_feature_id', 'job_url'];
    const editLockedFields = ['mail_type', 'sub_category', 'is_new', 'cycle', 'pr'];

    const currentJobCountGroup = modal.querySelector('[data-field="current_job_count"]');
    const currentJobCountInput = currentJobCountGroup ? currentJobCountGroup.querySelector('input, select, textarea') : null;

    modal.querySelectorAll('.form-group').forEach(group => {
      group.classList.remove('disabled');
      group.querySelectorAll('input, select, textarea').forEach(input => input.disabled = false);
    });

    autoJobFields.forEach(key => {
      const group = modal.querySelector(`[data-field="${key}"]`);
      if (!group) return;
      const shouldEnable = isAutoJob || isOther;
      group.classList.toggle('disabled', !shouldEnable);
      group.querySelectorAll('input, select, textarea').forEach(input => {
        input.disabled = !shouldEnable;
      });
    });

    if (modalId === 'editModal') {
      editLockedFields.forEach(key => {
        const group = modal.querySelector(`[data-field="${key}"]`);
        if (!group) return;
        group.classList.add('disabled');
        group.querySelectorAll('input, select, textarea').forEach(input => {
          input.disabled = true;
        });
      });
    }

    if (currentJobCountInput) {
      currentJobCountInput.disabled = true;
      currentJobCountInput.readOnly = true;
      currentJobCountInput.placeholder = isAutoJob
        ? '保存後にURLから自動取得されます'
        : '保存後に自動取得されます';
      currentJobCountGroup.classList.add('disabled');
    }

    if (modal.dataset.modalType === 'pr-master') {
      const prIdInput = modal.querySelector('[name="pr_id"]');
      if (prIdInput) {
        prIdInput.readOnly = true;
        prIdInput.disabled = true;
        prIdInput.placeholder = '保存時に自動採番';
      }
    }
  }

  function openAndInitModalWithTab(format, modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    setModalFormatState(modal, format);
  }
  function saveEdit() {
    if (CURRENT_ENTRY && isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は編集できません');
      return;
    }
    if (CURRENT_ENTRY && isStopped(CURRENT_ENTRY)) {
      alert('配信停止中の配信は編集できません。再開してから編集してください。');
      return;
    }

    const base = CURRENT_ENTRY_BASE || CURRENT_ENTRY || {};
    const itemId = getCheckItemId(CURRENT_ENTRY);

    const form = document.getElementById('editForm');
    const nextValues = normalizeMasterSubmissionPayload_(
      collectNamedFormValues(form, { exclude: ['schedule_id', 'current_job_count', 'job_count_updated_at'] })
    );

    if (String(nextValues.assignee || '').trim() === 'R') {
      nextValues.reviewer = '';
    }

    const overrideFields = [];
    const payload = {
      item_id: itemId,
      schedule_id: CURRENT_ENTRY.schedule_id,
      original_date: CURRENT_ENTRY.target_date,
      delivery_date: CURRENT_ENTRY.target_date,
      hour: CURRENT_ENTRY.hour,
      mail_name: CURRENT_ENTRY.mail_name
    };

    Object.keys(nextValues).forEach(key => {
      const next = String(nextValues[key] == null ? '' : nextValues[key]);
      const prev = String(base[key] == null ? '' : base[key]);
      if (next !== prev) {
        overrideFields.push(key);
        payload[key] = next;
      }
    });
    payload.override_fields = overrideFields.join(',');

    showBusy('配信内容を保存中...');
    flushPendingCheckStatusesBefore(() => {
      google.script.run
        .withSuccessHandler(() => {
          hideBusy();
          closeModal();
          loadData();
        })
        .withFailureHandler(err => {
          hideBusy();
          alert('保存に失敗しました: ' + (err.message || err));
        })
        .saveCheckStatus(itemId, 'occurrence_override', overrideFields.length > 0, payload);
    }, err => {
      hideBusy();
      alert('未保存の設定・確認状態を一括保存できなかったため、配信内容の保存を中止しました: ' + (err.message || String(err)));
    });
  }

  function stopCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }
    if (!confirm('この週の配信を停止し、カレンダーをグレーアウトします。よろしいですか？')) return;

    showBusy('配信停止を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, true);
        setEditState(false, true);
        renderScheduleGrid();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信停止に失敗しました: ' + (err.message || err));
      })
      .stopDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function resumeCurrentDelivery() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id || !CURRENT_ENTRY.target_date) return;
    if (isFixed(CURRENT_ENTRY)) {
      alert('確定済みの配信は停止状態を変更できません');
      return;
    }

    showBusy('配信再開を保存中...');
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        setStoppedOccurrence(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date, false);
        setEditState(false, false);
        renderScheduleGrid();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('配信再開に失敗しました: ' + (err.message || err));
      })
      .resumeDelivery(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function loadCommentsForCurrentEntry() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id) {
      renderComments([]);
      return;
    }

    document.getElementById('comment-thread').innerHTML = '<div class="empty-state">コメントを読み込み中...</div>';
    google.script.run
      .withSuccessHandler(comments => {
        renderComments(Array.isArray(comments) ? comments : []);
      })
      .withFailureHandler(err => {
        document.getElementById('comment-thread').innerHTML =
          '<div class="empty-state">コメントの読み込みに失敗しました: ' + escapeHtml(err.message || String(err)) + '</div>';
      })
      .getCommentsByScheduleId(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
  }

  function postComment() {
    if (!CURRENT_ENTRY || !CURRENT_ENTRY.schedule_id) return;

    const input = document.getElementById('new-comment');
    const commentText = input.value.trim();
    if (!commentText) return;

    google.script.run
      .withSuccessHandler(() => {
        input.value = '';
        incrementCommentCount(CURRENT_ENTRY.schedule_id, CURRENT_ENTRY.target_date);
        renderScheduleGrid();
        loadCommentsForCurrentEntry();
      })
      .withFailureHandler(err => {
        alert('コメントの送信に失敗しました: ' + (err.message || err));
      })
      .saveComment(CURRENT_ENTRY.schedule_id, commentText, CURRENT_ENTRY.target_date);
  }

  function renderComments(comments) {
    const thread = document.getElementById('comment-thread');
    const countLabel = document.getElementById('comment-count-label');
    countLabel.textContent = `${comments.length}件`;

    if (!comments.length) {
      thread.innerHTML = '<div class="empty-state">コメントはまだありません。</div>';
      return;
    }

    thread.innerHTML = comments.map(comment => `
      <div class="comment-item">
        <div class="comment-meta">${escapeHtml(comment.timestamp)} - ${escapeHtml(comment.user || 'ユーザー')}</div>
        <div class="comment-text">${escapeHtml(comment.comment_text).replace(/\n/g, '<br>')}</div>
      </div>
    `).join('');
    thread.scrollTop = thread.scrollHeight;
  }

  function renderCommentBadge(row) {
    const count = getCommentCount(row);
    return count ? `<span class="comment-badge" title="コメント ${count}件">${count}</span>` : '';
  }

  function getCommentCount(row) {
    const scheduleId = row && row.schedule_id;
    const targetDate = row && row.target_date;
    const counts = APP_DATA.commentCounts || {};
    return Number(counts[getCommentKey(scheduleId, targetDate)] || 0);
  }

  function incrementCommentCount(scheduleId, targetDate) {
    if (!APP_DATA.commentCounts) APP_DATA.commentCounts = {};
    const key = getCommentKey(scheduleId, targetDate);
    APP_DATA.commentCounts[key] = Number(APP_DATA.commentCounts[key] || 0) + 1;
  }

  function getCommentKey(scheduleId, targetDate) {
    return `${String(scheduleId || '').trim()}|${String(targetDate || '').trim()}`;
  }

  function getCheckItemId(row) {
    return [
      row && row.schedule_id,
      row && row.target_date,
    ].map(value => String(value || '').trim().replace(/\s+/g, ' ')).join('|');
  }

  function isPastDateString(dateStr) {
    return normalizeDateString(dateStr) < formatDate(new Date());
  }

  function getArchivedOccurrenceForRow(row, dateStr) {
    const sourceRow = row && row.source_row;
    if (!sourceRow || !dateStr) return null;
    return (APP_DATA.archivedOccurrences || {})[`${sourceRow}|${dateStr}`] || null;
  }

  function getArchivedOccurrencesForSlot(dateStr, hour, keyword) {
    if (!isPastDateString(dateStr)) return [];
    const targetHour = String(hour || '').split(':')[0].trim();
    return Object.values(APP_DATA.archivedOccurrences || {}).filter(row => {
      if (normalizeDateString(row && row.target_date) !== dateStr) return false;
      if (String(row.hour || '').split(':')[0].trim() !== targetHour) return false;
      if (!keyword) return true;
      return [
        row.mail_name,
        row.weekday,
        row.hour,
        row.mail_type || row.category,
        row.cycle,
        row.format,
        row.assignee,
        row.reviewer,
        row.source_sheet
      ]
        .map(value => String(value || '').toLowerCase())
        .join(' ')
        .includes(keyword);
    });
  }

  function isArchivedDate(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = (today.getTime() - d.getTime()) / DAY_MS;
    return diff >= 14;
  }

  function renderCheckStatusCell(itemId, field, value, className, row) {
    const active = isCheckStatusActive(itemId, field);
    const archived = isArchivedDate(row.target_date);
    const encodedItemId = encodeURIComponent(itemId).replace(/'/g, '%27');
    const logPayload = encodeURIComponent(JSON.stringify(buildCheckLogPayload(itemId, field, row))).replace(/'/g, '%27');

    const actionAttr = archived ? '' : 'data-action="toggle-check-status"';
    const cursor = archived ? 'default' : 'pointer';

    return `
      <div
        class="${className} check-status-cell ${active ? 'is-active-red' : ''} ${hasPendingCheckStatus(itemId, field) ? 'is-pending-check' : ''} ${archived ? 'archived-cell' : ''}"
        data-item-id="${escapeAttribute(itemId)}"
        data-check-field="${escapeAttribute(field)}"
        data-log-payload="${escapeAttribute(logPayload)}"
        data-encoded-item-id="${escapeAttribute(encodedItemId)}"
        ${actionAttr}
        style="cursor: ${cursor}"
        title="${archived ? '過去14日以上前のデータは編集できません' : 'クリックで赤塗りを切り替え'}"
      >${escapeHtml(value)}</div>
    `;
  }

  function toggleCheckStatus(event, encodedItemId, field) {
    event.stopPropagation();
    const itemId = decodeURIComponent(encodedItemId);
    const nextActive = !isCheckStatusActive(itemId, field);
    const cell = event.currentTarget;
    const payload = parseCheckLogPayload(cell.dataset.logPayload);
    setPendingCheckStatus(itemId, field, nextActive, payload);
    schedulePendingCheckPersist();
    cell.classList.toggle('is-active-red', nextActive);
    cell.classList.toggle('is-pending-check', hasPendingCheckStatus(itemId, field));
    updatePendingCheckSaveButton();
  }

  function buildCheckLogPayload(itemId, field, row) {
    return {
      item_id: itemId,
      field,
      schedule_id: row && row.schedule_id,
      source_row: row && row.source_row,
      delivery_date: row && row.target_date,
      hour: row && row.hour,
      mail_name: row && row.mail_name,
      assignee: row && row.assignee,
      reviewer: row && row.reviewer,
      job_url: row && row.job_url,
      current_job_count: row && row.current_job_count
    };
  }

  function applyArchiveResult_(archive) {
    if (!archive || !archive.source_row || !archive.target_date) return;
    if (!APP_DATA.fixedOccurrences) APP_DATA.fixedOccurrences = {};
    const key = `${archive.source_row}|${archive.target_date}`;
    if (archive.archived) {
      APP_DATA.fixedOccurrences[key] = true;
    } else if (archive.deleted) {
      delete APP_DATA.fixedOccurrences[key];
    }
  }

  function parseCheckLogPayload(encodedPayload) {
    if (!encodedPayload) return {};
    try {
      return JSON.parse(decodeURIComponent(encodedPayload));
    } catch (error) {
      return {};
    }
  }

  function isCheckStatusActive(itemId, field) {
    const pending = LOCAL_CHECK_CHANGES[getCheckStatusKey(itemId, field)];
    if (pending) return !!pending.active;
    const archivedActive = getArchivedCheckStatusActive(itemId, field);
    if (archivedActive != null) return archivedActive;
    if (field === 'setter' || field === 'checker') return false;
    const statuses = APP_DATA.checkStatuses || {};
    return !!statuses[getCheckStatusKey(itemId, field)];
  }

  function isSavedCheckStatusActive(itemId, field) {
    const archivedActive = getArchivedCheckStatusActive(itemId, field);
    if (archivedActive != null) return archivedActive;
    if (field === 'setter' || field === 'checker') return false;
    const statuses = APP_DATA.checkStatuses || {};
    return !!statuses[getCheckStatusKey(itemId, field)];
  }

  function setLocalCheckStatus(itemId, field, active) {
    if (!APP_DATA.checkStatuses) APP_DATA.checkStatuses = {};
    const key = getCheckStatusKey(itemId, field);
    if (active) {
      APP_DATA.checkStatuses[key] = true;
    } else {
      delete APP_DATA.checkStatuses[key];
    }
    setArchivedCheckStatus(itemId, field, active);
  }

  function getArchivedCheckStatusActive(itemId, field) {
    const row = Object.values(APP_DATA.archivedOccurrences || {}).find(item => getCheckItemId(item) === itemId);
    if (!row) return null;
    const key = field === 'setter' ? 'check_setter_active' : field === 'checker' ? 'check_checker_active' : '';
    if (!key || !Object.prototype.hasOwnProperty.call(row, key)) return null;
    return isTruthyValue(row[key]);
  }

  function setArchivedCheckStatus(itemId, field, active) {
    const row = Object.values(APP_DATA.archivedOccurrences || {}).find(item => getCheckItemId(item) === itemId);
    if (!row) return;
    const key = field === 'setter' ? 'check_setter_active' : field === 'checker' ? 'check_checker_active' : '';
    if (key) row[key] = !!active;
  }

  function isTruthyValue(value) {
    const text = String(value == null ? '' : value).trim().toLowerCase();
    return value === true || text === 'true' || text === '1' || text === 'yes' || text === 'y' || text === '済';
  }

  function setPendingCheckStatus(itemId, field, active, payload) {
    const key = getCheckStatusKey(itemId, field);
    const savedActive = isSavedCheckStatusActive(itemId, field);
    if (savedActive === !!active) {
      delete LOCAL_CHECK_CHANGES[key];
      return;
    }
    LOCAL_CHECK_CHANGES[key] = {
      itemId,
      field,
      active: !!active,
      payload: payload || {},
      updatedAt: new Date().toISOString()
    };
  }

  function hasPendingCheckStatus(itemId, field) {
    return !!LOCAL_CHECK_CHANGES[getCheckStatusKey(itemId, field)];
  }

  function getPendingCheckStatusUpdates() {
    return Object.values(LOCAL_CHECK_CHANGES)
      .filter(change => {
        const assignee = String(change && change.payload && change.payload.assignee || '').trim();
        if (assignee === 'R') return change.field === 'setter';
        return change.field === 'checker';
      })
      .map(change => ({
        itemId: change.itemId,
        field: change.field,
        active: !!change.active,
        payload: change.payload || {}
      }));
  }

  function loadPendingCheckStatuses() {
    try {
      const parsed = JSON.parse(localStorage.getItem(CHECK_STATUS_STORAGE_KEY) || '{}');
      LOCAL_CHECK_CHANGES = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
    } catch (error) {
      LOCAL_CHECK_CHANGES = {};
    }
  }

  function persistPendingCheckStatuses() {
    try {
      localStorage.setItem(CHECK_STATUS_STORAGE_KEY, JSON.stringify(LOCAL_CHECK_CHANGES));
    } catch (error) {
      // localStorageが使えない場合も画面上の一時状態は維持する
    }
  }

  function schedulePendingCheckPersist() {
    if (PENDING_CHECK_SAVE_TIMER) clearTimeout(PENDING_CHECK_SAVE_TIMER);
    PENDING_CHECK_SAVE_TIMER = setTimeout(() => {
      PENDING_CHECK_SAVE_TIMER = null;
      persistPendingCheckStatuses();
    }, 120);
  }

  function flushPendingCheckPersist() {
    if (PENDING_CHECK_SAVE_TIMER) {
      clearTimeout(PENDING_CHECK_SAVE_TIMER);
      PENDING_CHECK_SAVE_TIMER = null;
    }
    persistPendingCheckStatuses();
  }

  function clearPendingCheckStatuses() {
    LOCAL_CHECK_CHANGES = {};
    if (PENDING_CHECK_SAVE_TIMER) {
      clearTimeout(PENDING_CHECK_SAVE_TIMER);
      PENDING_CHECK_SAVE_TIMER = null;
    }
    try {
      localStorage.removeItem(CHECK_STATUS_STORAGE_KEY);
    } catch (error) {
      // ignore storage errors
    }
    updatePendingCheckSaveButton();
  }

  function updatePendingCheckSaveButton() {
    const button = document.getElementById('saveDailyChecksButton');
    if (!button) return;
    const count = getPendingCheckStatusUpdates().length;
    button.textContent = `本日の状態を一括保存（${count}）`;
    button.disabled = count === 0;
  }

  function savePendingCheckStatuses() {
    flushPendingCheckPersist();
    const updates = getPendingCheckStatusUpdates();
    if (!updates.length) {
      updatePendingCheckSaveButton();
      return;
    }

    showBusy('本日の状態を一括保存中...');
    google.script.run
      .withSuccessHandler(results => {
        (Array.isArray(results) ? results : []).forEach(result => {
          if (!result || !result.success) return;
          setLocalCheckStatus(result.item_id, result.field, !!result.active);
          applyArchiveResult_(result.archive);
        });
        clearPendingCheckStatuses();
        renderScheduleGrid();
        hideBusy();
      })
      .withFailureHandler(err => {
        hideBusy();
        persistPendingCheckStatuses();
        updatePendingCheckSaveButton();
        alert('一括保存に失敗しました。画面上の未保存状態は保持しています: ' + (err.message || String(err)));
      })
      .saveDailyCheckStatuses(updates);
  }

  function flushPendingCheckStatusesBefore(next, onFailure) {
    flushPendingCheckPersist();
    const updates = getPendingCheckStatusUpdates();
    if (!updates.length) {
      next();
      return;
    }

    google.script.run
      .withSuccessHandler(results => {
        (Array.isArray(results) ? results : []).forEach(result => {
          if (!result || !result.success) return;
          setLocalCheckStatus(result.item_id, result.field, !!result.active);
          applyArchiveResult_(result.archive);
        });
        clearPendingCheckStatuses();
        renderScheduleGrid();
        next();
      })
      .withFailureHandler(err => {
        persistPendingCheckStatuses();
        updatePendingCheckSaveButton();
        if (typeof onFailure === 'function') onFailure(err);
      })
      .saveDailyCheckStatuses(updates);
  }

  function getCheckStatusKey(itemId, field) {
    return `${String(itemId || '').trim()}|${String(field || '').trim()}`;
  }

  function buildAssigneeOptions() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows.map(row => {
      const value = row.initial || row.name || row.full_name || row['略称'] || row['名前'] || row['氏名'] || '';
      const label = row.full_name || row.fullName || row.name || row['氏名'] || row['名前'] || value;
      return `<option value="${escapeAttribute(value)}">${escapeHtml(value)}${label && label !== value ? ` (${escapeHtml(label)})` : ''}</option>`;
    }).join('');
  }

  function getAdminOptionValues() {
    const rows = Array.isArray(APP_DATA.adminMaster) ? APP_DATA.adminMaster : [];
    return rows
      .map(row => {
        const value = row.initial || row.name || row.full_name || row['略称'] || row['名前'] || row['氏名'] || '';
        const label = row.full_name || row.fullName || row.name || row['氏名'] || row['名前'] || value;
        return value ? { value, label: label && label !== value ? `${value} (${label})` : value } : null;
      })
      .filter(Boolean);
  }

  function loadAdminList() {
    google.script.run
      .withSuccessHandler(rows => {
        APP_DATA.adminMaster = Array.isArray(rows) ? rows : [];
        refreshAdminSelects_();
      })
      .withFailureHandler(() => {
        refreshAdminSelects_();
      })
      .getAdminList();
  }

  function getAdminSelectOptions_() {
    return getAdminOptionValues().map(option => {
      if (option && typeof option === 'object') {
        return {
          value: String(option.value == null ? '' : option.value).trim(),
          label: String(option.label == null ? option.value : option.label)
        };
      }
      const value = String(option == null ? '' : option).trim();
      return { value, label: value };
    });
  }

  function refreshAdminSelects_() {
    const optionValues = getAdminSelectOptions_();
    document.querySelectorAll('#masterModal select[name="setter"], #masterModal select[name="checker"], #editModal select[name="setter"], #editModal select[name="checker"]').forEach(select => {
      const selected = String(select.value || '').trim();
      const nextSelected = selected || (optionValues[0] ? optionValues[0].value : '');
      select.innerHTML = optionValues.map(option => `<option value="${escapeAttribute(option.value)}" ${option.value === nextSelected ? 'selected' : ''}>${escapeHtml(option.label || option.value)}</option>`).join('');
      if (nextSelected && !optionValues.some(option => option.value === nextSelected)) {
        select.insertAdjacentHTML('beforeend', `<option value="${escapeAttribute(nextSelected)}" selected>${escapeHtml(nextSelected)}</option>`);
      }
      select.value = nextSelected;
    });
  }

  function renderSelectInput(header, currentValue, options) {
    const normalizedCurrent = String(currentValue == null ? '' : currentValue).trim();
    const normalizedOptions = options.map(option => {
      if (option && typeof option === 'object') {
        return {
          value: String(option.value == null ? '' : option.value).trim(),
          label: String(option.label == null ? option.value : option.label)
        };
      }
      const value = String(option == null ? '' : option).trim();
      return value ? { value, label: value } : null;
    }).filter(Boolean);
    const selectedValue = normalizedCurrent || (normalizedOptions[0] ? normalizedOptions[0].value : '');
    if (selectedValue && !normalizedOptions.some(option => option.value === selectedValue)) {
      normalizedOptions.push({ value: selectedValue, label: selectedValue });
    }

    const optionHtml = normalizedOptions.map(option => `
      <option value="${escapeAttribute(option.value)}" ${option.value === selectedValue ? 'selected' : ''}>${escapeHtml(option.label || option.value)}</option>
    `).join('');
    return `<select data-header="${escapeAttribute(header)}">${optionHtml}</select>`;
  }

  function renderNamedSelectInput(name, currentValue, options) {
    return renderSelectInput(name, currentValue, options).replace('<select ', `<select name="${escapeAttribute(name)}" data-select-name="${escapeAttribute(name)}" `);
  }

  function renderMasterFieldInput_(header, key, value, mode) {
    const textValue = value == null ? '' : value;
    if (key === 'mail_content' || key === 'notes') {
      return `<textarea name="${escapeAttribute(key)}">${escapeHtml(textValue)}</textarea>`;
    }
    if (key === 'mail_name') {
      return `<input type="text" name="mail_name" value="${escapeAttribute(textValue)}" ${mode === 'edit' ? 'readonly' : ''}>`;
    }
    if (key === 'pr_id') {
      return `<input type="text" name="pr_id" value="${escapeAttribute(textValue)}" readonly disabled placeholder="保存時に自動採番">`;
    }
    if (key === 'assignee') {
      return renderNamedSelectInput('setter', textValue, getAdminSelectOptions_());
    }
    if (key === 'reviewer') {
      return renderNamedSelectInput('checker', textValue, getAdminSelectOptions_());
    }
    if (key === 'is_new' || key === 'new_flag') {
      return `<input type="checkbox" name="is_new" aria-label="新規" ${isTruthyValue(textValue) ? 'checked' : ''} ${mode === 'edit' ? 'disabled' : ''}>`;
    }
    if (key === 'current_job_count') {
      return `<input type="text" name="current_job_count" value="${escapeAttribute(textValue)}" readonly disabled placeholder="保存後に自動取得されます">`;
    }
    if (key === 'job_count_updated_at') {
      return `<input type="text" name="job_count_updated_at" value="${escapeAttribute(textValue)}" readonly disabled placeholder="保存後に自動更新されます">`;
    }
    if (key === 'mail_type' || key === 'category') {
      return renderSelectInput(key, textValue, buildUniqueScheduleValues_('mail_type')).replace('<select ', `<select ${mode === 'edit' ? 'disabled ' : ''}`);
    }
    if (key === 'sub_category') {
      return renderSelectInput(key, textValue, buildUniqueScheduleValues_('sub_category')).replace('<select ', `<select ${mode === 'edit' ? 'disabled ' : ''}`);
    }
    if (key === 'cycle') {
      return renderSelectInput(key, textValue, buildUniqueScheduleValues_('cycle')).replace('<select ', `<select ${mode === 'edit' ? 'disabled ' : ''}`);
    }
    if (key === 'pr') {
      return `<input type="text" name="pr" value="${escapeAttribute(textValue)}" ${mode === 'edit' ? 'readonly disabled' : ''}>`;
    }
    if (key === 'format') {
      return '';
    }
    if (isWeekdayHeader(header) || key === 'weekday') {
      return renderSelectInput(key, textValue, ['月', '火', '水', '木', '金', '土', '日']);
    }
    if (isFormatHeader(header) || key === 'format') {
      return mode === 'edit'
        ? ''
        : renderSelectInput(key, textValue, ['フリー', '抽出', '自動求人特集', 'その他']);
    }
    if (isTimeHeader(header) || key === 'hour') {
      return renderSelectInput(key, normalizeMasterHourValue(textValue), buildHourOptions());
    }
    if (isDateTimeHeader(header)) {
      return `<input type="datetime-local" name="${escapeAttribute(key)}" value="${escapeAttribute(normalizeDateTimeLocalString(textValue))}">`;
    }
    if (isDateHeader(header) || key === 'start_date' || key === 'end_date') {
      return `<input type="date" name="${escapeAttribute(key)}" value="${escapeAttribute(normalizeDateString(textValue))}">`;
    }
    if (String(textValue).length > 60 || String(textValue).includes('\n')) {
      return `<textarea name="${escapeAttribute(key)}">${escapeHtml(textValue)}</textarea>`;
    }
    return `<input type="text" name="${escapeAttribute(key)}" value="${escapeAttribute(textValue)}">`;
  }

  function buildHourOptions() {
    const options = [];
    for (let hour = 8; hour <= 21; hour++) {
      options.push(`${hour}:00`);
    }
    return options;
  }

  function normalizeMasterHourValue(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const match = text.match(/^(\d{1,2})(?::\d{2})?/);
    if (!match) return text;
    return `${Number(match[1])}:00`;
  }

  function getBgColor(row) {
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();
    const cycle = String(row && row.cycle != null ? row.cycle : '').trim();
    const format = String(row && row.format != null ? row.format : '').trim();
    const text = [category, cycle, format].join(' ');
    const rowCycle = normalizeCycleLabel(cycle);
    const rowCycleNum = extractCycleNumber(rowCycle);

    if (text.includes('毎月')) return '#FFF0F5';
    if (text.includes('特殊') || text.includes('特段')) return '#E6E6FA';
    if (text.includes('隔週A') || rowCycle === 'A') return '#E0FFE0';
    if (text.includes('隔週B') || rowCycle === 'B') return '#FFD1DC';
    if (text.includes('自動求人') || text.includes('その他') || rowCycleNum != null) return '#E0FFFF';
    return '#FFFFFF';
  }

  function getSubCategoryClass(row) {
    const className = String(row && row.sub_category_class != null ? row.sub_category_class : '').trim();
    if (['is-special', 'is-product', 'is-others'].includes(className)) return className;

    const text = String(row && row.sub_category != null ? row.sub_category : '').trim();
    if (text.includes('特殊')) return 'is-special';
    if (text.includes('商品')) return 'is-product';
    if (text.includes('その他') || text.includes('他部署')) return 'is-others';
    return text ? 'is-others' : '';
  }

  function isPositionMatch(row) {
    const category = String(row && (row.mail_type != null ? row.mail_type : row.category) || '').trim();
    const mailName = String(row && row.mail_name != null ? row.mail_name : '').trim();
    const notes = String(row && row.notes != null ? row.notes : '').trim();
    const cycle = String(row && row.cycle != null ? row.cycle : '').trim();
    const text = [category, mailName, notes].join(' ');

    // キーワードが含まれているか、もしくはサイクルが数値（1,2,3）であれば3週サイクルとみなす
    return text.includes('ポジションマッチ') || extractCycleNumber(normalizeCycleLabel(cycle)) != null;
  }

  function getJobCountAlert(row) {
    const countText = String(row && row.current_job_count != null ? row.current_job_count : '').replace(/,/g, '').trim();
    if (countText === '') return null;

    const count = Number(countText);
    const hasUrl = !!String(row && row.job_url != null ? row.job_url : '').trim();

    if (!hasUrl) return null;
    if (!Number.isFinite(count)) return null;
    if (count === 0) {
      return {
        level: 'critical',
        icon: '[!]',
        count,
        updatedAt: row && row.job_count_updated_at,
        message: '求人数が0件です'
      };
    }
    return null;
  }

  function renderJobAlertIcon(alert) {
    if (!alert) return '';
    return `<span class="job-alert-icon job-alert-${alert.level}" title="${escapeAttribute(getJobAlertTooltip(alert))}">${escapeHtml(alert.icon)}</span>`;
  }

  function getJobAlertTooltip(alert) {
    if (!alert) return '';
    const countText = alert.count == null ? '取得不可' : `${alert.count.toLocaleString()}件`;
    const updatedAt = alert.updatedAt ? String(alert.updatedAt) : '未取得';
    return `最終取得日時：${updatedAt}、件数：${countText} / ${alert.message}`;
  }

  function renderJobAlertGuidance(row) {
    const alert = getJobCountAlert(row);
    const panel = document.getElementById('job-alert-guidance');
    if (!panel) return;
    if (!alert) {
      panel.style.display = 'none';
      panel.textContent = '';
      panel.className = 'job-alert-guidance';
      return;
    }
    panel.className = `job-alert-guidance job-alert-guidance-${alert.level}`;
    panel.textContent = getJobAlertTooltip(alert);
    panel.style.display = 'block';
  }

  function getPrStates(row, targetDateString) {
    const records = getPrRecordsForSchedule(row);
    const states = records
      .map(record => getPrState(record, targetDateString))
      .filter(Boolean);
    return collapsePrStates_(states);
  }

  function getPrState(record, targetDateString) {
    const prId = String(record && record.pr_id != null ? record.pr_id : '').trim();
    if (!prId) return null;

    const startDate = normalizeDateString(record.start_date);
    const endDate = normalizeDateString(record.end_date);
    const targetMs = dateStringToMs(targetDateString);
    const startMs = dateStringToMs(startDate);
    const endMs = dateStringToMs(endDate);
    if (targetMs == null) return null;

    let status = '';
    let action = '';
    if (startMs != null && targetMs >= startMs && targetMs < startMs + 7 * DAY_MS) {
      status = 'add';
      action = '追加';
    } else if (endMs != null && targetMs > endMs - 7 * DAY_MS && targetMs <= endMs) {
      status = 'remove';
      action = '削除';
    } else if (startMs != null && endMs != null && targetMs >= startMs && targetMs <= endMs) {
      status = 'active';
      action = '掲出中';
    } else if (startMs != null && endMs == null && targetMs >= startMs + 7 * DAY_MS) {
      status = 'active';
      action = '掲出中';
    }

    return status ? { pr_id: prId, status, label: `└PR[${prId}]${action}` } : null;
  }

  function collapsePrStates_(states) {
    const priority = { add: 3, remove: 2, active: 1 };
    const byPrId = new Map();

    states.forEach(state => {
      const key = normalizeText(state.pr_id);
      if (!key) return;
      const current = byPrId.get(key);
      if (!current || priority[state.status] > priority[current.status]) {
        byPrId.set(key, state);
      }
    });

    return Array.from(byPrId.values());
  }

  function getPrRecordsForSchedule(row) {
    if (!row) return [];

    const scheduleId = String(getValueByKeys(row, ['schedule_id', 'id'])).trim();
    const mailName = normalizeText(row.mail_name);
    const prRows = Array.isArray(APP_DATA.pr) ? APP_DATA.pr : [];

    // 1. target_ids (schedule_id) での紐付け (新方式)
    const matchedPrs = prRows.filter(prRow => {
      const targetIds = String(getValueByKeys(prRow, ['target_ids', '紐付けID']) || '').split(',').map(s => s.trim());
      if (scheduleId && targetIds.includes(scheduleId)) return true;

      // 互換性: メルマガ名での検索
      if (mailName) {
        return Object.keys(prRow).some(key => normalizeText(prRow[key]) === mailName);
      }
      return false;
    });

    const records = matchedPrs.map(prRow => ({
      pr_id: getValueByKeys(prRow, ['pr_id', 'PR', 'pr', 'id']),
      start_date: getPrStartDate_(prRow),
      end_date: getPrEndDate_(prRow)
    })).filter(record => record.pr_id);

    // 2. app_pr_targets からの紐付け (旧方式・互換性)
    const prTargets = Array.isArray(APP_DATA.prTargets) ? APP_DATA.prTargets : [];
    const prById = new Map(prRows.map(prRow => [normalizeText(getValueByKeys(prRow, ['pr_id', 'PR', 'pr', 'id'])), prRow]));

    const targetRecords = mailName ? prTargets
      .filter(target => normalizeText(getValueByKeys(target, ['mail_name', 'メルマガ内容', 'target_mail_name', '対象メルマガ'])) === mailName)
      .map(target => buildPrRecordFromTarget_(target, prById))
      .filter(Boolean) : [];

    // 3. schedule シートの直書き PR 列 (互換性)
    const directPrId = getValueByKeys(row, ['pr', 'PR', 'pr_id', 'PR_ID']);
    const directRecord = directPrId ? [{
      pr_id: directPrId,
      start_date: getPrStartDate_(row),
      end_date: getPrEndDate_(row)
    }] : [];

    return dedupePrRecords_(records.concat(targetRecords, directRecord));
  }

  function buildPrRecordFromTarget_(target, prById) {
    const prId = normalizeText(getValueByKeys(target, ['pr_id', 'PR', 'pr', 'id']));
    if (!prId) return null;

    const prRow = prById.get(prId) || {};
    return {
      pr_id: prId,
      start_date: getPrStartDate_(prRow) || getPrStartDate_(target),
      end_date: getPrEndDate_(prRow) || getPrEndDate_(target)
    };
  }

  function getPrRecordsByScanningPrRows_(mailName, prRows) {
    return prRows
      .filter(prRow => Object.keys(prRow).some(key => normalizeText(prRow[key]) === mailName))
      .map(prRow => ({
        pr_id: getValueByKeys(prRow, ['pr_id', 'PR', 'pr', 'id']),
        start_date: getPrStartDate_(prRow),
        end_date: getPrEndDate_(prRow)
      }))
      .filter(record => record.pr_id);
  }

  function getPrStartDate_(row) {
    return getValueByKeys(row, PR_START_DATE_KEYS);
  }

  function getPrEndDate_(row) {
    return getValueByKeys(row, PR_END_DATE_KEYS);
  }

  function dedupePrRecords_(records) {
    const seen = new Set();
    return records.filter(record => {
      const key = [record.pr_id, normalizeDateString(record.start_date), normalizeDateString(record.end_date)].join('|');
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function getValueByKeys(obj, keys) {
    for (const key of keys) {
      if (obj && obj[key] != null && String(obj[key]).trim() !== '') return obj[key];
    }
    return '';
  }

  function normalizeText(value) {
    return String(value == null ? '' : value).trim();
  }

  function getDisplayName(key) {
    const text = String(key == null ? '' : key).trim();
    return DISPLAY_NAMES[text] || DISPLAY_NAMES[text.toLowerCase()] || text;
  }

  function getVisibleMasterHeaders(headers) {
    const systemHeaders = ['source_sheet', 'source_row', '元シート', '元行', 'is_inactive', '配信停止', 'schedule_action'];
    const visible = headers.filter(header => {
      const h = String(header).trim();
      return !isMasterIdHeader(header) && (!systemHeaders.includes(h) || h === 'target_ids');
    });
    // PR管理画面では紐づいたメルマガを一覧の最後に別列表示する
    if (MASTER_DATA.sheetName === 'app_pr' && !visible.includes('target_mails')) {
      visible.push('target_mails');
    }
    return visible;
  }

  function isMasterIdHeader(header) {
    const idHeaders = MASTER_ID_HEADERS[MASTER_DATA.sheetName] || [];
    return idHeaders.includes(String(header || '').trim());
  }

  function getCycleInfo(date) {
    const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const base = new Date(CYCLE_BASE_DATE.getFullYear(), CYCLE_BASE_DATE.getMonth(), CYCLE_BASE_DATE.getDate());
    const elapsedDays = Math.floor((target.getTime() - base.getTime()) / DAY_MS);
    const diffWeeks = Math.floor(elapsedDays / 7);
    const weekGroup = getBiweeklyCycle(diffWeeks);
    const positionMatchCycle = getPositionMatchCycle(target);
    return {
      weekGroup,
      threeWeekNum: positionMatchCycle,
      positionMatchCycle,
      weekLabel: `隔週${weekGroup}`,
      threeWeekLabel: `特殊${positionMatchCycle}週目${positionMatchCycle === 3 ? ' (関西オープン)' : ''}`
    };
  }

  function getCycleForRow(row, targetDate) {
    const diffWeeks = getDiffWeeks(targetDate);
    if (isPositionMatch(row)) {
      return ((diffWeeks % 3) + 3) % 3 + 1;
    }
    return getBiweeklyCycle(diffWeeks);
  }

  function cycleContains(cycleValue, targetCycle) {
    return String(cycleValue == null ? '' : cycleValue).indexOf(String(targetCycle)) !== -1;
  }

  function parseScheduleDate_(value) {
    if (!value) return new Date();
    if (value instanceof Date) return value;
    const parts = String(value).split('/');
    if (parts.length === 3) {
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }
    return new Date(value);
  }

  function getDiffWeeks(targetDate) {
    // 基準日(2026-04-27月曜)を基準にすると、火曜始まり週の計算が複雑になるため、
    // 「直近の火曜日」を基準にした週番号計算に変更する
    const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());

    // 火曜日を起点(0)とするためのオフセット計算
    // 2026-04-27(月) は基準日。次の火曜は 2026-04-28。
    // その週を第0週とする。
    const baseTuesday = new Date(2026, 3, 28);
    const diffDays = Math.floor((target.getTime() - baseTuesday.getTime()) / DAY_MS);

    // 火曜始まりの週番号を計算
    return Math.floor(diffDays / 7);
  }

  function getBiweeklyCycle(diffWeeks) {
    return ((diffWeeks % 2) + 2) % 2 === 0 ? 'A' : 'B';
  }

  function getPositionMatchCycle(targetDate) {
    const diffWeeks = getDiffWeeks(targetDate);
    return ((diffWeeks % 3) + 3) % 3 + 1;
  }

  function getCurrentWeekNum(date) {
    return getCycleInfo(date).threeWeekNum;
  }

  function getWeeklyGroup(date) {
    return getCycleInfo(date).weekGroup;
  }

  function getMonthEndInfo(date) {
    const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    const windowStart = new Date(monthEnd);
    windowStart.setDate(monthEnd.getDate() - 6);
    const startMs = new Date(windowStart.getFullYear(), windowStart.getMonth(), windowStart.getDate()).getTime();
    const endMs = new Date(monthEnd.getFullYear(), monthEnd.getMonth(), monthEnd.getDate()).getTime();
    return {
      isInWindow: target.getTime() >= startMs && target.getTime() <= endMs,
      windowStart,
      monthEnd
    };
  }

  function getMonthEndWindowStart(date) {
    const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    const windowStart = new Date(monthEnd);
    windowStart.setDate(monthEnd.getDate() - 6);
    return windowStart;
  }

  function getHolidayDateSet() {
    const set = new Set();
    const holidayRows = []
      .concat(Array.isArray(APP_DATA.japaneseHolidays) ? APP_DATA.japaneseHolidays : [])
      .concat(Array.isArray(APP_DATA.holidays) ? APP_DATA.holidays : []);

    holidayRows.forEach(row => {
      const value = row && typeof row === 'object'
        ? getValueByKeys(row, ['date', 'holiday_date', 'target_date', '日付', '祝日'])
        : row;
      const date = normalizeDateString(value);
      if (/^\d{4}-\d{2}-\d{2}$/.test(date)) set.add(date);
    });
    return set;
  }

  function jumpToCurrentWeek() {
    const startInput = document.getElementById('startInput');
    startInput.value = formatDateForInput(getTuesdayWeekStart(new Date()));
    loadData();
  }

  function getTuesdayWeekStart(date) {
    const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diffToTuesday = (target.getDay() + 5) % 7;
    target.setDate(target.getDate() - diffToTuesday);
    return target;
  }

  function setCalendarStartDate(value) {
    if (!value) return;
    document.getElementById('startInput').value = value;
    loadData();
  }

  function buildDates(start, count) {
    const dates = [];
    for (let i = 0; i < count; i++) {
      const date = new Date(start);
      date.setDate(start.getDate() + i);
      dates.push(date);
    }
    return dates;
  }

  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function formatDateForInput(date) {
    return formatDate(date);
  }

  function isDateTimeHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return [
      'timestamp',
      'updated_at',
      'confirmed_at',
      'job_count_updated_at'
    ].includes(key) || key.includes('日時');
  }

  function isHiddenMasterInputHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'job_count_updated_at' ||
      key === 'is_fixed' ||
      key === '求人数最終取得日時' ||
      key === '確定済';
  }

  function isWeekdayHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'weekday' || key === '曜日';
  }

  function isFormatHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'format' || key === '形式';
  }

  function isAssigneeHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'assignee' || key === '設定者';
  }

  function isReviewerHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'reviewer' || key === '確認者';
  }

  function isDateHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    if (!key || isDateTimeHeader(key)) return false;
    return key === 'date' ||
      key.endsWith('_date') ||
      key.includes('date') ||
      key.includes('日付') ||
      key.includes('開始') ||
      key.includes('終了') ||
      key.includes('期限') ||
      key.includes('掲載日') ||
      key.includes('配信日');
  }

  function isTimeHeader(header) {
    const key = String(header == null ? '' : header).trim().toLowerCase();
    return key === 'hour' || key === 'time' || key.includes('時間') || key.includes('時刻');
  }

  function normalizeDateString(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
    if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(text)) {
      const parts = text.split('/');
      return `${parts[0]}-${String(parts[1]).padStart(2, '0')}-${String(parts[2]).padStart(2, '0')}`;
    }
    if (/^\d+(\.\d+)?$/.test(text)) {
      const serial = Number(text);
      if (!Number.isNaN(serial) && serial > 20000) {
        const utc = new Date(Date.UTC(1899, 11, 30) + serial * 86400000);
        return formatDate(utc);
      }
    }
    const parsed = new Date(text);
    if (Number.isNaN(parsed.getTime())) return text;
    return formatDate(parsed);
  }

  function normalizeDateTimeLocalString(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const normalized = text.replace(/\//g, '-').replace(' ', 'T');
    const match = normalized.match(/^(\d{4}-\d{1,2}-\d{1,2})T(\d{1,2}):(\d{2})/);
    if (match) {
      const date = normalizeDateString(match[1]);
      return `${date}T${String(match[2]).padStart(2, '0')}:${match[3]}`;
    }
    const parsed = new Date(text);
    if (Number.isNaN(parsed.getTime())) return '';
    const hours = String(parsed.getHours()).padStart(2, '0');
    const minutes = String(parsed.getMinutes()).padStart(2, '0');
    return `${formatDate(parsed)}T${hours}:${minutes}`;
  }

  function normalizeTimeString(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const match = text.match(/^(\d{1,2})(?::(\d{2}))?/);
    if (!match) return text;
    return `${String(match[1]).padStart(2, '0')}:${match[2] || '00'}`;
  }

  function dateStringToMs(value) {
    const dateString = normalizeDateString(value);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateString)) return null;
    const parts = dateString.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]).getTime();
  }

  function normalizeWeekdayLabel(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text) return '';
    const lower = text.toLowerCase();
    const map = {
      sun: '日',
      sunday: '日',
      '日': '日',
      mon: '月',
      monday: '月',
      '月': '月',
      tue: '火',
      tues: '火',
      tuesday: '火',
      '火': '火',
      wed: '水',
      wednesday: '水',
      '水': '水',
      thu: '木',
      thur: '木',
      thurs: '木',
      thursday: '木',
      '木': '木',
      fri: '金',
      friday: '金',
      '金': '金',
      sat: '土',
      saturday: '土',
      '土': '土'
    };
    return map[lower] || map[text] || text;
  }

  function normalizeCycleLabel(value) {
    const text = String(value == null ? '' : value).trim();
    if (!text || text === '毎週') return '';
    if (text.includes('隔週A') || text === 'A') return 'A';
    if (text.includes('隔週B') || text === 'B') return 'B';
    const match = text.match(/(\d+)/);
    return match ? String(Number(match[1])) : text;
  }

  function extractCycleNumber(value) {
    const text = String(value == null ? '' : value).trim();
    const match = text.match(/(\d+)/);
    return match ? Number(match[1]) : null;
  }

  function isInactive(row) {
    const value = String(row && row.is_inactive != null ? row.is_inactive : '').trim().toLowerCase();
    return ['true', 'yes', '1', '停止', '配信停止'].includes(value);
  }

  function isFixed(row, targetDate) {
    const sourceRow = row && row.source_row;
    const date = targetDate || (row && row.target_date);
    const fixedOccurrences = APP_DATA.fixedOccurrences || {};
    return !!fixedOccurrences[`${sourceRow}|${date}`];
  }

  function isStopped(row, targetDate) {
    const scheduleId = row && row.schedule_id;
    const date = targetDate || (row && row.target_date);
    const stoppedOccurrences = APP_DATA.stoppedOccurrences || {};
    return !!stoppedOccurrences[getStoppedKey(scheduleId, date)];
  }

  function setStoppedOccurrence(scheduleId, targetDate, stopped) {
    if (!APP_DATA.stoppedOccurrences) APP_DATA.stoppedOccurrences = {};
    const key = getStoppedKey(scheduleId, targetDate);
    if (stopped) {
      APP_DATA.stoppedOccurrences[key] = true;
    } else {
      delete APP_DATA.stoppedOccurrences[key];
    }
  }

  function getStoppedKey(scheduleId, targetDate) {
    return `${String(scheduleId || '').trim()}|${String(targetDate || '').trim()}`;
  }

  function getMoveOverrideForDate(row, targetDate) {
    const scheduleId = String(row && row.schedule_id || '').trim();
    if (!scheduleId || !targetDate) return null;
    return Object.values(APP_DATA.checkStatuses || {}).find(status => {
      return status &&
        typeof status === 'object' &&
        status.field === 'move_override' &&
        status.is_active === true &&
        String(status.schedule_id || '').trim() === scheduleId &&
        normalizeDateString(status.delivery_date) === targetDate;
    }) || null;
  }

  function isMovedOriginalOccurrence(row, targetDate) {
    const scheduleId = String(row && row.schedule_id || '').trim();
    if (!scheduleId || !targetDate) return false;
    return Object.values(APP_DATA.checkStatuses || {}).some(status => {
      return status &&
        typeof status === 'object' &&
        status.field === 'move_override' &&
        status.is_active === true &&
        String(status.schedule_id || '').trim() === scheduleId &&
        normalizeDateString(status.original_date) === targetDate;
    });
  }

  function getOccurrenceOverrideForItemId(itemId) {
    const key = getCheckStatusKey(itemId, 'occurrence_override');
    const status = (APP_DATA.checkStatuses || {})[key];
    if (!status || typeof status !== 'object') return null;
    if (status.field !== 'occurrence_override' || status.is_active !== true) return null;
    return status;
  }

  function applyOccurrenceOverrideToEntry(entry) {
    const itemId = getCheckItemId(entry);
    const override = getOccurrenceOverrideForItemId(itemId);
    if (!override) return entry;

    const next = Object.assign({}, entry);
    const fields = Array.isArray(override.override_fields) ? override.override_fields : [];
    fields.forEach(key => {
      if (Object.prototype.hasOwnProperty.call(override, key)) {
        next[key] = override[key];
      }
    });
    return next;
  }

  function setEditState(fixed, stopped) {
    const locked = fixed || stopped;
    const modalCard = document.querySelector('#editModal .modal-card');
    if (modalCard) modalCard.classList.toggle('is-stopped-edit', !!stopped && !fixed);

    document.querySelectorAll('#editModal input, #editModal select, #editModal textarea').forEach(field => {
      if (field.id === 'new-comment') return;
      if (field.name === 'mail_name') {
        field.readOnly = true;
        field.disabled = false;
        return;
      }
      if (field.name === 'current_job_count') {
        field.readOnly = true;
        field.disabled = true;
        return;
      }
      if (field.tagName === 'SELECT') {
        field.disabled = locked;
      } else {
        field.readOnly = locked;
        field.disabled = false;
      }
    });
    const saveButton = document.querySelector('#editModal .modal-actions .primary-button');
    saveButton.disabled = locked;
    saveButton.style.display = locked ? 'none' : '';

    const stopButton = document.getElementById('stop-delivery-button');
    const resumeButton = document.getElementById('resume-delivery-button');
    if (stopButton && resumeButton) {
      stopButton.style.display = !fixed && !stopped ? '' : 'none';
      resumeButton.style.display = !fixed && stopped ? '' : 'none';
      const jobAlert = getJobCountAlert(CURRENT_ENTRY);
      stopButton.classList.toggle('is-critical', !!jobAlert && jobAlert.level === 'critical');
    }

    let notice = document.getElementById('fixedNotice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'fixedNotice';
      notice.className = 'fixed-notice';
      document.querySelector('#editModal .modal-card').insertBefore(notice, document.querySelector('#editModal .modal-actions'));
    }
    notice.textContent = fixed
      ? 'この配信は確定済みのため編集できません。コメントの追加は可能です。'
      : stopped
        ? 'この配信は手動で配信停止中です。再開すると編集できます。コメントの追加は可能です。'
        : '';
    notice.style.display = locked ? 'block' : 'none';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  function toggleCellExpand(event) {
    if (!event || !event.currentTarget) return;
    // ボタン操作やテキスト選択を邪魔しない
    if (event.target && (event.target.tagName === 'BUTTON' || event.target.tagName === 'A')) return;
    event.currentTarget.classList.toggle('is-expanded');
  }

  function copyTextToClipboard_(text) {
    const value = String(text == null ? '' : text);
    if (!value) return;

    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      navigator.clipboard.writeText(value).catch(() => {});
      return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = value;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(textarea);
  }

  function handleActionClick(event) {
    const actionElement = event.target.closest('[data-action]');
    if (!actionElement) return;

    const action = String(actionElement.dataset.action || '').trim();
    if (!action) return;

    event.preventDefault();
    event.stopPropagation();

    if (action === 'toggle-cell-expand') {
      toggleCellExpand({ currentTarget: actionElement, target: event.target });
      return;
    }

    if (action === 'toggle-check-status') {
      toggleCheckStatusFromCell(actionElement, event);
      return;
    }

    if (action === 'open-modal') {
      openModal(actionElement.dataset.entry || '');
      return;
    }

    if (action === 'open-master-modal') {
      openMasterModal(actionElement.dataset.row || '');
      return;
    }

    if (action === 'delete-master-row') {
      deleteMasterRow(actionElement.dataset.rowNumber || '');
      return;
    }

    if (action === 'stop-all-for-day') {
      stopAllForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'resume-all-for-day') {
      resumeAllForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'fill-r-for-day') {
      fillRForDay(actionElement.dataset.date || '');
      return;
    }

    if (action === 'save-pending-check-statuses') {
      savePendingCheckStatuses();
      return;
    }

    if (action === 'toggle-move-mode') {
      toggleMoveMode();
      return;
    }

    if (action === 'jump-to-current-week') {
      jumpToCurrentWeek();
      return;
    }

    if (action === 'load-active-master') {
      loadActiveMaster();
      return;
    }

    if (action === 'toggle-master-new-only') {
      setMasterNewOnly(!MASTER_NEW_ONLY);
      return;
    }

    if (action === 'close-modal') {
      closeModal();
      return;
    }

    if (action === 'close-master-modal') {
      closeMasterModal();
      return;
    }

    if (action === 'reload-comments') {
      loadCommentsForCurrentEntry();
      return;
    }

    if (action === 'post-comment') {
      postComment();
      return;
    }

    if (action === 'stop-current-delivery') {
      stopCurrentDelivery();
      return;
    }

    if (action === 'resume-current-delivery') {
      resumeCurrentDelivery();
      return;
    }

    if (action === 'save-edit') {
      saveEdit();
      return;
    }

    if (action === 'save-master-edit') {
      saveMasterEdit();
    }
  }

  function toggleCheckStatusFromCell(cell, event) {
    if (!cell || !event) return;
    event.stopPropagation();
    const field = String(cell.dataset.checkField || '').trim();
    const encodedItemId = String(cell.dataset.encodedItemId || '').trim();
    const itemId = encodedItemId ? decodeURIComponent(encodedItemId) : String(cell.dataset.itemId || '').trim();
    if (!itemId || !field) return;

    const nextActive = !isCheckStatusActive(itemId, field);
    const payload = parseCheckLogPayload(cell.dataset.logPayload);
    setPendingCheckStatus(itemId, field, nextActive, payload);
    schedulePendingCheckPersist();
    cell.classList.toggle('is-active-red', nextActive);
    cell.classList.toggle('is-pending-check', hasPendingCheckStatus(itemId, field));
    updatePendingCheckSaveButton();
  }

  function wireEvents() {
    document.addEventListener('click', handleActionClick);
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => switchTab(button.dataset.tab));
    });
    document.getElementById('startInput').addEventListener('change', loadData);
    document.getElementById('searchInput').addEventListener('input', renderScheduleGrid);
    document.getElementById('masterSearchInput').addEventListener('input', renderMasterTable);
    document.getElementById('masterSheetSelect').addEventListener('change', loadActiveMaster);
    document.getElementById('editModal').addEventListener('click', event => {
      if (event.target.id === 'editModal') closeModal();
    });
    const editName = document.querySelector('#editModal [name="mail_name"]');
    if (editName) {
      editName.addEventListener('click', () => copyTextToClipboard_(editName.value));
    }
    const editAssignee = document.querySelector('#editModal [name="setter"]');
    if (editAssignee) {
      editAssignee.addEventListener('change', syncReviewerLock_);
    }
    document.getElementById('masterModal').addEventListener('click', event => {
      if (event.target.id === 'masterModal') closeMasterModal();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModal();
        closeMasterModal();
      }
    });

    initModalTabs('editModal');
    initModalTabs('masterModal');
    loadAdminList();
  }

  function stopAllForDay(dateStr) {
    const ids = [];
    document.querySelectorAll(`td[data-date="${dateStr}"] .delivery-row`).forEach(row => {
       const id = row.getAttribute('data-item-id');
       if (id && !row.classList.contains('is-fixed') && !row.classList.contains('is-stopped')) {
          ids.push(id);
       }
    });
    
    if (ids.length === 0) {
      alert('停止可能な配信予定がありません。');
      return;
    }
    
    if (!confirm(`${dateStr} の全${ids.length}件を一括で配信停止にしますか？\n（確定済みのものは除外されます）`)) return;
    
    showBusy('一括停止処理中...');
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">一括停止処理中...</div>';
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadData();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('一括停止に失敗しました: ' + err.message);
        loadData();
      })
      .stopAllDeliveriesForDay(dateStr, ids);
  }

  function resumeAllForDay(dateStr) {
    if (!confirm(`${dateStr} の停止設定をすべて解除し、再開しますか？\n（確定済みのものは除外されます）`)) return;
    
    showBusy('一括再開処理中...');
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">一括再開処理中...</div>';
    google.script.run
      .withSuccessHandler(() => {
        hideBusy();
        loadData();
      })
      .withFailureHandler(err => {
        hideBusy();
        alert('一括再開に失敗しました: ' + err.message);
        loadData();
      })
      .resumeAllDeliveriesForDay(dateStr);
  }

  window.addEventListener('beforeunload', event => {
    if (!getPendingCheckStatusUpdates().length) return;
    flushPendingCheckPersist();
    event.preventDefault();
    event.returnValue = '';
  });
  loadPendingCheckStatuses();
  wireEvents();
  loadData();
</script>
